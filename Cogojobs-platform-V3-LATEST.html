// ---------- Storage ----------
function ls(key, value){
  if (value === undefined) {
    try { return JSON.parse(localStorage.getItem(key)); } catch(e){ return null; }
  }
  localStorage.setItem(key, JSON.stringify(value));
}
function uid(prefix='id'){
  return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
}
function normalizeUserRecord(user){
  const normalized = Object.assign({}, user || {});
  if (!normalized.name) normalized.name = [normalized.firstName, normalized.lastName].filter(Boolean).join(' ').trim() || normalized.email || 'User';
  if (!normalized.createdAt) normalized.createdAt = new Date().toISOString();
  if (!normalized.status) normalized.status = normalized.archived ? 'archived' : 'active';
  if (!Object.prototype.hasOwnProperty.call(normalized, 'lastLogin')) normalized.lastLogin = null;
  if (normalized.role === 'employer' && !normalized.type) normalized.type = 'business';
  return normalized;
}
function getUsers(){
  const users = ls('cogo_users') || [];
  let changed = false;
  const normalized = users.map(user => {
    const next = normalizeUserRecord(user);
    if (JSON.stringify(next) !== JSON.stringify(user)) changed = true;
    return next;
  });
  if (changed) ls('cogo_users', normalized);
  return normalized;
}
function saveUsers(v){ ls('cogo_users', v.map(normalizeUserRecord)); }
function getAdminActionLog(){ return ls('cogo_admin_action_log') || []; }

}

      changed = true;

}

// ---------- Utilities ----------
function esc(s){
  if (s === null || s === undefined) return '';
  return String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function detectContactInfo(text=''){
  const emailRe = /[\w.+-]+@[\w.-]+\.\w+/i;
  const phoneRe = /(\+?1[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/;
  return emailRe.test(text) || phoneRe.test(text);
}
function moderateContent(text=''){
  const bad = ['porn','nude','explicit','kill','violence','hate'];
  const low = text.toLowerCase();
  return !bad.some(w => low.includes(w));

function formatPercent(value){

function calculateCommissionBreakdown(hours, rate){
  const settings = getPaymentSettings();
  const safeHours = Number(hours || 0);
  const safeRate = Number(rate || 0);
  const workTotal = Number((safeHours * safeRate).toFixed(2));
  const studentCommissionPct = Number(settings.studentCommissionPct || 0);
  const employerCommissionPct = Number(settings.employerCommissionPct || 0);
  const studentCommissionAmount = Number((workTotal * (studentCommissionPct / 100)).toFixed(2));
  const employerCommissionAmount = Number((workTotal * (employerCommissionPct / 100)).toFixed(2));
  const studentPayout = Number((workTotal - studentCommissionAmount).toFixed(2));
  const employerTotal = Number((workTotal + employerCommissionAmount).toFixed(2));
  const platformFeeTotal = Number((studentCommissionAmount + employerCommissionAmount).toFixed(2));
  return {
    hours: safeHours,
    rate: safeRate,
    workTotal,
    studentCommissionPct,
    employerCommissionPct,
    studentCommissionAmount,
    employerCommissionAmount,
    studentPayout,
    employerTotal,
    platformFeeTotal
  };
}

function attemptEscrowAuthorization(application, escrowAmount){
  const employer = getUserById(application.employerId);
  if (!employer) {
    const reason = 'employer_not_found';
    logPaymentEvent({ applicationId: application.id, employerId: application.employerId, amount: escrowAmount, status: 'failed', reason });
    return { success:false, reason };
  }
  if (!hasValidPaymentMethod(application.employerId)) {
    if (!TEST_ENV_PAYMENT_ALWAYS_SUCCEEDS) {
      const reason = 'missing_or_invalid_payment_method';
      logPaymentEvent({ applicationId: application.id, employerId: application.employerId, amount: escrowAmount, status: 'failed', reason });
      return { success:false, reason };
    }
    const users = getUsers();
    const user = users.find(x => x.id === employer.id);
    if (user) {
      user.paymentMethod = user.paymentMethod || { status:'valid', brand:'Visa', last4:'4242' };
      user.paymentMethod.status = 'valid';
      user.paymentSetupComplete = true;
      saveUsers(users);
      if (currentUser && currentUser.id === user.id) setCurrentUser(user);
    }
  }
  const provider = STRIPE_ENABLED ? 'stripe' : 'placeholder';
  const mode = STRIPE_ENABLED ? 'stripe_manual_capture' : (TEST_ENV_PAYMENT_ALWAYS_SUCCEEDS ? 'placeholder_test_success' : 'placeholder_success');
  logPaymentEvent({ applicationId: application.id, employerId: application.employerId, amount: escrowAmount, status: 'held', mode, provider });
  return { success:true, escrowStatus:'held', provider };
}

function getModalDraftStore(){
  return ls('cogo_modal_drafts') || {};
}
function saveModalDraftStore(store){
  ls('cogo_modal_drafts', store);
}
function modalDraftKey(title){
  return `modal:${String(title || '').trim().toLowerCase()}`;
}
function saveActiveModalDraft(){
  if (!activeModalDraftKey) return;
  const modalBody = document.querySelector('#modal-root .modal-body');
  if (!modalBody) return;
  const values = {};
  modalBody.querySelectorAll('input, textarea, select').forEach(field => {
    if (!field.id || field.type === 'file') return;
    values[field.id] = field.type === 'checkbox' ? !!field.checked : field.value;
  });
  const store = getModalDraftStore();
  store[activeModalDraftKey] = values;
  saveModalDraftStore(store);
}
function restoreActiveModalDraft(){
  if (!activeModalDraftKey) return;
  const modalBody = document.querySelector('#modal-root .modal-body');
  if (!modalBody) return;
  const store = getModalDraftStore();
  const draft = store[activeModalDraftKey] || {};
  Object.entries(draft).forEach(([id, value]) => {
    const field = modalBody.querySelector(`#${id}`);
    if (!field) return;
    if (field.type === 'checkbox') field.checked = !!value;
    else field.value = value;
  });
}
function clearActiveModalDraft(){
  if (!activeModalDraftKey) return;
  const store = getModalDraftStore();
  delete store[activeModalDraftKey];
  saveModalDraftStore(store);
}
function bindModalDraftAutosave(){
  const modalBody = document.querySelector('#modal-root .modal-body');
  if (!modalBody) return;
  modalBody.querySelectorAll('input, textarea, select').forEach(field => {
    field.addEventListener('input', saveActiveModalDraft);
    field.addEventListener('change', saveActiveModalDraft);
  });
}
function openModal(title, bodyHtml, width='760px'){
  activeModalDraftKey = modalDraftKey(title);
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-bg" onmousedown="window._modalBackdropDown=(event.target===this)" onclick="if(event.target===this && window._modalBackdropDown) closeModal(true)">
      <div class="modal" style="max-width:${width}" onmousedown="window._modalBackdropDown=false">
        <div class="modal-header">
          <h2 style="margin:0">${esc(title)}</h2>
          <button class="close-btn" onclick="closeModal(true)">✕</button>
        </div>
        <div class="modal-body">${bodyHtml}</div>
      </div>
    </div>
  `;
  restoreActiveModalDraft();
  bindModalDraftAutosave();
}
function closeModal(preserveDraft=false){
  if (preserveDraft) saveActiveModalDraft();
  else clearActiveModalDraft();
  document.getElementById('modal-root').innerHTML = '';
  activeModalDraftKey = null;
}

function resetDemoData(){

    .filter(key => key.startsWith('cogo_'))
    .forEach(key => localStorage.removeItem(key));
  currentUser = null;
  activeThreadUserId = null;
  closeModal();
  seedData();
  renderNav();
  renderPage();
  toast('Demo data reset.');
  openLoginModal();
}
function doLogin(){
  const email = (document.getElementById('loginEmail').value || '').trim().toLowerCase();
  const password = document.getElementById('loginPassword').value || '';
  const users = getUsers();
  const user = users.find(u => u.email.toLowerCase() === email && u.password === password);
  if (!user) { toast('Invalid email or password'); return; }
  if (user.archived) { toast('This profile is no longer active.'); return; }
  if (user.status === 'suspended') { toast('This account is suspended.'); return; }
  localStorage.removeItem('cogo_admin_impersonation');
  user.lastLogin = new Date().toISOString();
  saveUsers(users);
  setCurrentUser(user);
  closeModal();
  toast(`Welcome back, ${firstName(user.name)}!`);
  location.hash = '#/';
  renderPage();
}

    name:'',

    about:'',
    experience:'',

    profileVideoLink:'',

    email:'',
    phone:'',
    address:'',
    password:'',

    verificationMode:'test_skip',
    profileReady:false
  };
}
function getStudentSignupStrength(){
  const d = studentSignupDraft || createDefaultStudentSignupDraft();
  const checks = [
    !!d.name,
    !!d.age,
    !!d.school,
    !!d.city,
    !!(d.photo || d.avatar),
    !!d.about,
    !!d.experience,
    (d.services || []).length > 0,
    !!d.email,
    !!d.phone,
    !!d.address
  ];
  const pct = Math.round((checks.filter(Boolean).length / checks.length) * 100);
  return Math.max(10, pct);
}
function getStudentSignupSuggestions(){
  const d = studentSignupDraft || createDefaultStudentSignupDraft();
  const suggestions = [];
  if (!(d.photo || d.avatar)) suggestions.push('Profiles with photos get 3x more requests.');
  if ((d.about || '').length < 40) suggestions.push('Add more detail to get hired faster.');
  if (!(d.services || []).length) suggestions.push('Add at least one service before you publish.');
  if ((d.experience || '').length < 30) suggestions.push('Share a little experience so employers trust your profile faster.');
  return suggestions.slice(0, 2);
}

function renderStudentSignupFooter(){
  const prev = studentSignupStep > 1 ? `<button class="btn btn-outline" onclick="goStudentSignupStep(${studentSignupStep - 1})">Back</button>` : `<span></span>`;
  if (studentSignupStep === 7) return `${prev}<button class="btn btn-blue" onclick="submitStudentSignupProfile()">Submit and Publish Profile</button>`;
  if (studentSignupStep === 8) return `${prev}<button class="btn btn-blue" onclick="publishStudentSignupProfile()">Create Password</button>`;
  return `${prev}<button class="btn btn-blue" onclick="goStudentSignupStep(${studentSignupStep + 1})">Next</button>`;
}
function saveStudentSignupStep(step){
  if (!studentSignupDraft) studentSignupDraft = createDefaultStudentSignupDraft();
  if (step === 1){
    const name = (document.getElementById('studentFlowName').value || '').trim();
    const age = Number(document.getElementById('studentFlowAge').value || 0);
    const school = (document.getElementById('studentFlowSchool').value || '').trim();
    const city = (document.getElementById('studentFlowCity').value || '').trim();
    if (!name || !age || !school || !city) return toast('Please complete name, age, school, and city.'), false;
    if (age < 13 || age > 25) return toast('Student signup is for ages 13 to 25.'), false;
    Object.assign(studentSignupDraft, { name, age, school, city });
    return true;
  }
  if (step === 2){
    studentSignupDraft.avatar = studentSignupDraft.avatar || '🎓';
    if (!((studentSignupDraft.profileImages || []).length || studentSignupDraft.photo || studentSignupDraft.avatar)) return toast('Please upload a photo or choose an avatar.'), false;
    return true;
  }
  if (step === 3){
    const about = (document.getElementById('studentFlowAbout').value || '').trim();
    const experience = (document.getElementById('studentFlowExperience').value || '').trim();
    if (!about || !experience) return toast('Please complete About and Experience.'), false;
    Object.assign(studentSignupDraft, { about, experience });
    return true;
  }
  if (step === 4){
    const profileVideoLink = (document.getElementById('studentFlowProfileVideoLink').value || '').trim();
    studentSignupDraft.profileVideoLink = profileVideoLink;
    return true;
  }
  if (step === 5){
    syncStudentSignupServiceForm();
    const services = studentSignupDraft.services || [];
    const form = studentSignupDraft.serviceForm || {};
    const hasDraftValues = !!(form.title || form.description || form.videoLink || form.location || form.availability || Number(form.rate || 0) || (form.images || []).length);
    if (!services.length && hasDraftValues) {
      const draftRate = Number(form.rate || 0);
      if (!form.title || !form.description || !draftRate || !form.location || !form.availability) return toast('Please complete all required service fields.'), false;
      const service = {
        id: uid('service'),
        title: form.title,
        description: form.description,
        images: form.images || [],
        videoLink: form.videoLink || '',
        rate: draftRate,
        location: form.location,
        availability: form.availability,
        reviews: []
      };
      studentSignupDraft.services.push(service);
      studentSignupEditingServiceIndex = null;
      studentSignupDraft.serviceForm = { title:'', description:'', images:[], videoLink:'', rate:'20', location: studentSignupDraft.city || '', availability:'' };
    }
    if (!(studentSignupDraft.services || []).length) return toast('Please save at least one service before continuing.'), false;
    return true;
  }
  if (step === 6){
    const email = (document.getElementById('studentFlowEmail').value || '').trim().toLowerCase();
    const phone = (document.getElementById('studentFlowPhone').value || '').trim();
    const address = (document.getElementById('studentFlowAddress').value || '').trim();
    if (!email || !phone || !address) return toast('Please complete email, phone, and address.'), false;
    Object.assign(studentSignupDraft, { email, phone, address });
    return true;
  }
  if (step === 8){
    const password = document.getElementById('studentFlowPassword').value || '';
    const confirmPassword = document.getElementById('studentFlowConfirmPassword').value || '';
    if (!password || password.length < 6) return toast('Please create a password with at least 6 characters.'), false;
    if (password !== confirmPassword) return toast('Passwords do not match.'), false;
    Object.assign(studentSignupDraft, { password, confirmPassword });
    return true;
  }
  return true;
}
function goStudentSignupStep(targetStep){
  if (targetStep > studentSignupStep && !saveStudentSignupStep(studentSignupStep)) return;
  studentSignupStep = Math.max(1, Math.min(8, targetStep));
  renderStudentSignupModal();
}
function handleStudentSignupPhotoUpload(input){

    studentSignupDraft.photo = images[0] || '';

  });
}

function syncStudentSignupServiceForm(){
  if (!studentSignupDraft) studentSignupDraft = createDefaultStudentSignupDraft();
  if (!studentSignupDraft.serviceForm) studentSignupDraft.serviceForm = { title:'', description:'', images:[], videoLink:'', rate:'20', location:'', availability:'' };
  const titleEl = document.getElementById('studentFlowServiceTitle');
  const descriptionEl = document.getElementById('studentFlowServiceDescription');
  const videoEl = document.getElementById('studentFlowServiceVideoLink');
  const rateEl = document.getElementById('studentFlowServiceRate');
  const locationEl = document.getElementById('studentFlowServiceLocation');
  const availabilityEl = document.getElementById('studentFlowServiceAvailability');
  if (titleEl) studentSignupDraft.serviceForm.title = (titleEl.value || '').trim();
  if (descriptionEl) studentSignupDraft.serviceForm.description = (descriptionEl.value || '').trim();
  if (videoEl) studentSignupDraft.serviceForm.videoLink = (videoEl.value || '').trim();
  if (rateEl) studentSignupDraft.serviceForm.rate = rateEl.value || '20';
  if (locationEl) studentSignupDraft.serviceForm.location = (locationEl.value || '').trim();
  if (availabilityEl) studentSignupDraft.serviceForm.availability = (availabilityEl.value || '').trim();
}
function previewStudentSignupServiceVideo(value){
  syncStudentSignupServiceForm();
  studentSignupDraft.serviceForm.videoLink = value || '';
  const el = document.getElementById('student-service-video-preview');
  if (el) el.innerHTML = renderVideoPreviewHtml(studentSignupDraft.serviceForm.videoLink, 'Service video preview');
}
function handleStudentSignupServiceImagesUpload(input){
  syncStudentSignupServiceForm();
  readImagesToDataUrls(input, (images) => {
    studentSignupDraft.serviceForm.images = images;
    renderStudentSignupModal();
  });
}
function startNewStudentSignupService(){
  studentSignupEditingServiceIndex = null;
  studentSignupDraft.serviceForm = { title:'', description:'', images:[], videoLink:'', rate:'20', location: studentSignupDraft.city || '', availability:'' };
  renderStudentSignupModal();
}
function editStudentSignupService(index){
  const service = (studentSignupDraft.services || [])[index];
  if (!service) return;
  studentSignupEditingServiceIndex = index;
  studentSignupDraft.serviceForm = Object.assign({ images:[], videoLink:'' }, service);
  studentSignupStep = 5;
  renderStudentSignupModal();
}
function removeStudentSignupService(index){
  studentSignupDraft.services.splice(index, 1);
  if (!studentSignupDraft.services.length) startNewStudentSignupService();
  else renderStudentSignupModal();
}
function saveStudentSignupService(){
  syncStudentSignupServiceForm();
  const form = studentSignupDraft.serviceForm || {};
  const title = (form.title || '').trim();
  const description = (form.description || '').trim();
  const videoLink = (form.videoLink || '').trim();
  const rate = Number(form.rate || 0);
  const location = (form.location || '').trim();
  const availability = (form.availability || '').trim();
  if (!title || !description || !rate || !location || !availability) return toast('Please complete all required service fields.');
  const service = {
    id: studentSignupEditingServiceIndex !== null && studentSignupDraft.services[studentSignupEditingServiceIndex]
      ? studentSignupDraft.services[studentSignupEditingServiceIndex].id
      : uid('service'),
    title,
    description,
    images: (studentSignupDraft.serviceForm || {}).images || [],
    videoLink,
    rate,
    location,
    availability,
    reviews: (studentSignupEditingServiceIndex !== null && studentSignupDraft.services[studentSignupEditingServiceIndex]?.reviews) || []
  };
  if (studentSignupEditingServiceIndex !== null) studentSignupDraft.services[studentSignupEditingServiceIndex] = service;
  else studentSignupDraft.services.push(service);
  studentSignupEditingServiceIndex = null;
  studentSignupDraft.serviceForm = { title:'', description:'', images:[], videoLink:'', rate:'20', location: studentSignupDraft.city || '', availability:'' };
  toast('Service saved.');
  renderStudentSignupModal();
}

  return {
    id:'signup_preview',
    userId:'signup_preview_user',
    name:d.name,
    age:d.age,
    school:d.school,
    location:d.city ? (String(d.city).includes(',') ? d.city : `${d.city}, CA`) : '',

    profileImages:(d.profileImages || []).length ? d.profileImages : (d.photo ? [d.photo] : []),
    profileVideoLink:d.profileVideoLink || '',
    emoji:d.avatar || '🎓',
    title:primaryService.title || 'Student Service',
    tags:[],
    services:(d.services || []).map(s => Object.assign({ images:[], videoLink:'', reviews:[] }, s)),
    about:d.about ? [d.about] : [],
    whyHire:[],
    highlights:d.experience ? [d.experience] : [],
    rate:primaryService.rate || 20,
    reviews:[],
    balance:0,
    availability:primaryService.availability || '',
    status:'preview'
  };
}

  return `

function submitStudentSignupProfile(){

  if (!(d.photo || d.avatar)) return toast('Please add a photo or avatar first.');
  if (!d.about || !d.experience) return toast('Please complete About and Experience first.');
  if (!(d.services || []).length) return toast('Please add at least one service.');
  if (!d.email || !d.phone || !d.address) return toast('Please complete your contact details first.');
  studentSignupDraft.profileReady = true;
  studentSignupStep = 8;
  renderStudentSignupModal();
}
function publishStudentSignupProfile(){
  if (!studentSignupDraft.profileReady) return toast('Please submit and publish your profile first.');
  if (!saveStudentSignupStep(8)) return;
  const d = studentSignupDraft;
  if (!(d.services || []).length) return toast('Please add at least one service.');
  const users = getUsers();
  if (users.some(u => (u.email || '').toLowerCase() === (d.email || '').toLowerCase())) return toast('Email already registered. Please sign in.');
  const students = getStudents();
  const userId = uid('u');
  const studentId = uid('s');
  const createdAt = new Date().toISOString();
  const primaryService = d.services[0];
  const newUser = {
    id:userId,
    email:d.email,
    password:d.password,
    name:d.name,
    role:'student',
    emoji:d.avatar || '🎓',
    createdAt,
    verificationStatus:'skipped_test_mode'
  };
  const newStudent = {
    id:studentId,
    userId,
    name:d.name,
    age:Number(d.age) || 17,
    school:d.school,
    location:String(d.city || '').includes(',') ? d.city : `${d.city}, CA`,
    photo:d.photo || ((d.profileImages || [])[0]) || '',
    profileImages:(d.profileImages || []).length ? d.profileImages : (d.photo ? [d.photo] : []),
    profileVideoLink:d.profileVideoLink || '',
    emoji:d.avatar || '🎓',
    title:primaryService.title || 'Student Service',
    tags:[],
    services:(d.services || []).map(s => Object.assign({ images:[], videoLink:'', reviews:[] }, s)),
    about:[d.about],
    whyHire:['Friendly','Reliable','Motivated'],
    highlights:[d.experience],
    rate:Number(primaryService.rate || 20),
    reviews:[],
    balance:0,
    availability:primaryService.availability || '',
    status:'live',
    phone:d.phone,
    address:d.address,
    privateEmail:d.email,

  };
  users.push(newUser);

function extractCity(address=''){
  const clean = String(address || '').trim();
  if (!clean) return '';
  const parts = clean.split(',').map(part => part.trim()).filter(Boolean);
  return parts.length >= 2 ? parts[1] : parts[0];
}

function renderEmployerSignupFooter(){
  const passwordStep = employerSignupMode === 'employer' ? 4 : 2;
  const showBack = employerSignupStep > 1;
  const prevStep = employerSignupMode === 'employer'
    ? (employerSignupStep === 4 ? 3 : employerSignupStep - 1)

  if (employerSignupStep === passwordStep) return `${prev}<button class="btn btn-blue" onclick="publishEmployerSignupProfile()">Submit</button>`;
  return `${prev}<button class="btn btn-blue" onclick="goEmployerSignupStep(${employerSignupStep + 1})">Next</button>`;
}
function saveEmployerSignupStep(step){
  if (!employerSignupDraft) employerSignupDraft = createDefaultEmployerSignupDraft(employerSignupMode || 'neighbor');
  if (step === 1) {
    syncEmployerSignupPersonalDraft();
    if (!employerSignupDraft.firstName || !employerSignupDraft.lastName || !(employerSignupDraft.photo || employerSignupDraft.avatar) || !employerSignupDraft.email || !employerSignupDraft.phone || !employerSignupDraft.address) return toast('Please complete all required personal profile fields.'), false;
    return true;
  }
  if (employerSignupMode === 'employer' && step === 2) {
    syncEmployerSignupBusinessDraft();
    if (!employerSignupDraft.businessName || !employerSignupDraft.businessAbout || !employerSignupDraft.businessPhone || !employerSignupDraft.businessAddress || !employerSignupDraft.tin) return toast('Please complete all required business fields.'), false;
    return true;
  }
  const passwordStep = employerSignupMode === 'employer' ? 4 : 2;
  if (step === passwordStep) {
    syncEmployerSignupPasswordDraft();
    if (!employerSignupDraft.password || employerSignupDraft.password.length < 6) return toast('Please create a password with at least 6 characters.'), false;
    if (employerSignupDraft.password !== employerSignupDraft.confirmPassword) return toast('Passwords do not match.'), false;
    return true;
  }
  return true;
}
function goEmployerSignupStep(targetStep){
  if (targetStep > employerSignupStep && !saveEmployerSignupStep(employerSignupStep)) return;
  employerSignupStep = targetStep;

function parseVideoLink(url=''){
  const clean = (url || '').trim();
  if (!clean) return null;
  let parsed;
  try {
    parsed = new URL(clean);
  } catch (error) {
    return { type:'link', url:clean, label:clean };
  }
  const host = parsed.hostname.replace(/^www\./, '');
  const path = parsed.pathname || '';
  const videoFile = clean.match(/\.(mp4|webm|ogg|mov|m4v)(\?|#|$)/i);
  if (videoFile) return { type:'file', url:clean, label:'Video file' };
  if (host.includes('youtu.be')) {
    const videoId = path.split('/').filter(Boolean)[0] || '';
    return videoId ? { type:'youtube', url:clean, videoId, embedUrl:`https://www.youtube-nocookie.com/embed/${videoId}`, label:'YouTube video' } : { type:'link', url:clean, label:clean };
  }
  if (host.includes('youtube.com')) {
    const parts = path.split('/').filter(Boolean);
    const videoId = parsed.searchParams.get('v') || (parts[0] === 'shorts' ? parts[1] : '') || (parts[0] === 'embed' ? parts[1] : '');
    return videoId ? { type:'youtube', url:clean, videoId, embedUrl:`https://www.youtube-nocookie.com/embed/${videoId}`, label:'YouTube video' } : { type:'link', url:clean, label:clean };
  }
  if (host.includes('vimeo.com')) {
    const videoId = path.split('/').filter(Boolean).find(part => /^\d+$/.test(part)) || '';
    return videoId ? { type:'vimeo', url:clean, videoId, embedUrl:`https://player.vimeo.com/video/${videoId}`, label:'Vimeo video' } : { type:'link', url:clean, label:clean };
  }
  if (host.includes('loom.com')) {
    const parts = path.split('/').filter(Boolean);
    const videoId = parts[1] || parts[0] || '';
    return videoId ? { type:'loom', url:clean, videoId, embedUrl:`https://www.loom.com/embed/${videoId}`, label:'Loom video' } : { type:'link', url:clean, label:clean };
  }
  return { type:'link', url:clean, label:clean };
}
function renderVideoPreviewHtml(url='', label='Video preview'){

function hashString(value=''){
  let hash = 2166136261;
  for (let i = 0; i < value.length; i += 1) {

function daysSince(value){

function getHomepageRecencyScore(updatedAt){

}

function scoreHomepageServiceCard(card, sessionId){
  const recencyScore = getHomepageRecencyScore(card.service.updated_at || card.service.updatedAt || card.student.createdAt);
  const qualityScore = getHomepageQualityScore(card.service);
  const lowExposureBoost = getHomepageLowExposureBoost(card.service.last_shown_at || card.service.lastShownAt);
  const randomOffset = getHomepageRandomOffset(sessionId, card);
  const finalScore = (recencyScore * 0.4) + (qualityScore * 0.3) + (lowExposureBoost * 0.2) + (randomOffset * 0.1);
  return Object.assign({}, card, {
    homepageKey: getHomepageServiceKey(card),
    homepageCategory: getHomepageServiceCategory(card),
    homepageScore: finalScore,
    homepageSignals: { recencyScore, qualityScore, lowExposureBoost, randomOffset }

function pullHomepageCandidate(pool, placedCards, topStudentIds, topLimit=12){
  for (let i = 0; i < pool.length; i += 1) {
    const card = pool[i];
    const wouldDuplicateStudent = placedCards.length < topLimit && topStudentIds.has(card.student.userId);
    const lastTwo = placedCards.slice(-2);
    const wouldBreakCategoryMix = lastTwo.length === 2 && lastTwo.every(item => item.homepageCategory === card.homepageCategory);
    if (!wouldDuplicateStudent && !wouldBreakCategoryMix) return pool.splice(i, 1)[0];
  }

function buildHomepageFairOrder(sortedCards){
  const featuredNewCards = [];
  const seenFeaturedStudents = new Set();
  sortedCards.forEach(card => {
    if (featuredNewCards.length >= 3) return;
    if (!isHomepageServiceNew(card)) return;
    if (seenFeaturedStudents.has(card.student.userId)) return;
    seenFeaturedStudents.add(card.student.userId);
    featuredNewCards.push(card);
  });
  const featuredKeys = new Set(featuredNewCards.map(card => card.homepageKey));
  const remaining = sortedCards.filter(card => !featuredKeys.has(card.homepageKey));
  const featuredQueue = [...featuredNewCards];
  const featuredSlots = new Set([1, 5, 9]);
  const topCards = [];
  const topStudentIds = new Set();
  const desiredTopCount = Math.min(12, sortedCards.length);
  while (topCards.length < desiredTopCount) {
    let candidate = null;
    if (featuredSlots.has(topCards.length) && featuredQueue.length) candidate = pullHomepageCandidate(featuredQueue, topCards, topStudentIds, 12);
    if (!candidate) candidate = pullHomepageCandidate(remaining, topCards, topStudentIds, 12);
    if (!candidate && featuredQueue.length) candidate = featuredQueue.shift();
    if (!candidate && remaining.length) candidate = remaining.shift();
    if (!candidate) break;
    topCards.push(candidate);
    if (topCards.length <= 12) topStudentIds.add(candidate.student.userId);
  }
  const tailPool = [...featuredQueue, ...remaining];
  const tailCards = [];
  while (tailPool.length) {
    const candidate = pullHomepageCandidate(tailPool, topCards.concat(tailCards), new Set(), 0) || tailPool.shift();
    if (!candidate) break;
    tailCards.push(candidate);
  }
  return topCards.concat(tailCards);
}
function getHomepageOrderedServiceCards(){
  const sessionId = getHomepageSessionId();
  const viewerKey = currentUser ? currentUser.id : 'guest';
  const eligibleCards = getEligibleHomepageServiceCards();
  const cardMap = new Map(eligibleCards.map(card => [getHomepageServiceKey(card), card]));
  const signature = Array.from(cardMap.keys()).sort().join('|');
  let cached = null;
  try {
    cached = JSON.parse(sessionStorage.getItem('cogo_homepage_order_v1') || 'null');
  } catch (error) {
    cached = null;
  }
  if (cached && cached.sessionId === sessionId && cached.viewerKey === viewerKey && cached.signature === signature && Array.isArray(cached.order)) {
    return cached.order.map(key => cardMap.get(key)).filter(Boolean);
  }
  const orderedCards = buildHomepageFairOrder(eligibleCards.map(card => scoreHomepageServiceCard(card, sessionId)).sort((a, b) => b.homepageScore - a.homepageScore));
  try {
    sessionStorage.setItem('cogo_homepage_order_v1', JSON.stringify({ sessionId, viewerKey, signature, order: orderedCards.map(card => card.homepageKey) }));
  } catch (error) {}
  return orderedCards;
}
function markHomepageServicesShown(cards=[]){

    const studentKey = card.student.id;
    if (!byStudent.has(studentKey)) byStudent.set(studentKey, new Set());
    byStudent.get(studentKey).add(card.service.id);
  });
  const now = new Date().toISOString();
  let changed = false;
  students.forEach(student => {
    const shownIds = byStudent.get(student.id);
    if (!shownIds || !shownIds.size) return;
    const normalizedServices = getRenderableStudentServices(student).map((service, index) => normalizeStudentServiceRecord(student, service, index));

      if (shownIds.has(service.id)) {

  });

function normalizeStudentServiceRecord(student, service, index=0){

  const baseLocation = student.location || '';

  const baseReviews = index === 0 && Array.isArray(student.reviews) ? student.reviews : [];
  if (typeof service === 'string') {
    return normalizeStudentServiceRecord(student, {
      id:`service_${student.id || 'student'}_${index}`,
      title: service,
      description: index === 0 ? ((student.about || [])[0] || '') : '',
      images: [],
      videoLink: '',
      rate: baseRate,
      location: baseLocation,
      availability: baseAvailability,
      reviews: baseReviews
    }, index);
  }

    user_id: student.userId || student.id || '',
    category_id: (Array.isArray(student.tags) && student.tags[0]) || 'general',
    title: index === 0 ? baseTitle : `Service ${index + 1}`,
    description: index === 0 ? ((student.about || [])[0] || '') : '',

    reviews: baseReviews,

    created_at: student.createdAt || new Date().toISOString(),
    updated_at: student.createdAt || new Date().toISOString(),
    last_shown_at: ''
  }, service || {});
  if ((!record.title || !String(record.title).trim()) && typeof service !== 'string') record.title = index === 0 ? baseTitle : `Service ${index + 1}`;
  if ((!record.description || !String(record.description).trim()) && index === 0) record.description = ((student.about || [])[0] || '');
  if (!Array.isArray(record.images)) record.images = [];
  if (!Array.isArray(record.reviews)) record.reviews = [];
  if (!record.user_id) record.user_id = student.userId || student.id || '';
  record.category_id = record.category_id || record.categoryId || (Array.isArray(record.tags) && record.tags[0]) || (Array.isArray(student.tags) && student.tags[0]) || 'general';
  record.created_at = record.created_at || record.createdAt || student.createdAt || new Date().toISOString();
  record.updated_at = record.updated_at || record.updatedAt || record.created_at;
  record.last_shown_at = record.last_shown_at || record.lastShownAt || '';
  if (!record.status || record.status === 'live') record.status = 'active';
  if (record.is_visible === undefined) record.is_visible = true;
  if (record.is_approved === undefined) record.is_approved = true;
  const reviewCount = Number(record.review_count ?? record.reviewCount ?? (record.reviews.length || 0));
  const avgRating = reviewCount
    ? Number(record.average_rating ?? record.averageRating ?? (record.reviews.reduce((sum, review) => sum + Number(review.rating || 0), 0) / Math.max(reviewCount, 1)))

function getCommunityFeedApplicationCount(postId, applications=getApplications()){
  const countableStatuses = new Set(['pending','applied','offer_sent','offer_pending']);
  return applications.filter(application => application.postId === postId && countableStatuses.has(application.status)).length;
}
function syncCommunityJobApplicationCounts(applications=getApplications()){
  const posts = getPosts();
  let changed = false;
  posts.forEach(post => {
    if (!post.isJob) return;
    const nextCount = getCommunityFeedApplicationCount(post.id, applications);
    if (Number(post.application_count || 0) !== nextCount) {
      post.application_count = nextCount;
      changed = true;
    }
  });
  if (changed) savePosts(posts);
  return posts;
}
function syncCommunityJobStatus(postId, applications=getApplications()){
  if (!postId) return;
  const posts = getPosts();
  const post = posts.find(item => item.id === postId && item.isJob);
  if (!post || ['in_progress','completed'].includes(post.status)) return;
  const relatedApplications = applications.filter(application => application.postId === postId);
  const hasAccepted = relatedApplications.some(application => application.status === 'accepted');
  const hasOfferPending = relatedApplications.some(application => ['offer_sent','offer_pending'].includes(application.status));
  const nextStatus = hasAccepted ? 'closed' : (hasOfferPending ? 'pending' : (post.status === 'closed' ? 'closed' : 'open'));
  if (post.status !== nextStatus) {
    post.status = nextStatus;
    savePosts(posts);
  }
}
function getCommunityFeedStatusLabel(post){
  const applicationCount = Number(post.application_count || 0);
  if (post.status === 'pending') return 'Pending';
  if (post.status === 'open') {
    if (applicationCount > 0) return `${applicationCount} Student${applicationCount === 1 ? '' : 's'} Applied`;
    return 'Open';
  }
  return 'Closed';
}
function isCommunityFeedJobOpen(post){
  return post.status === 'open' || post.status === 'pending';
}
function renderCommunity(){

  const hours = Number(document.getElementById('directJobHours').value || 0);
  const location = (document.getElementById('directJobLocation').value || '').trim();
  if (!title || !scope || !rate || !hours || !location) return toast('Please complete all fields.');
  if (!blockTextCheck(scope)) return;

  const s = getStudents().find(x => x.id === studentId);
  const selectedService = getRenderableStudentServices(s || {}).find(service => service.id === serviceId) || null;
  const apps = getApplications();
  apps.push({
    id: uid('app'),
    postId: null,
    jobTitle: title,
    employerId: currentUser.id,
    employerName: currentUser.name,
    studentUserId: s.userId,
    studentProfileId: s.id,
    studentName: s.name,
    studentServiceId: selectedService?.id || null,
    studentServiceTitle: selectedService?.title || '',
    message: scope,
    rate,
    estimatedHours: hours,
    location,
    source: 'direct_offer',
    status: 'offer_sent',
    createdAt: new Date().toISOString()
  });
  saveApplications(apps);
  pushNotif(s.userId, `You received an offer from ${currentUser.name}: "${title}"`, { type:'dashboard', section:'jobs_bookings', studentJobsTab:'jobs' });
  closeModal();
  toast('Offer sent to student.');
}

function saveStudentProfileForm(profileId=''){
  const students = getStudents();
  const profile = students.find(s => s.id === profileId) || currentStudentProfile();
  if (!profile) return;
  const users = getUsers();
  const user = users.find(u => u.id === currentUser.id);
  const name = (document.getElementById('studentProfileName').value || '').trim();
  const city = (document.getElementById('studentProfileCity').value || '').trim();
  const email = (document.getElementById('studentProfileEmail').value || '').trim();
  if (!name || !city || !email) return toast('Name, location, and email are required.');
  profile.name = name;
  profile.age = Number(document.getElementById('studentProfileAge').value || 0) || profile.age || 17;
  profile.school = (document.getElementById('studentProfileSchool').value || '').trim();
  profile.location = city.includes(',') ? city : `${city}, CA`;
  profile.phone = (document.getElementById('studentProfilePhone').value || '').trim();
  profile.privateEmail = email;
  profile.about = (document.getElementById('studentProfileAbout').value || '').split('\n').map(s => s.trim()).filter(Boolean);
  profile.highlights = (document.getElementById('studentProfileHighlights').value || '').split('\n').map(s => s.trim()).filter(Boolean);
  profile.profileImages = [...studentProfileImagesBuffer];
  if (profile.profileImages[0]) profile.photo = profile.profileImages[0];
  profile.profileVideoLink = (document.getElementById('studentProfileVideoLink').value || '').trim();
  profile.updatedAt = new Date().toISOString();
  if (user) {
    user.name = name;
    user.email = email;
    saveUsers(users);
    setCurrentUser(user);
  }
  saveStudents(students);
  closeModal();
  toast('Profile updated.');
  renderDashboard();
}

function saveStudentServiceForm(serviceIndex=''){
  const students = getStudents();
  const profile = students.find(s => s.id === (currentStudentProfile() || {}).id);
  if (!profile) return;
  profile.services = getRenderableStudentServices(profile).map((service, index) => normalizeStudentServiceRecord(profile, service, index));
  const title = (document.getElementById('studentServiceTitle').value || '').trim();
  const description = (document.getElementById('studentServiceDescription').value || '').trim();
  const videoLink = (document.getElementById('studentServiceVideoLink').value || '').trim();
  const rate = Number(document.getElementById('studentServiceRate').value || 0);
  const availability = (document.getElementById('studentServiceAvailability').value || '').trim();
  const location = (document.getElementById('studentServiceLocation').value || '').trim();
  if (!title || !description || !rate || !availability) return toast('Please complete the required service fields.');
  const service = {
    id: serviceIndex === '' || serviceIndex === null || serviceIndex === undefined || !profile.services[Number(serviceIndex)]
      ? uid('service')
      : profile.services[Number(serviceIndex)].id,
    title,
    description,
    images: [...studentServiceImagesBuffer],
    videoLink,
    rate,
    availability,
    location: location || profile.location || '',
    reviews: (serviceIndex === '' || serviceIndex === null || serviceIndex === undefined || !profile.services[Number(serviceIndex)]) ? [] : (profile.services[Number(serviceIndex)].reviews || [])
  };
  if (serviceIndex === '' || serviceIndex === null || serviceIndex === undefined || !profile.services[Number(serviceIndex)]) profile.services.push(service);
  else profile.services[Number(serviceIndex)] = service;

function submitFinalInvoice(projectId){
  const pList = getProjects();
  const p = pList.find(x => x.id === projectId);
  if (!p) return;
  const actualHours = Number(document.getElementById('finalHours').value || 0);
  if (!actualHours) return toast('Please enter actual hours.');
  const breakdown = calculateCommissionBreakdown(actualHours, p.rate || 0);
  const subtotal = breakdown.workTotal;
  const platformFee = breakdown.employerCommissionAmount;
  const totalDue = breakdown.employerTotal;
  const studentPayout = breakdown.studentPayout;
  const snapshot = p.projectSnapshot || {
    title: p.jobTitle,
    description: p.scope || p.description || '',
    rate: p.rate,
    location: p.location || '',
    estimatedHours: p.estimatedHours
  };
  p.actualHours = actualHours;
  p.finalSubtotal = subtotal;
  p.studentPayout = studentPayout;
  p.studentPlatformFee = breakdown.studentCommissionAmount;
  p.employerPlatformFee = breakdown.employerCommissionAmount;
  p.platformFee = breakdown.employerCommissionAmount;
  p.platformFeeTotal = breakdown.platformFeeTotal;
  p.cogoFee = breakdown.platformFeeTotal;
  p.finalTotal = totalDue;
  p.employerTotal = totalDue;
  p.finalInvoice = {
    title: snapshot.title,
    description: snapshot.description,
    rate: snapshot.rate,
    location: snapshot.location,
    actualHours,
    subtotal,
    studentPayout,
    studentPlatformFee: breakdown.studentCommissionAmount,
    employerPlatformFee: breakdown.employerCommissionAmount,
    platformFeeTotal: breakdown.platformFeeTotal,
    totalDue
  };
  p.status = 'awaiting_employer_approval';
  saveProjects(pList);
  pushNotif(p.employerId, `${currentUser.name} submitted final hours for "${p.jobTitle}". Work Total: $${subtotal.toFixed(2)}. Platform Fee (${formatPercent(breakdown.employerCommissionPct)}): $${breakdown.employerCommissionAmount.toFixed(2)}. Total Payment: $${totalDue.toFixed(2)}.`, { type:'dashboard', section:'applicants_projects', employerTab:'projects' });
  sendSystemMessage(p.employerId, p.employerName, `Final invoice submitted for "${p.jobTitle}": Work Total $${subtotal.toFixed(2)}, Platform Fee $${breakdown.employerCommissionAmount.toFixed(2)}, Total Payment $${totalDue.toFixed(2)}.`, p.id);
  closeModal();
  toast('Final invoice submitted for employer approval.');
  renderDashboard();
}

  if (!confirm('Are you sure you want to decline this applicant?')) return;

function approveFinalInvoice(projectId){
  const projects = getProjects();
  const p = projects.find(x => x.id === projectId);
  if (!p) return;
  const now = new Date().toISOString();
  const finalBreakdown = calculateCommissionBreakdown(p.actualHours || p.estimatedHours || 0, p.rate || 0);
  p.status = 'completed';
  p.completedAt = now;
  p.escrowStatus = 'released';
  p.paid = true;
  p.paymentReleasedAt = now;
  p.finalSubtotal = finalBreakdown.workTotal;
  p.studentPayout = finalBreakdown.studentPayout;
  p.studentPlatformFee = finalBreakdown.studentCommissionAmount;
  p.employerPlatformFee = finalBreakdown.employerCommissionAmount;
  p.platformFee = finalBreakdown.employerCommissionAmount;
  p.platformFeeTotal = finalBreakdown.platformFeeTotal;
  p.finalTotal = finalBreakdown.employerTotal;
  p.employerTotal = finalBreakdown.employerTotal;

  const baseline = calculateCommissionBreakdown(p.estimatedHours || 0, p.rate || 0).employerTotal;
  const diff = Number((p.finalTotal - baseline).toFixed(2));
  p.reconciliation = diff === 0
    ? `Final invoice approved at $${p.finalTotal}.`
    : diff < 0
      ? `Final invoice approved at $${p.finalTotal}, which is $${Math.abs(diff).toFixed(2)} below the estimated employer total.`
      : `Final invoice approved at $${p.finalTotal}, which is $${diff.toFixed(2)} above the estimated employer total.`;

  const students = getStudents();
  const student = students.find(s => s.userId === p.studentUserId);
  if (student) {
    student.balance = Number((Number(student.balance || 0) + Number(p.studentPayout || 0)).toFixed(2));
    saveStudents(students);
  }
  const finance = getFinance();
  finance.cogoCommission = Number((Number(finance.cogoCommission || 0) + Number(p.platformFeeTotal || 0)).toFixed(2));
  finance.completedProjects = Number(finance.completedProjects || 0) + 1;
  saveFinance(finance);

  const transactions = getTransactions();
  const transactionId = uid('tx');
  transactions.unshift({
    id: transactionId,
    transaction_id: transactionId,
    student_id: p.studentUserId,
    studentProfileId: p.studentProfileId || null,
    studentServiceId: p.studentServiceId || null,
    studentServiceTitle: p.studentServiceTitle || '',
    job_id: p.id,
    employer_id: p.employerId,
    employerName: p.employerName,
    studentName: p.studentName,
    job_title: p.jobTitle,
    hourly_rate: Number(p.rate || 0),
    hours_worked: Number(p.actualHours || 0),
    work_total: Number(p.finalSubtotal || 0),
    total_amount: Number(p.finalTotal || 0),
    employer_platform_fee: Number(p.employerPlatformFee || 0),
    student_platform_fee: Number(p.studentPlatformFee || 0),
    platform_fee_total: Number(p.platformFeeTotal || 0),
    platform_fee: Number(p.studentPlatformFee || 0),
    payout_amount: Number(p.studentPayout || 0),
    status: 'paid',
    status_history: ['processing','paid'],
    date_started: p.createdAt || now,
    date_completed: p.completedAt || now,
    date_paid: now
  });
  saveTransactions(transactions);

  const posts = getPosts();
  const post = posts.find(x => x.id === p.postId || x.id === p.job_id);
  if (post) {
    post.status = 'completed';
    savePosts(posts);
  }

  saveProjects(projects);
  pushNotif(p.employerId, `You paid $${money(p.finalTotal || 0)} total for ${p.studentName}'s project. Work Total: $${money(p.finalSubtotal || 0)}. Platform Fee: $${money(p.employerPlatformFee || 0)}. You can view this transaction in the My Transactions section of your Dashboard.`, { type:'dashboard', section:'transactions' });
  pushNotif(p.studentUserId, `You’ve been paid $${money(p.studentPayout || 0)} for '${p.jobTitle}' after a $${money(p.studentPlatformFee || 0)} Platform Fee. You can view this transaction in the My Transactions section of your Dashboard.`, { type:'dashboard', section:'transactions' });
  sendSystemMessage(p.studentUserId, p.studentName, `You’ve been paid $${money(p.studentPayout || 0)} for '${p.jobTitle}'. Work total: $${money(p.finalSubtotal || 0)}. Platform Fee: $${money(p.studentPlatformFee || 0)}. You can view this transaction in the My Transactions section of your Dashboard.`, p.id);
  sendSystemMessage(p.employerId, p.employerName, `Payment completed for '${p.jobTitle}'. Work Total: $${money(p.finalSubtotal || 0)}. Platform Fee: $${money(p.employerPlatformFee || 0)}. Total Payment: $${money(p.finalTotal || 0)}. You can view this transaction in the My Transactions section of your Dashboard.`, p.id);
  pushAdminCommissionNotification(p);
  pushNotif(p.employerId, `Leave a review for ${p.studentName}`, { type:'dashboard', section:'applicants_projects', employerTab:'projects' });
  closeModal();
  toast('Payment released and project completed.');
  renderDashboard();
}

function submitReview(projectId){
  const projects = getProjects();
  const p = projects.find(x => x.id === projectId);
  if (!p) return toast('Project not found.');
  if (p.reviewSubmitted) return toast('Review already submitted.');
  const ratingEl = document.getElementById('reviewRating');
  const commentEl = document.getElementById('reviewComment');
  if (!ratingEl || !commentEl) return toast('Review form is not available. Please reopen it and try again.');
  const students = getStudents();
  const student = students.find(s => s.id === p.studentProfileId) || students.find(s => s.userId === p.studentUserId && s.status !== 'archived');
  if (!student) return toast('Student profile not found.');
  const rating = Number(ratingEl.value || 5);
  const comment = (commentEl.value || '').trim();
  const review = { id: uid('review'), reviewerId: currentUser.id, reviewerName: currentUser.publicName || currentUser.name, rating, comment, projectId, createdAt: new Date().toISOString(), studentServiceId: p.studentServiceId || null };
  student.services = getRenderableStudentServices(student).map((service, index) => normalizeStudentServiceRecord(student, service, index));
  const services = student.services || [];
  const targetService = services.find(service => service.id === p.studentServiceId) || services[0] || null;
  if (targetService) {
    targetService.reviews = targetService.reviews || [];
    targetService.reviews.unshift(review);
    if (!p.studentServiceId) p.studentServiceId = targetService.id;
    if (!p.studentServiceTitle) p.studentServiceTitle = targetService.title || '';
  } else {
    student.reviews = student.reviews || [];
    student.reviews.unshift(review);
  }
  p.reviewSubmitted = true;
  saveStudents(students);
  saveProjects(projects);
  try {
    sendSystemMessage(
      p.studentUserId,
      p.studentName,
      `${currentUser.name} left a ${rating}/5 review on your ${(p.studentServiceTitle || student.title || 'student service')}${comment ? `: ${comment}` : '.'}`,
      p.id
    );
  } catch (err) {
    console.error('Review notification failed', err);
  }
  closeModal();
  toast('Review submitted.');
  renderDashboard();
}

function renderMessages(el){
  const all = getMessages();
  const me = currentUser.id;
  const threads = {};

  all.forEach(m => {
    const partnerId = m.fromId === me ? m.toId : (m.toId === me ? m.fromId : null);
    if (!partnerId) return;
    if (!threads[partnerId] || new Date(m.createdAt) > new Date(threads[partnerId].createdAt)) {
      threads[partnerId] = {
        partnerId,
        partnerName: m.fromId === me ? m.toName : m.fromName,
        preview: m.content,
        createdAt: m.createdAt,
        unread: 0
      };
    }
    if (m.toId === me && !m.read) threads[partnerId].unread++;
  });

  const threadList = Object.values(threads).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));

  if (!activeThreadUserId && threadList.length) activeThreadUserId = threadList[0].partnerId;

  el.innerHTML = `
    <div class="section-title">Messages</div>
    <div class="msg-shell">
      <div class="thread-list">
        ${threadList.length ? threadList.map(t => `
          <div class="thread ${t.unread ? 'unread' : ''}" onclick="activeThreadUserId='${esc(t.partnerId)}';renderDashboard()">
            <div style="display:flex;align-items:center;gap:6px;font-weight:800">${renderMessagePartnerName(t.partnerId, t.partnerName, true)} ${t.unread ? `<span style="color:#ef4444">•</span>` : ''}</div>
            <div class="muted small">${esc(t.preview.slice(0,60))}</div>
          </div>
        `).join('') : `<div class="form-card muted">No messages yet.</div>`}
      </div>
      <div class="thread-view">
        ${activeThreadUserId ? renderThreadView(activeThreadUserId) : `<div class="form-card muted">Select a conversation.</div>`}

    </div>
  `;
}
function renderThreadView(userId){
  const partner = getUserById(userId) || { id:userId, name:'User' };
  const activeProject = getProjectForUsers(currentUser.id, userId);
  const all = getMessages();
  let changed = false;
  all.forEach(m => {
    if (m.toId === currentUser.id && m.fromId === userId && !m.read){
      m.read = true;
      changed = true;
    }
  });
  if (changed) {
    saveMessages(all);
    renderNav();

  const partnerMsgs = all
    .filter(m => (m.fromId === currentUser.id && m.toId === userId) || (m.fromId === userId && m.toId === currentUser.id));
  const msgs = partnerMsgs.sort((a,b) => new Date(a.createdAt)-new Date(b.createdAt));
  const projectBreakdown = activeProject
    ? calculateCommissionBreakdown(activeProject.actualHours || activeProject.estimatedHours || 0, activeProject.rate || 0)
    : null;
  const projectBreakdownHtml = !activeProject || !projectBreakdown

      ? `<div class="card" style="padding:12px 14px;margin:0 12px 10px;background:#f8fafc;border:1px solid var(--border)">${renderStudentCommissionBreakdownHtml(projectBreakdown, activeProject.actualHours ? 'Actual' : 'Estimated')}<div class="small muted" style="margin-top:6px">Work Total, Platform Fee, and final payout stay visible here for transparency.</div></div>`
      : `<div class="card" style="padding:12px 14px;margin:0 12px 10px;background:#f8fafc;border:1px solid var(--border)">${renderEmployerCommissionBreakdownHtml(projectBreakdown, activeProject.actualHours ? 'Actual' : 'Estimated')}<div class="small muted" style="margin-top:6px">Work Total, Platform Fee, and final payment stay visible here for transparency.</div></div>`;

  return `
    <div style="padding:14px 16px;border-bottom:1px solid var(--border);font-weight:800">${renderMessagePartnerName(partner.id, partner.name)}${activeProject ? `<div class="muted small" style="font-weight:600;margin-top:4px">Active project: ${esc(activeProject.jobTitle)}</div>` : ''}</div>
    ${projectBreakdownHtml}
    <div class="messages" id="messages-box">
      ${msgs.length ? msgs.map(m => `
        <div class="bubble ${m.fromId === currentUser.id ? 'mine' : 'theirs'}">
          ${esc(m.content)}

        </div>
      `).join('') : `<div class="muted small">No messages yet. Say hello.</div>`}
    </div>
    <div class="msg-compose">
      <input id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter'){sendMessageToActive()}">
      <button class="btn btn-blue btn-sm" onclick="sendMessageToActive()">Send</button>
    </div>
  `;
}

function getAdminRoleValueForUser(user){
  if (!user) return 'student';
  if (user.role === 'admin') return 'admin';
  if (user.role === 'student') return 'student';
  return user.type === 'neighbor' ? 'neighbor' : 'employer';
}
function applyAdminRoleValue(user, roleValue){
  if (roleValue === 'admin') {
    user.role = 'admin';
    delete user.type;
  } else if (roleValue === 'student') {
    user.role = 'student';
    delete user.type;
  } else {
    user.role = 'employer';
    user.type = roleValue === 'neighbor' ? 'neighbor' : 'business';
  }
  return user;
}
function roleStatusPill(status){
  const active = status !== 'suspended';
  return `<span style="display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:.78rem;font-weight:700;background:${active ? '#dcfce7' : '#fee2e2'};color:${active ? '#166534' : '#991b1b'}">${active ? 'Active' : 'Suspended'}</span>`;
}

function saveAdminUserRole(userId){

  const user = users.find(item => item.id === userId);
  if (!user) return toast('User not found.');
  const nextRole = document.getElementById('adminEditUserRole').value || 'student';
  if (user.id === currentUser.id && nextRole !== 'admin') return toast('You cannot change your own admin role.');
  const previousRole = getUserRoleLabel(user);
  applyAdminRoleValue(user, nextRole);
  saveUsers(users);
  logAdminAction('role_changed', { targetUserId: user.id, targetUserName: user.name, fromRole: previousRole, toRole: getUserRoleLabel(user) });
  closeModal();
  toast('User role updated.');
  renderDashboard();

function toggleAdminUserStatus(userId){

  const user = users.find(item => item.id === userId);
  if (!user) return toast('User not found.');
  if (user.id === currentUser.id) return toast('You cannot suspend your own admin account.');
  user.status = user.status === 'suspended' ? 'active' : 'suspended';
  saveUsers(users);
  logAdminAction(user.status === 'suspended' ? 'user_suspended' : 'user_reactivated', { targetUserId: user.id, targetUserName: user.name, targetRole: getUserRoleLabel(user) });
  toast(user.status === 'suspended' ? 'User suspended.' : 'User reactivated.');

function deleteAdminUser(userId){
  const users = getUsers();
  const user = users.find(item => item.id === userId);
  if (!user) return toast('User not found.');
  if (user.id === currentUser.id) return toast('You cannot delete your own admin account.');
  if (!confirm(`Delete ${user.name}? This removes the user from active platform access.`)) return;
  user.archived = true;
  user.status = 'archived';
  user.archivedAt = new Date().toISOString();
  saveUsers(users);
  const students = getStudents();
  let studentsChanged = false;
  students.forEach(profile => {
    if (profile.userId === user.id && profile.status !== 'archived') {
      profile.status = 'archived';
      profile.archivedAt = new Date().toISOString();
      profile.archivedServices = getRenderableStudentServices(profile);
      studentsChanged = true;
    }
  });
  if (studentsChanged) saveStudents(students);
  logAdminAction('user_deleted', { targetUserId: user.id, targetUserName: user.name, targetRole: getUserRoleLabel(user) });
  toast('User deleted.');
  renderDashboard();
}

}
function getCurrentUserTransactions(){
  const all = getTransactions();
  if (currentUser.role === 'admin') return all;
  if (currentUser.role === 'employer') return all.filter(tx => tx.employer_id === currentUser.id);
  return all.filter(tx => tx.student_id === currentUser.id);
}
function renderTransactionsPanel(){
  const wrap = document.getElementById('transactions-panel');
  if (!wrap) return;
  const isAdmin = currentUser.role === 'admin';
  const isEmployer = currentUser.role === 'employer';
  const title = isAdmin ? 'Transactions' : 'My Transactions';
  const helper = isAdmin
    ? 'Admin view shows total Platform Fee collected from both sides.'
    : isEmployer
      ? 'Review completed job payments, including your Platform Fee and final payment.'
      : 'Review completed job payouts, including your Platform Fee and final payout.';
  wrap.innerHTML = `
    <div class="card form-card" style="margin-top:18px">
      <div class="split" style="align-items:flex-start;margin-bottom:14px">
        <div>
          <div class="section-title" style="margin:0 0 6px">${title}</div>
          <div class="small muted">${helper}</div>
          ${currentUser.role === 'student' ? `<div class="small muted">Stripe connection and live balance are placeholders for now.</div>` : ''}
        </div>
        <div style="min-width:260px">
          <input id="transactionsSearch" placeholder="Search by date, amount, job title, or name" value="${esc(settingsTransactionQuery)}" oninput="settingsTransactionQuery=this.value;renderTransactionsResults()">
        </div>
      </div>
      <div id="transactions-summary"></div>
      <div id="transactions-results"></div>
    </div>
  `;
  renderTransactionsResults();
}
function renderTransactionsResults(){
  const summaryWrap = document.getElementById('transactions-summary');
  const resultsWrap = document.getElementById('transactions-results');
  if (!summaryWrap || !resultsWrap) return;
  const query = (settingsTransactionQuery || '').trim().toLowerCase();
  const rows = getCurrentUserTransactions().filter(tx => {
    const haystack = [
      tx.job_title,
      tx.employerName,
      tx.studentName,
      tx.payout_amount,
      tx.total_amount,
      tx.work_total,
      tx.student_platform_fee,
      tx.employer_platform_fee,
      tx.platform_fee_total,
      tx.hourly_rate,
      tx.hours_worked,
      formatTransactionDate(tx.date_completed),
      formatTransactionDate(tx.date_paid)
    ].join(' ').toLowerCase();
    return !query || haystack.includes(query);
  }).sort((a,b) => new Date(b.date_paid || b.date_completed || 0) - new Date(a.date_paid || a.date_completed || 0));

  const isAdmin = currentUser.role === 'admin';
  const isEmployer = currentUser.role === 'employer';
  const totalWork = rows.reduce((sum, tx) => sum + Number(tx.work_total || 0), 0);
  const totalPayout = rows.reduce((sum, tx) => sum + Number(tx.payout_amount || 0), 0);
  const totalPaid = rows.reduce((sum, tx) => sum + Number(tx.total_amount || 0), 0);
  const totalPlatformFees = rows.reduce((sum, tx) => sum + Number(tx.platform_fee_total || 0), 0);
  const roleSummary = isAdmin
    ? `<div class="card" style="padding:14px;margin-bottom:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Total Platform Fees</div><div style="font-weight:800;font-size:1.2rem">$${money(totalPlatformFees)}</div></div>`
    : isEmployer
      ? `<div class="card" style="padding:14px;margin-bottom:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Total Paid</div><div style="font-weight:800;font-size:1.2rem">$${money(totalPaid)}</div></div>`
      : `<div class="card" style="padding:14px;margin-bottom:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Total Earned</div><div style="font-weight:800;font-size:1.2rem">$${money(totalPayout)}</div></div>`;
  summaryWrap.innerHTML = isAdmin ? `
    <div class="grid" style="grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px">
      <div class="card" style="padding:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Transactions</div><div style="font-weight:800;font-size:1.2rem">${rows.length}</div></div>
      <div class="card" style="padding:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Total Work</div><div style="font-weight:800;font-size:1.2rem">$${money(totalWork)}</div></div>
      ${roleSummary}
    </div>
  ` : `
    <div class="grid" style="grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px">
      <div class="card" style="padding:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Transactions</div><div style="font-weight:800;font-size:1.2rem">${rows.length}</div></div>
      ${roleSummary}
    </div>
  `;

  const tableHead = isAdmin ? `
      <tr style="text-align:left;border-bottom:1px solid var(--border)">
        <th style="padding:10px 8px">Date Completed</th>
        <th style="padding:10px 8px">Job Title</th>
        <th style="padding:10px 8px">Student Rate</th>
        <th style="padding:10px 8px">Final Hours Worked</th>
        <th style="padding:10px 8px">Work Total</th>
        <th style="padding:10px 8px">Final Commission</th>
      </tr>
    ` : isEmployer ? `
      <tr style="text-align:left;border-bottom:1px solid var(--border)">
        <th style="padding:10px 8px">Date Completed</th>
        <th style="padding:10px 8px">Job Title</th>
        <th style="padding:10px 8px">Student Rate</th>
        <th style="padding:10px 8px">Final Hours Worked</th>
        <th style="padding:10px 8px">Work Total</th>
        <th style="padding:10px 8px">Platform Fee</th>
        <th style="padding:10px 8px">Final Payment</th>
      </tr>
    ` : `
      <tr style="text-align:left;border-bottom:1px solid var(--border)">
        <th style="padding:10px 8px">Date Completed</th>
        <th style="padding:10px 8px">Job Title</th>
        <th style="padding:10px 8px">Student Rate</th>
        <th style="padding:10px 8px">Final Hours Worked</th>
        <th style="padding:10px 8px">Work Total</th>
        <th style="padding:10px 8px">Platform Fee</th>
        <th style="padding:10px 8px">Final Payout</th>
      </tr>
    `;
  const tableRows = rows.map(tx => {
    const platformFeeLabel = isAdmin
      ? `$${esc(Number(tx.platform_fee_total || 0).toFixed(2))}`
      : isEmployer
        ? `${esc(formatPercent(getPaymentSettings().employerCommissionPct))} · +$${esc(Number(tx.employer_platform_fee || 0).toFixed(2))}`
        : `${esc(formatPercent(getPaymentSettings().studentCommissionPct))} · -$${esc(Number(tx.student_platform_fee || tx.platform_fee || 0).toFixed(2))}`;
    const finalValue = isAdmin
      ? `$${esc(Number(tx.platform_fee_total || 0).toFixed(2))}`
      : isEmployer
        ? `$${esc(Number(tx.total_amount || 0).toFixed(2))}`
        : `$${esc(Number(tx.payout_amount || 0).toFixed(2))}`;
    return `
      <tr style="border-bottom:1px solid var(--border)">
        <td style="padding:12px 8px">${esc(formatTransactionDate(tx.date_completed))}</td>
        <td style="padding:12px 8px">${esc(tx.job_title || '')}</td>
        <td style="padding:12px 8px">$${esc(Number(tx.hourly_rate || 0).toFixed(2))}/hr</td>
        <td style="padding:12px 8px">${esc(tx.hours_worked || 0)} hrs</td>
        <td style="padding:12px 8px">$${esc(Number(tx.work_total || 0).toFixed(2))}</td>
        <td style="padding:12px 8px">${platformFeeLabel}</td>
        ${isAdmin ? '' : `<td style="padding:12px 8px">${finalValue}</td>`}
      </tr>
    `;
  }).join('');

  resultsWrap.innerHTML = rows.length ? `
    <div style="overflow:auto">
      <table style="width:100%;border-collapse:collapse;font-size:.92rem">
        <thead>${tableHead}</thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  ` : `<div class="muted">No transactions yet.</div>`;
}
function renderTransactionsSection(el){
  el.innerHTML = `<div id="transactions-panel"></div>`;
  renderTransactionsPanel();
}
function renderSettings(el){
  const paymentMethod = getEmployerPaymentMethod(currentUser.id);
  el.innerHTML = `
    <div class="section-title">Settings</div>
    <div class="card form-card" style="margin-top:18px;max-width:720px">
      <div style="font-weight:800;font-size:1.05rem;margin-bottom:12px">My Password</div>
      <div class="field"><label>Current Password</label><input id="currentPassword" type="password" placeholder="Current password"></div>
      <div class="field"><label>New Password</label><input id="newPassword" type="password" placeholder="New password"></div>
      <div class="field"><label>Confirm New Password</label><input id="confirmNewPassword" type="password" placeholder="Confirm new password"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        <button class="btn btn-blue" onclick="changePassword()">Change Password</button>
        <button class="btn btn-danger" onclick="deleteCurrentProfile()">Delete Profile</button>
      </div>
      <div class="warning" style="margin-bottom:14px">If you delete your profile, your profile and all associated services will be permanently removed and will no longer be visible to other users.</div>
      ${currentUser.role === 'employer' ? (canViewBillingDetails() ? `
        <div class="small muted" style="margin-bottom:8px">Payment Method</div>
        <div class="field"><input value="${paymentMethod ? esc(paymentMethod.brand + ' •••• ' + paymentMethod.last4) : 'Visa •••• 4242'}" readonly></div>
        <button class="btn btn-outline" onclick="openPaymentMethodModal()">Update Payment Method</button>
      ` : `<div class="warning">Billing details are hidden while Admin is viewing as this user.</div>`) : ''}
    </div>
  `;
}
function changePassword(){
  const users = getUsers();
  const user = users.find(x => x.id === currentUser.id);
  if (!user) return;
  const currentPassword = document.getElementById('currentPassword').value || '';
  const newPassword = document.getElementById('newPassword').value || '';
  const confirmNewPassword = document.getElementById('confirmNewPassword').value || '';
  if (currentPassword !== user.password) return toast('Current password is incorrect.');
  if (!newPassword || newPassword.length < 6) return toast('New password must be at least 6 characters.');
  if (newPassword !== confirmNewPassword) return toast('New passwords do not match.');
  user.password = newPassword;
  saveUsers(users);
  setCurrentUser(user);
  toast('Password updated.');
  renderSettings(document.getElementById('dash-main'));
}
function deleteCurrentProfile(){
  if (!confirm('If you delete your profile, your profile and all associated services will be permanently removed and will no longer be visible to other users.')) return;
  const users = getUsers();
  const user = users.find(x => x.id === currentUser.id);
  if (!user) return;
  user.archived = true;
  user.archivedAt = new Date().toISOString();
  saveUsers(users);
  if (currentUser.role === 'student') {
    const students = getStudents();
    students.filter(s => s.userId === currentUser.id).forEach(s => {
      s.status = 'archived';
      s.archivedAt = new Date().toISOString();
      s.archivedServices = (s.services || []).map(service => Object.assign({}, service));
      s.services = [];
    });
    saveStudents(students);
  }
  signOut();
  toast('Profile deleted from public view.');
}

// ---------- Init ----------
seedData();
loadCurrentUser();
renderPage();
</script>
</body>
</html>
