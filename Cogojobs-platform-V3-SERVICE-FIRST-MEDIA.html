    normalized.businessProfile.logo = upsertImageRecord(normalized.businessProfile.logo, { source:'business_logo', entity_type:'business', entity_id: normalized.id || '', owner_id: normalized.id || '' });
  }
  if (normalized.photo) normalized.profile_image_id = normalized.profile_image_id || normalized.photo;
  if (normalized.businessProfile?.logo) normalized.businessProfile.image_id = normalized.businessProfile.image_id || normalized.businessProfile.logo;
  if (!normalized.name) normalized.name = [normalized.firstName, normalized.lastName].filter(Boolean).join(' ').trim() || normalized.email || 'User';
  if (!normalized.createdAt) normalized.createdAt = new Date().toISOString();
  if (!normalized.status) normalized.status = normalized.archived ? 'archived' : 'active';
  if (!Object.prototype.hasOwnProperty.call(normalized, 'lastLogin')) normalized.lastLogin = null;
  if (normalized.role === 'employer' && !normalized.type) normalized.type = 'business';
  return normalized;
}
function getUsers(){
  const users = ensureArray(ls('cogo_users'));
  let changed = false;
  const normalized = users.map(user => {
    const next = normalizeUserRecord(user);
    if (JSON.stringify(next) !== JSON.stringify(user)) changed = true;
    return next;
  });
  if (changed) ls('cogo_users', normalized);
  return normalized;
}
function saveUsers(v){ ls('cogo_users', ensureArray(v).map(normalizeUserRecord)); }
function looksLikeImageSource(value=''){
  const raw = String(value || '').trim();
  if (!raw) return false;
  return /^data:image\//i.test(raw)
    || /^blob:/i.test(raw)
    || /^https?:\/\//i.test(raw)
    || /^\/\//.test(raw)
    || /\.(png|jpe?g|gif|webp|svg|avif)(\?|#|$)/i.test(raw);
}
function isImageRecordId(value=''){
  return /^img_/i.test(String(value || '').trim());
}
function normalizeImageRecord(image){
  const normalized = Object.assign({
    id: uid('img'),
    url: '',
    thumbnail_url: '',
    alt: '',
    source: 'library',
    entity_type: '',
    entity_id: '',
    owner_id: '',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  }, image || {});
  normalized.id = String(normalized.id || uid('img'));
  normalized.url = String(normalized.url || '').trim();
  normalized.thumbnail_url = String(normalized.thumbnail_url || normalized.thumb_url || normalized.url || '').trim() || normalized.url;
  normalized.alt = String(normalized.alt || '').trim();
  normalized.updatedAt = normalized.updatedAt || new Date().toISOString();
  normalized.createdAt = normalized.createdAt || normalized.updatedAt;
  return normalized;
}
function getImages(){
  const images = ensureArray(ls('cogo_images'));
  let changed = false;
  const normalized = images.map(image => {
    const next = normalizeImageRecord(image);
    if (JSON.stringify(next) !== JSON.stringify(image)) changed = true;
    return next;
  }).filter(image => image.url);
  if (changed) ls('cogo_images', normalized);
  return normalized;
}
function saveImages(images){ ls('cogo_images', ensureArray(images).map(normalizeImageRecord).filter(image => image.url)); }
function getImageById(imageId=''){
  return getImages().find(image => String(image.id) === String(imageId)) || null;
}
function findImageByUrl(url=''){
  const clean = String(url || '').trim();
  if (!clean) return null;
  return getImages().find(image => image.url === clean || image.thumbnail_url === clean) || null;
}
function upsertImageRecord(value, meta={}){
  if (!value) return '';
  if (typeof value === 'object' && value.id && !value.url) return String(value.id);
  if (typeof value === 'object' && value.id && value.url) {
    const existing = getImageById(value.id);
    if (existing) return existing.id;
    value = value.url;
  }
  const raw = String(value || '').trim();
  if (!raw) return '';
  if (isImageRecordId(raw)) return raw;
  if (!looksLikeImageSource(raw)) return raw;
  const existing = findImageByUrl(raw);
  if (existing) return existing.id;
  const images = getImages();
  const record = normalizeImageRecord(Object.assign({ url: raw, thumbnail_url: raw }, meta));
  images.unshift(record);
  saveImages(images);
  return record.id;
}
function upsertImageRecords(values=[], meta={}){
  return [...new Set((Array.isArray(values) ? values : []).map(value => upsertImageRecord(value, meta)).filter(Boolean))];
}
function getImageView(source='', variant='full'){
  if (!source) return null;
  if (typeof source === 'object' && source.url) {
    const image = normalizeImageRecord(source);
    return Object.assign({}, image, { url: variant === 'thumb' ? (image.thumbnail_url || image.url) : image.url });
  }
  const raw = String(source || '').trim();
  if (!raw) return null;
  const stored = isImageRecordId(raw) ? getImageById(raw) : null;
  if (stored) return Object.assign({}, stored, { url: variant === 'thumb' ? (stored.thumbnail_url || stored.url) : stored.url });
  if (looksLikeImageSource(raw)) return { id:'', url: raw, thumbnail_url: raw, alt:'' };
  return null;
}
function getImageViews(values=[], variant='full'){
  return (Array.isArray(values) ? values : []).map(value => getImageView(value, variant)).filter(Boolean);
}
function renderManagedImage(source='', alt='', style='', variant='full', extraAttrs='loading="lazy"'){
  const image = getImageView(source, variant);
  if (!image || !image.url) return '';
  return `<img src="${esc(image.url)}" alt="${esc(alt)}" style="${style}" ${extraAttrs}>`;
}
function addImageIdToList(list=[], imageId='', limit=3){
  const next = Array.isArray(list) ? [...list] : [];
  const cleanId = String(imageId || '').trim();
  if (!cleanId) return next;
  if (!next.includes(cleanId)) next.push(cleanId);
  return next.slice(0, limit);
}
function removeImageIdFromList(list=[], imageId=''){
  return (Array.isArray(list) ? list : []).filter(value => String(value) !== String(imageId));
}
function canUseImageLibrary(){
  return !!(currentUser && (currentUser.role === 'admin' || isAdminImpersonating()));
}
function normalizeBlogPostRecord(post){
  const normalized = Object.assign({
    id: uid('blog'),
    date: new Date().toISOString(),
    slug: '',
    link: '',
    title: '',
    excerpt: '',
    content: '',
    authorName: 'CoGo Team',
    image_id: '',
    featuredImage: '',
    articleMediaImage: '',
    entity_images: [],
    images: [],
    video_url: '',
    status: 'published',
    publishRequested: true,
    updatedAt: null
  }, post || {});
  normalized.id = String(normalized.id || uid('blog'));
  if (!normalized.image_id && normalized.featuredImage) normalized.image_id = normalized.featuredImage;
  normalized.image_id = upsertImageRecord(normalized.image_id, { source:'article_featured', entity_type:'article', entity_id: normalized.id || '' });
  normalized.featuredImage = normalized.image_id || '';
  if (!normalized.articleMediaImage && normalized.article_media) normalized.articleMediaImage = normalized.article_media;
  if (!normalized.articleMediaImage && Array.isArray(normalized.entity_images) && normalized.entity_images[0]) normalized.articleMediaImage = normalized.entity_images[0];
  normalized.articleMediaImage = upsertImageRecord(normalized.articleMediaImage, { source:'article_media', entity_type:'article', entity_id: normalized.id || '' });
  const rawImages = Array.isArray(normalized.entity_images) && normalized.entity_images.length ? normalized.entity_images : normalized.images;
  normalized.entity_images = upsertImageRecords(rawImages, { source:'article_gallery', entity_type:'article', entity_id: normalized.id || '' });
  normalized.images = [...normalized.entity_images];
  if (!normalized.video_url && normalized.videoLink) normalized.video_url = normalized.videoLink;
  delete normalized.videoLink;
  if (post && post.publishRequested == null) normalized.publishRequested = normalized.status !== 'draft';
  return normalized;
}
function getBlogPosts(){
  const stored = ls('cogo_blog_posts');
  if (Array.isArray(stored) && stored.length) return stored.map(normalizeBlogPostRecord);
  const seeded = BLOG_POSTS.map(post => normalizeBlogPostRecord(Object.assign({}, post, { status:'published', publishRequested:true, images:[], video_url:'', updatedAt:post.date })));
  ls('cogo_blog_posts', seeded);
  return seeded;
}
function saveBlogPosts(posts){ ls('cogo_blog_posts', ensureArray(posts).map(normalizeBlogPostRecord)); }
function getBlogPostStatus(post){
  const publishDate = post && post.date ? new Date(post.date).getTime() : Date.now();
  if (!post || post.publishRequested === false) return 'draft';
  return publishDate <= Date.now() ? 'published' : 'draft';
}
function getBlogPostStatusLabel(post){
  return getBlogPostStatus(post) === 'published' ? 'Published' : 'Draft';
}
function getPublicBlogPosts(){
  return getBlogPosts().filter(post => getBlogPostStatus(post) === 'published').sort((a,b) => new Date(b.date) - new Date(a.date));
}
function normalizeStudentRecord(student){
  const normalized = Object.assign({
    profile_image_id: '',
    profileImages: [],
    video_url: '',
    services: []
  }, student || {});
  if (!normalized.profile_image_id && normalized.photo) normalized.profile_image_id = normalized.photo;
  normalized.profile_image_id = upsertImageRecord(normalized.profile_image_id, { source:'profile', entity_type:'student', entity_id: normalized.id || '', owner_id: normalized.userId || '' });
  const rawProfileImages = Array.isArray(normalized.profileImages) && normalized.profileImages.length
    ? normalized.profileImages
    : (normalized.profile_image_id ? [normalized.profile_image_id] : []);
  normalized.profileImages = upsertImageRecords(rawProfileImages, { source:'profile_gallery', entity_type:'student', entity_id: normalized.id || '', owner_id: normalized.userId || '' });
  if (!normalized.profile_image_id && normalized.profileImages[0]) normalized.profile_image_id = normalized.profileImages[0];
  normalized.photo = normalized.profile_image_id || '';
  if (!normalized.video_url && normalized.profileVideoLink) normalized.video_url = normalized.profileVideoLink;
  delete normalized.profileVideoLink;
  normalized.services = (Array.isArray(normalized.services) ? normalized.services : []).map((service, index) => normalizeStudentServiceRecord(normalized, service, index));
  return normalized;
}

  return String(value || '').toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 120);

function formatDateTimeLocalInput(value=''){
  if (!value) return '';
  const date = new Date(value);

  return new Date(date.getTime() - (date.getTimezoneOffset() * 60000)).toISOString().slice(0,16);

function migrateLegacyData(){
  const users = ensureArray(ls('cogo_users'));
  let usersChanged = false;
  users.forEach(user => {
    if (user.role === 'employer') {
      const fullName = String(user.name || '').trim() || 'User';
      const parts = fullName.split(' ').filter(Boolean);
      const firstName = user.firstName || parts[0] || 'User';
      const lastName = user.lastName || (parts[1] || '');
      const lastInitial = (lastName || 'L').slice(0,1).toUpperCase();
      if (!user.firstName) { user.firstName = firstName; usersChanged = true; }
      if (!user.lastName) { user.lastName = lastName; usersChanged = true; }
      if (!user.publicName) { user.publicName = `${firstName} ${lastInitial}.`; usersChanged = true; }
      if (!user.city && user.address) { user.city = extractCity(user.address); usersChanged = true; }
      if (user.type === 'business' && !user.businessProfile) {
        user.businessProfile = {
          name: user.company || `${firstName}'s Business`,
          logo: '',
          about: user.company ? `${user.company} on CoGo City.` : 'Business profile on CoGo City.',
          phone: user.phone || '',
          address: user.address || '',
          city: user.city || extractCity(user.address || ''),
          tin: ''
        };
        usersChanged = true;
      }
    }
  });
  if (usersChanged) ls('cogo_users', users);

  const students = ensureArray(ls('cogo_students'));
  let studentsChanged = false;
  students.forEach(student => {
    if (Array.isArray(student.services) && student.services.some(service => typeof service === 'string' || !service || typeof service !== 'object' || (!service.title && !service.description))) {
      student.services = getRenderableStudentServices(student).map((service, index) => normalizeStudentServiceRecord(student, service, index));
      studentsChanged = true;
    }
  });
  if (studentsChanged) ls('cogo_students', students);
  saveUsers(getUsers());
  saveStudents(getStudents());
  saveBlogPosts(getBlogPosts());
}

// ---------- Utilities ----------
function esc(s){
  if (s === null || s === undefined) return '';
  return String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function detectContactInfo(text=''){
  const emailRe = /[\w.+-]+@[\w.-]+\.\w+/i;
  const phoneRe = /(\+?1[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/;
  return emailRe.test(text) || phoneRe.test(text);
}
function moderateContent(text=''){
  const bad = ['porn','nude','explicit','kill','violence','hate'];
  const low = text.toLowerCase();
  return !bad.some(w => low.includes(w));
}
function blockTextCheck(text){
  if (detectContactInfo(text)) { toast('Contact info is blocked until a job is confirmed.'); return false; }
  if (!moderateContent(text)) { toast('Please keep content appropriate for minors.'); return false; }
  return true;
}
function timeAgo(iso){
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return `${Math.floor(diff/86400000)}d ago`;
}

function formatPercent(value){
  const num = Number(value || 0);
  const text = Number.isInteger(num) ? String(num) : num.toFixed(2).replace(/\.0+$/,'').replace(/(\.\d*[1-9])0+$/,'$1');

}
function calculateCommissionBreakdown(hours, rate){
  const settings = getPaymentSettings();
  const safeHours = Number(hours || 0);
  const safeRate = Number(rate || 0);
  const workTotal = Number((safeHours * safeRate).toFixed(2));
  const studentCommissionPct = Number(settings.studentCommissionPct || 0);
  const employerCommissionPct = Number(settings.employerCommissionPct || 0);
  const studentCommissionAmount = Number((workTotal * (studentCommissionPct / 100)).toFixed(2));
  const employerCommissionAmount = Number((workTotal * (employerCommissionPct / 100)).toFixed(2));
  const studentPayout = Number((workTotal - studentCommissionAmount).toFixed(2));
  const employerTotal = Number((workTotal + employerCommissionAmount).toFixed(2));
  const platformFeeTotal = Number((studentCommissionAmount + employerCommissionAmount).toFixed(2));
  return {
    hours: safeHours,
    rate: safeRate,
    workTotal,
    studentCommissionPct,
    employerCommissionPct,
    studentCommissionAmount,
    employerCommissionAmount,
    studentPayout,
    employerTotal,
    platformFeeTotal
  };
}

function attemptEscrowAuthorization(application, escrowAmount){
  const employer = getUserById(application.employerId);
  if (!employer) {
    const reason = 'employer_not_found';
    logPaymentEvent({ applicationId: application.id, employerId: application.employerId, amount: escrowAmount, status: 'failed', reason });
    return { success:false, reason };
  }
  if (!hasValidPaymentMethod(application.employerId)) {
    if (!TEST_ENV_PAYMENT_ALWAYS_SUCCEEDS) {
      const reason = 'missing_or_invalid_payment_method';
      logPaymentEvent({ applicationId: application.id, employerId: application.employerId, amount: escrowAmount, status: 'failed', reason });
      return { success:false, reason };
    }
    const users = getUsers();
    const user = users.find(x => x.id === employer.id);
    if (user) {
      user.paymentMethod = user.paymentMethod || { status:'valid', brand:'Visa', last4:'4242' };
      user.paymentMethod.status = 'valid';
      user.paymentSetupComplete = true;
      saveUsers(users);
      if (currentUser && currentUser.id === user.id) setCurrentUser(user);
    }
  }
  const provider = STRIPE_ENABLED ? 'stripe' : 'placeholder';
  const mode = STRIPE_ENABLED ? 'stripe_manual_capture' : (TEST_ENV_PAYMENT_ALWAYS_SUCCEEDS ? 'placeholder_test_success' : 'placeholder_success');
  logPaymentEvent({ applicationId: application.id, employerId: application.employerId, amount: escrowAmount, status: 'held', mode, provider });
  return { success:true, escrowStatus:'held', provider };
}

}

  const messages = getMessages();

    const betweenUsers = (m.fromId === employerId && m.toId === studentUserId) || (m.fromId === studentUserId && m.toId === employerId);
    if (betweenUsers && !m.projectId) {
      m.projectId = projectId;
      changed = true;
    }
  });
  if (changed) saveMessages(messages);
}

function getModalDraftStore(){

function modalDraftKey(title){
  return `modal:${String(title || '').trim().toLowerCase()}`;
}
function saveActiveModalDraft(){
  if (!activeModalDraftKey) return;
  const modalBody = document.querySelector('#modal-root .modal-body');
  if (!modalBody) return;
  const values = {};
  modalBody.querySelectorAll('input, textarea, select').forEach(field => {
    if (!field.id || field.type === 'file') return;
    values[field.id] = field.type === 'checkbox' ? !!field.checked : field.value;
  });
  const store = getModalDraftStore();
  store[activeModalDraftKey] = values;
  saveModalDraftStore(store);
}
function restoreActiveModalDraft(){
  if (!activeModalDraftKey) return;
  const modalBody = document.querySelector('#modal-root .modal-body');
  if (!modalBody) return;
  const store = getModalDraftStore();
  const draft = store[activeModalDraftKey] || {};
  Object.entries(draft).forEach(([id, value]) => {
    const field = modalBody.querySelector(`#${id}`);
    if (!field) return;
    if (field.type === 'checkbox') field.checked = !!value;
    else field.value = value;
  });

function isNotificationActionCompleted(notification){
  if (!notification || !notification.action) return false;
  const action = notification.action;
  if (action.projectId) {
    const project = getProjects().find(p => p.id === action.projectId);
    if (project && String(notification.title || '').toLowerCase().includes('review')) return !!project.reviewSubmitted;
  }
  return false;
}
function notificationOpenButtonClass(notification){
  return (notification.viewedAt || isNotificationActionCompleted(notification)) ? 'btn btn-outline btn-sm' : 'btn btn-blue btn-sm';
}
function openNotifications(){
  const allItems = getNotifications(currentUser.id);
  const items = allItems.filter(n => !n.action || n.action.type !== 'thread');
  const html = items.length ? items.map(n => `
    <div class="item-card card">
      <div class="split">
        <div>
          <div style="font-weight:700">${esc(n.title)}</div>
          <div class="muted small">${timeAgo(n.createdAt)}</div>
        </div>
        ${n.action ? `<button class="${notificationOpenButtonClass(n)}" onclick="runNotifAction('${esc(n.id)}')">Open</button>` : ''}
      </div>
    </div>
  `).join('') : `<div class="muted">No notifications yet.</div>`;
  openModal('Notifications', html, '620px');
  allItems.forEach(n => n.read = true);
  saveNotifications(currentUser.id, allItems);
  renderNav();
}
function runNotifAction(id){
  const items = getNotifications(currentUser.id);
  const item = items.find(n => n.id === id);
  if (!item || !item.action) return;
  item.viewedAt = new Date().toISOString();
  saveNotifications(currentUser.id, items);
  closeModal();
  const action = item.action;
  if (action.type === 'dashboard') {
    dashSection = action.section || 'profile';
    if (typeof action.employerTab === 'string') employerTab = action.employerTab;
    if (typeof action.studentJobsTab === 'string') studentJobsTab = action.studentJobsTab;
    goDashboard();
  } else if (action.type === 'thread') {
    dashSection = 'messages';
    activeThreadUserId = action.userId;
    goDashboard();
  }
}

function resetDemoData(){

function doLogin(){
  const email = (document.getElementById('loginEmail').value || '').trim().toLowerCase();
  const password = document.getElementById('loginPassword').value || '';
  const users = getUsers();
  const user = users.find(u => u.email.toLowerCase() === email && u.password === password);
  if (!user) { toast('Invalid email or password'); return; }
  if (user.archived) { toast('This profile is no longer active.'); return; }
  if (user.status === 'suspended') { toast('This account is suspended.'); return; }
  localStorage.removeItem('cogo_admin_impersonation');
  user.lastLogin = new Date().toISOString();
  saveUsers(users);
  setCurrentUser(user);
  closeModal();
  toast(`Welcome back, ${firstName(user.name)}!`);
  location.hash = '#/';
  renderPage();
}

function getStudentSignupStrength(){
  const d = studentSignupDraft || createDefaultStudentSignupDraft();
  const checks = [
    !!d.name,
    !!d.age,
    !!d.school,
    !!d.city,
    !!(d.photo || d.avatar),
    !!d.about,
    !!d.experience,
    (d.services || []).length > 0,
    !!d.email,
    !!d.phone,
    !!d.address
  ];
  const pct = Math.round((checks.filter(Boolean).length / checks.length) * 100);
  return Math.max(10, pct);

function getStudentSignupSuggestions(){
  const d = studentSignupDraft || createDefaultStudentSignupDraft();

  if ((d.about || '').length < 40) suggestions.push('Add more detail to get hired faster.');
  if (!(d.services || []).length) suggestions.push('Add at least one service before you publish.');
  if ((d.experience || '').length < 30) suggestions.push('Share a little experience so employers trust your profile faster.');
  return suggestions.slice(0, 2);

function saveStudentSignupStep(step){
  if (!studentSignupDraft) studentSignupDraft = createDefaultStudentSignupDraft();
  if (step === 1){
    const name = (document.getElementById('studentFlowName').value || '').trim();
    const age = Number(document.getElementById('studentFlowAge').value || 0);
    const school = (document.getElementById('studentFlowSchool').value || '').trim();
    const city = (document.getElementById('studentFlowCity').value || '').trim();
    if (!name || !age || !school || !city) return toast('Please complete name, age, school, and city.'), false;
    if (age < 13 || age > 25) return toast('Student signup is for ages 13 to 25.'), false;
    Object.assign(studentSignupDraft, { name, age, school, city });
    return true;
  }
  if (step === 2){
    if (!(studentSignupDraft.photo || studentSignupDraft.avatar)) return toast('Please upload a photo or choose an avatar.'), false;
    return true;
  }
  if (step === 3){
    const about = (document.getElementById('studentFlowAbout').value || '').trim();
    const experience = (document.getElementById('studentFlowExperience').value || '').trim();
    if (!about || !experience) return toast('Please complete About and Experience.'), false;
    Object.assign(studentSignupDraft, { about, experience });
    return true;
  }
  if (step === 4){
    const videoUrl = (document.getElementById('studentFlowProfileVideoLink').value || '').trim();
    studentSignupDraft.video_url = videoUrl;
    return true;
  }
  if (step === 5){
    syncStudentSignupServiceForm();
    const services = studentSignupDraft.services || [];
    const form = studentSignupDraft.serviceForm || {};
    const hasDraftValues = !!(form.title || form.description || form.video_url || form.location || form.availability || Number(form.rate || 0) || (form.images || []).length);
    if (!services.length && hasDraftValues) {
      const draftRate = Number(form.rate || 0);
      if (!form.title || !form.description || !draftRate || !form.location || !form.availability) return toast('Please complete all required service fields.'), false;
      const service = {
        id: uid('service'),
        title: form.title,
        description: form.description,
        images: form.images || [],
        video_url: form.video_url || '',
        rate: draftRate,
        location: form.location,
        availability: form.availability,
        reviews: []
      };
      studentSignupDraft.services.push(service);
      studentSignupEditingServiceIndex = null;
      studentSignupDraft.serviceForm = { title:'', description:'', images:[], video_url:'', rate:'20', location: studentSignupDraft.city || '', availability:'' };
    }
    if (!(studentSignupDraft.services || []).length) return toast('Please save at least one service before continuing.'), false;
    return true;
  }
  if (step === 6){
    const email = (document.getElementById('studentFlowEmail').value || '').trim().toLowerCase();
    const phone = (document.getElementById('studentFlowPhone').value || '').trim();
    const address = (document.getElementById('studentFlowAddress').value || '').trim();
    if (!email || !phone || !address) return toast('Please complete email, phone, and address.'), false;
    Object.assign(studentSignupDraft, { email, phone, address });
    return true;
  }
  if (step === 8){
    const password = document.getElementById('studentFlowPassword').value || '';
    const confirmPassword = document.getElementById('studentFlowConfirmPassword').value || '';
    if (!password || password.length < 6) return toast('Please create a password with at least 6 characters.'), false;
    if (password !== confirmPassword) return toast('Passwords do not match.'), false;
    Object.assign(studentSignupDraft, { password, confirmPassword });
    return true;
  }
  return true;
}

  studentSignupStep = Math.max(1, Math.min(8, targetStep));

function renderEmployerSignupFooter(){
  const passwordStep = employerSignupMode === 'employer' ? 4 : 2;
  const showBack = employerSignupStep > 1;
  const prevStep = employerSignupMode === 'employer'
    ? (employerSignupStep === 4 ? 3 : employerSignupStep - 1)
    : 1;
  const prev = showBack ? `<button class="btn btn-outline" onclick="goEmployerSignupStep(${prevStep})">Back</button>` : `<span></span>`;
  if (employerSignupMode === 'employer' && employerSignupStep === 3) return `${prev}<button class="btn btn-blue" onclick="submitEmployerSignupPreview()">Submit</button>`;
  if (employerSignupStep === passwordStep) return `${prev}<button class="btn btn-blue" onclick="publishEmployerSignupProfile()">Submit</button>`;
  return `${prev}<button class="btn btn-blue" onclick="goEmployerSignupStep(${employerSignupStep + 1})">Next</button>`;
}
function saveEmployerSignupStep(step){
  if (!employerSignupDraft) employerSignupDraft = createDefaultEmployerSignupDraft(employerSignupMode || 'neighbor');
  if (step === 1) {
    syncEmployerSignupPersonalDraft();
    if (!employerSignupDraft.firstName || !employerSignupDraft.lastName || !(employerSignupDraft.photo || employerSignupDraft.avatar) || !employerSignupDraft.email || !employerSignupDraft.phone || !employerSignupDraft.address) return toast('Please complete all required personal profile fields.'), false;
    return true;
  }
  if (employerSignupMode === 'employer' && step === 2) {
    syncEmployerSignupBusinessDraft();
    if (!employerSignupDraft.businessName || !employerSignupDraft.businessAbout || !employerSignupDraft.businessPhone || !employerSignupDraft.businessAddress || !employerSignupDraft.tin) return toast('Please complete all required business fields.'), false;
    return true;
  }
  const passwordStep = employerSignupMode === 'employer' ? 4 : 2;
  if (step === passwordStep) {
    syncEmployerSignupPasswordDraft();
    if (!employerSignupDraft.password || employerSignupDraft.password.length < 6) return toast('Please create a password with at least 6 characters.'), false;
    if (employerSignupDraft.password !== employerSignupDraft.confirmPassword) return toast('Passwords do not match.'), false;
    return true;
  }
  return true;
}
function goEmployerSignupStep(targetStep){

  employerSignupStep = targetStep;

function publishEmployerSignupProfile(){
  const passwordStep = employerSignupMode === 'employer' ? 4 : 2;
  if (!saveEmployerSignupStep(passwordStep)) return;
  const d = employerSignupDraft;
  const users = getUsers();
  if (users.some(u => (u.email || '').toLowerCase() === (d.email || '').toLowerCase())) return toast('Email already registered. Please sign in.');
  const lastInitial = (d.lastName || '').slice(0,1).toUpperCase();
  const createdAt = new Date().toISOString();
  const newUser = {
    id:uid('u'),
    email:d.email,
    password:d.password,
    firstName:d.firstName,
    lastName:d.lastName,
    name:`${d.firstName} ${lastInitial}.`,
    publicName:`${d.firstName} ${lastInitial}.`,
    role:'employer',
    type:employerSignupMode === 'employer' ? 'business' : 'neighbor',
    emoji:d.avatar || (employerSignupMode === 'employer' ? '🏢' : '🏠'),
    photo:d.photo || '',
    about:d.about || '',
    phone:d.phone,
    address:d.address,
    city:d.city || extractCity(d.address),
    verificationStatus:'test_skip',
    paymentMethod:{ status:'valid', brand:'Visa', last4:'4242' },
    paymentSetupComplete:true,
    company:employerSignupMode === 'employer' ? d.businessName : '',
    businessProfile:employerSignupMode === 'employer' ? {
      name:d.businessName,
      logo:d.businessLogo || '',
      about:d.businessAbout,
      phone:d.businessPhone,
      address:d.businessAddress,
      city:d.businessCity || extractCity(d.businessAddress),
      tin:d.tin,
      createdAt
    } : null,
    createdAt
  };
  users.push(newUser);
  saveUsers(users);
  setCurrentUser(newUser);
  employerSignupDraft = null;
  employerSignupStep = 1;
  closeModal();
  toast('Verification email skipped in test mode. Redirected to profile.');
  dashSection = 'profile';
  location.hash = '#/dashboard';
  renderPage();
}

function renderAppErrorState(error, route=''){
  console.error('CoGo render error', route, error);
  const app = document.getElementById('app');
  if (!app) return;
  app.innerHTML = `
    <div class="container" style="padding-top:28px;padding-bottom:28px">
      <div class="card form-card">
        <div class="section-title">We hit a page error</div>
        <div class="small muted" style="margin-bottom:14px">The page could not render cleanly. This usually means older local demo data needs to be normalized by the latest build.</div>
        <div class="small muted" style="margin-bottom:14px">${esc((error && error.message) || 'Unknown error')}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-blue" onclick="location.reload()">Reload Page</button>
          <button class="btn btn-outline" onclick="location.hash='#/';renderPage()">Go Home</button>
          <button class="btn btn-outline" onclick="resetDemoDataAndRender('${esc(route || '#/')}')">Reset Demo Data</button>
        </div>
      </div>
    </div>
  `;
}
function renderPage(){
  try {
    if (!syncCurrentUserRecord()) return;
    renderNav();
    const route = getRoute();
    if (route === '#/community') return renderCommunity();
    if (route === '#/dashboard') return renderDashboard();
    if (route === '#/blog' || route.startsWith('#/blog/')) return renderBlog();
    const result = renderHome();
    renderRecoveryAttempted = false;
    return result;
  } catch (error) {
    const route = getRoute();
    if (!renderRecoveryAttempted) {
      renderRecoveryAttempted = true;
      try {
        return resetDemoDataAndRender(route || '#/');
      } catch (recoveryError) {
        error = recoveryError;
      }
    }
    renderAppErrorState(error, route);
  }
}

function formatBlogDate(value){
  if (!value) return '—';
  return new Date(value).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
}
function decodeHtmlEntities(html=''){
  const textarea = document.createElement('textarea');
  textarea.innerHTML = String(html || '');
  return textarea.value;
}
function stripHtmlTags(html=''){
  return decodeHtmlEntities(String(html || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim());
}
function sanitizeArticleHtml(html=''){
  return String(html || '').replace(/<script[\s\S]*?<\/script>/gi, '').replace(/\son\w+=("[^"]*"|'[^']*')/gi, '');
}
function formatArticleBodyHtml(content=''){
  const raw = String(content || '').trim();
  if (!raw) return '';
  if (/<[a-z][\s\S]*>/i.test(raw)) return sanitizeArticleHtml(raw);
  return raw.split(/\n\s*\n/).map(block => `<p>${esc(block).replace(/\n/g, '<br>')}</p>`).join('');
}
function getBlogPostBySlug(slug=''){
  return getPublicBlogPosts().find(post => post.slug === slug);
}
function getBlogThumbnailView(post, variant='thumb'){
  const sources = [post.image_id, post.featuredImage].filter(Boolean);
  for (const source of sources) {
    const image = getImageView(source, variant);
    if (image && image.url) return image;
  }
  return null;
}
function renderBlogThumbnail(post, variant='card'){
  const image = getBlogThumbnailView(post, variant === 'featured' ? 'full' : 'thumb');
  if (variant === 'featured') {

      ? `<div class="blog-featured-media"><img src="${esc(image.url)}" alt="${esc(post.title)}" loading="lazy"></div>`
      : `<div class="blog-featured-media" style="display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;font-weight:800">CoGo Blog</div>`;
  }
  return image
    ? `<div class="blog-card-media"><img src="${esc(image.url)}" alt="${esc(post.title)}" class="blog-card-image" loading="lazy"></div>`
    : `<div class="blog-card-media" style="display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.8rem;font-weight:800">CoGo Blog</div>`;
}

function pullHomepageCandidate(pool, placedCards, topStudentIds, topLimit=12){
  for (let i = 0; i < pool.length; i += 1) {
    const card = pool[i];
    const wouldDuplicateStudent = placedCards.length < topLimit && topStudentIds.has(card.student.userId);
    const lastTwo = placedCards.slice(-2);
    const wouldBreakCategoryMix = lastTwo.length === 2 && lastTwo.every(item => item.homepageCategory === card.homepageCategory);
    if (!wouldDuplicateStudent && !wouldBreakCategoryMix) return pool.splice(i, 1)[0];
  }

function buildHomepageFairOrder(sortedCards){
  const featuredNewCards = [];
  const seenFeaturedStudents = new Set();
  sortedCards.forEach(card => {
    if (featuredNewCards.length >= 3) return;
    if (!isHomepageServiceNew(card)) return;
    if (seenFeaturedStudents.has(card.student.userId)) return;
    seenFeaturedStudents.add(card.student.userId);
    featuredNewCards.push(card);
  });
  const featuredKeys = new Set(featuredNewCards.map(card => card.homepageKey));
  const remaining = sortedCards.filter(card => !featuredKeys.has(card.homepageKey));
  const featuredQueue = [...featuredNewCards];
  const featuredSlots = new Set([1, 5, 9]);
  const topCards = [];
  const topStudentIds = new Set();
  const desiredTopCount = Math.min(12, sortedCards.length);
  while (topCards.length < desiredTopCount) {
    let candidate = null;
    if (featuredSlots.has(topCards.length) && featuredQueue.length) candidate = pullHomepageCandidate(featuredQueue, topCards, topStudentIds, 12);
    if (!candidate) candidate = pullHomepageCandidate(remaining, topCards, topStudentIds, 12);
    if (!candidate && featuredQueue.length) candidate = featuredQueue.shift();
    if (!candidate && remaining.length) candidate = remaining.shift();
    if (!candidate) break;
    topCards.push(candidate);
    if (topCards.length <= 12) topStudentIds.add(candidate.student.userId);
  }
  const tailPool = [...featuredQueue, ...remaining];
  const tailCards = [];
  while (tailPool.length) {
    const candidate = pullHomepageCandidate(tailPool, topCards.concat(tailCards), new Set(), 0) || tailPool.shift();
    if (!candidate) break;
    tailCards.push(candidate);
  }
  return topCards.concat(tailCards);
}
function getHomepageOrderedServiceCards(){

  const signature = Array.from(cardMap.keys()).sort().join('|');

  } catch (error) {
    cached = null;

  if (cached && cached.sessionId === sessionId && cached.viewerKey === viewerKey && cached.signature === signature && Array.isArray(cached.order)) {
    return cached.order.map(key => cardMap.get(key)).filter(Boolean);
  }
  const orderedCards = buildHomepageFairOrder(eligibleCards.map(card => scoreHomepageServiceCard(card, sessionId)).sort((a, b) => b.homepageScore - a.homepageScore));
  try {
    sessionStorage.setItem('cogo_homepage_order_v1', JSON.stringify({ sessionId, viewerKey, signature, order: orderedCards.map(card => card.homepageKey) }));

  openAdminImageLibrary('selectAdminModalImageFromLibrary');
}
function selectAdminModalImageFromLibrary(imageId=''){
  if (!adminModalImageLibraryTarget) return toast('Image target is unavailable.');
  const { mode, inputId, previewId, limit, alt, emptyLabel } = adminModalImageLibraryTarget;
  if (mode === 'list') {
    const nextImages = addImageIdToList(getAdminModalImageList(inputId), imageId, limit || 3);
    setAdminModalImageList(inputId, previewId, nextImages, limit || 3);
  } else {
    setAdminModalSingleImage(inputId, previewId, imageId, alt, emptyLabel);
  }

function handleAdminModalSingleImageUpload(input, inputId='', previewId='', source='profile', alt='Image', emptyLabel='No image selected yet.'){
  const file = input && input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const imageId = upsertImageRecord(reader.result, { source });
    setAdminModalSingleImage(inputId, previewId, imageId, alt, emptyLabel);
  };
  reader.readAsDataURL(file);
}
function handleAdminModalImageListUpload(input, inputId='', previewId='', source='gallery', limit=3){
  readImagesToDataUrls(input, (images) => {
    const taggedImages = upsertImageRecords(images, { source });
    setAdminModalImageList(inputId, previewId, taggedImages, limit);
  }, limit);
}

function copyImageUrl(imageId){
  const image = getImageView(imageId, 'full');
  if (!image) return toast('Image not found.');
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(image.url).then(() => toast('Image URL copied.')).catch(() => toast('Could not copy the image URL.'));
    return;
  }
  toast('Clipboard copy is not supported here.');
}
function getImageUsageDetails(imageId=''){
  const usage = [];
  getUsers().forEach(user => {
    if (String(user.photo || '') === String(imageId)) usage.push({ type:'user_profile', id:user.id || '', label:user.name || user.email || 'User' });
    if (String(user.profile_image_id || '') === String(imageId)) usage.push({ type:'user_profile', id:user.id || '', label:user.name || user.email || 'User' });
    if (user.businessProfile && (String(user.businessProfile.logo || '') === String(imageId) || String(user.businessProfile.image_id || '') === String(imageId))) {
      usage.push({ type:'business_logo', id:user.id || '', label:user.businessProfile.name || user.company || user.name || 'Business' });
    }
  });
  getStudents().forEach(student => {
    if (String(student.photo || '') === String(imageId) || String(student.profile_image_id || '') === String(imageId)) {
      usage.push({ type:'student_profile', id:student.id || '', label:student.name || 'Student profile' });
    }
    if ((student.profileImages || []).some(id => String(id) === String(imageId))) {
      usage.push({ type:'student_gallery', id:student.id || '', label:student.name || 'Student gallery' });
    }
    (student.services || []).forEach(service => {
      if ((service.images || service.entity_images || []).some(id => String(id) === String(imageId))) {
        usage.push({ type:'service_gallery', id:service.id || '', label:service.title || 'Service' });
      }
    });
  });
  getBlogPosts().forEach(post => {
    if (String(post.image_id || post.featuredImage || '') === String(imageId)) usage.push({ type:'article_featured', id:post.id || '', label:stripHtmlTags(post.title || 'Article') });
    if ((post.entity_images || post.images || []).some(id => String(id) === String(imageId))) usage.push({ type:'article_gallery', id:post.id || '', label:stripHtmlTags(post.title || 'Article') });
  });
  const deduped = [];
  const seen = new Set();
  usage.forEach(item => {
    const key = `${item.type}:${item.id}:${item.label}`;
    if (seen.has(key)) return;
    seen.add(key);
    deduped.push(item);
  });
  return deduped;
}
function removeImageReferences(imageId=''){
  const users = getUsers();
  let usersChanged = false;
  users.forEach(user => {
    if (String(user.photo || '') === String(imageId)) {
      user.photo = '';
      user.profile_image_id = '';
      usersChanged = true;
    }
    if (user.businessProfile && String(user.businessProfile.logo || '') === String(imageId)) {
      user.businessProfile.logo = '';
      user.businessProfile.image_id = '';
      usersChanged = true;
    }
  });
  if (usersChanged) saveUsers(users);

  const students = getStudents();
  let studentsChanged = false;
  students.forEach(student => {
    if (String(student.photo || '') === String(imageId)) {
      student.photo = '';
      student.profile_image_id = '';
      studentsChanged = true;
    }
    const nextProfileImages = removeImageIdFromList(student.profileImages || [], imageId);
    if (nextProfileImages.length !== (student.profileImages || []).length) {
      student.profileImages = nextProfileImages;
      if (!student.photo && student.profileImages[0]) {
        student.photo = student.profileImages[0];
        student.profile_image_id = student.profileImages[0];
      }
      studentsChanged = true;
    }
    (student.services || []).forEach(service => {
      const nextImages = removeImageIdFromList(service.images || [], imageId);
      if (nextImages.length !== (service.images || []).length) {
        service.images = nextImages;
        service.entity_images = [...nextImages];
        studentsChanged = true;
      }
    });
  });
  if (studentsChanged) saveStudents(students);

  const posts = getBlogPosts();
  let postsChanged = false;
  posts.forEach(post => {
    if (String(post.featuredImage || '') === String(imageId) || String(post.image_id || '') === String(imageId)) {
      post.featuredImage = '';
      post.image_id = '';
      postsChanged = true;
    }
    const nextImages = removeImageIdFromList(post.images || [], imageId);
    if (nextImages.length !== (post.images || []).length) {
      post.images = nextImages;
      post.entity_images = [...nextImages];
      postsChanged = true;
    }
  });
  if (postsChanged) saveBlogPosts(posts);
}
function deleteImageFromLibrary(imageId=''){
  if (!imageId) return;
  if (getImageUsageDetails(imageId).length) return toast('This image is in use and cannot be deleted');
  removeImageReferences(imageId);
  saveImages(getImages().filter(image => String(image.id) !== String(imageId)));
  toast('Image deleted from the library.');
  if (dashSection === 'images') renderDashboard();
}

function getRenderableStudentServices(student){
  const rawServices = Array.isArray(student.services) ? student.services.filter(Boolean) : [];
  const services = rawServices.map((service, index) => normalizeStudentServiceRecord(student, service, index)).filter(s => s && (s.title || s.description || s.rate || s.location || s.availability));
  if (services.length) return services;
  return [{
    id:'default_service',
    title: student.title || 'Student Service',
    description: ((student.about || [])[0] || ''),
    rate: student.rate || 20,
    location: student.location || '',
    availability: student.availability || '',
    entity_images: student.profileImages || [],
    images: student.profileImages || [],
    video_url: student.video_url || '',
    reviews: student.reviews || []
  }];
}

// ---------- Community ----------
function getCommunityFeedApplicationCount(postId, applications=getApplications()){
  const countableStatuses = new Set(['pending','applied','offer_sent','offer_pending']);
  return applications.filter(application => application.postId === postId && countableStatuses.has(application.status)).length;
}
function syncCommunityJobApplicationCounts(applications=getApplications()){
  const posts = getPosts();
  let changed = false;
  posts.forEach(post => {
    if (!post.isJob) return;
    const nextCount = getCommunityFeedApplicationCount(post.id, applications);
    if (Number(post.application_count || 0) !== nextCount) {
      post.application_count = nextCount;
      changed = true;
    }
  });
  if (changed) savePosts(posts);
  return posts;
}
function syncCommunityJobStatus(postId, applications=getApplications()){
  if (!postId) return;
  const posts = getPosts();
  const post = posts.find(item => item.id === postId && item.isJob);
  if (!post || ['in_progress','completed'].includes(post.status)) return;
  const relatedApplications = applications.filter(application => application.postId === postId);
  const hasAccepted = relatedApplications.some(application => application.status === 'accepted');
  const hasOfferPending = relatedApplications.some(application => ['offer_sent','offer_pending'].includes(application.status));
  const nextStatus = hasAccepted ? 'closed' : (hasOfferPending ? 'pending' : (post.status === 'closed' ? 'closed' : 'open'));
  if (post.status !== nextStatus) {
    post.status = nextStatus;
    savePosts(posts);
  }
}
function getCommunityFeedStatusLabel(post){
  const applicationCount = Number(post.application_count || 0);
  if (post.status === 'pending') return 'Pending';
  if (post.status === 'open') {
    if (applicationCount > 0) return `${applicationCount} Student${applicationCount === 1 ? '' : 's'} Applied`;
    return 'Open';
  }
  return 'Closed';
}
function isCommunityFeedJobOpen(post){
  return post.status === 'open' || post.status === 'pending';
}

function submitPost(){
  if (!currentUser) return openLoginModal();
  const content = (document.getElementById('postContent').value || '').trim();
  const isJob = ['employer','neighbor'].includes(currentUser.role) && !!(document.getElementById('postIsJob') && document.getElementById('postIsJob').checked);
  if (!content) return toast('Please write a post.');
  if (!blockTextCheck(content)) return;
  const post = {
    id: uid('p'),
    authorId: currentUser.id,
    authorName: currentUser.name,
    authorEmoji: currentUser.emoji || '👤',
    content,
    isJob,
    createdAt: new Date().toISOString(),
    likes: [],
    status: isJob ? 'open' : undefined,
    application_count: isJob ? 0 : undefined
  };
  if (isJob){
    post.jobTitle = (document.getElementById('jobTitle').value || '').trim();
    post.description = (document.getElementById('jobDescription').value || '').trim();
    post.rate = Number(document.getElementById('jobRate').value || 0);
    post.hoursNeeded = Number(document.getElementById('jobHours').value || 0);
    post.location = (document.getElementById('jobLocation').value || '').trim();
    if (!post.jobTitle || !post.description || !post.rate || !post.hoursNeeded || !post.location){
      return toast('Please complete all job fields.');
    }
    if (!blockTextCheck(post.description)) return;
  }
  const posts = getPosts();
  posts.unshift(post);

  toast('Posted successfully.');

}

          </div>
          <div class="small">${esc(p.description)}</div>
          ${canManage ? `<div class="small muted" style="margin-top:10px">Applicants: <strong style="color:var(--navy);cursor:pointer" onclick="dashSection='applicants_projects';goDashboard()">${appsCount}</strong></div>` : ''}

        ${canManage ? `<button class="btn btn-outline btn-sm" onclick="editPost('${esc(p.id)}')">Edit</button>` : ''}
        ${canManage ? `<button class="btn btn-danger btn-sm" onclick="deletePost('${esc(p.id)}')">Delete</button>` : ''}
      </div>
    </div>
  `;
}
function toggleLike(postId){
  if (!currentUser) return openLoginModal();
  const posts = getPosts();
  const p = posts.find(x => x.id === postId);
  if (!p) return;
  p.likes = p.likes || [];
  const idx = p.likes.indexOf(currentUser.id);
  if (idx >= 0) p.likes.splice(idx, 1); else p.likes.push(currentUser.id);
  savePosts(posts);
  renderCommunity();
}
function editPost(postId){
  const p = getPosts().find(x => x.id === postId);
  if (!p) return;
  openModal('Edit Post', `
    <div class="field"><label>Post</label><textarea id="editPostContent">${esc(p.content)}</textarea></div>
    ${p.isJob ? `
      <div class="field"><label>Job Title</label><input id="editJobTitle" value="${esc(p.jobTitle || '')}"></div>
      <div class="field"><label>Description</label><textarea id="editJobDescription">${esc(p.description || '')}</textarea></div>
      <div class="row">
        <div class="field"><label>Rate</label><input id="editJobRate" type="number" value="${esc(p.rate || '')}"></div>
        <div class="field"><label>Hours needed</label><input id="editJobHours" type="number" value="${esc(p.hoursNeeded || '')}"></div>
      </div>
      <div class="field"><label>Location</label><input id="editJobLocation" value="${esc(p.location || '')}"></div>
    ` : ''}
    <button class="btn btn-blue" onclick="savePostEdit('${esc(postId)}')">Save Changes</button>
  `);
}
function savePostEdit(postId){
  const posts = getPosts();
  const p = posts.find(x => x.id === postId);
  if (!p) return;
  const content = (document.getElementById('editPostContent').value || '').trim();
  if (!content || !blockTextCheck(content)) return;
  p.content = content;
  if (p.isJob){
    const jobTitle = (document.getElementById('editJobTitle').value || '').trim();
    const description = (document.getElementById('editJobDescription').value || '').trim();
    const rate = Number(document.getElementById('editJobRate').value || 0);
    const hoursNeeded = Number(document.getElementById('editJobHours').value || 0);
    const location = (document.getElementById('editJobLocation').value || '').trim();
    if (!jobTitle || !description || !rate || !hoursNeeded || !location) return toast('Please complete all job fields.');
    if (!blockTextCheck(description)) return;
    Object.assign(p, { jobTitle, description, rate, hoursNeeded, location });
  }
  savePosts(posts);
  closeModal();
  toast('Post updated.');
  if (dashSection === 'myposts') renderDashboard();
  else renderCommunity();
}
function deletePost(postId){
  if (!confirm('Delete this post?')) return;
  savePosts(getPosts().filter(p => p.id !== postId));
  toast('Post deleted.');
  if (dashSection === 'myposts') renderDashboard();
  else renderCommunity();
}
function applyToPost(postId){
  if (!currentUser) return openLoginModal();
  if (currentUser.role !== 'student') return toast('Only students can apply.');
  const p = getPosts().find(x => x.id === postId);
  if (!p) return;
  if (!isCommunityFeedJobOpen(p)) return toast('This job is no longer accepting applications.');
  const apps = getApplications();
  if (apps.some(a => a.postId === postId && a.studentUserId === currentUser.id)) {
    return toast("You’ve already applied to this job. You can check the status in your Dashboard under Jobs & Bookings.");
  }
  if (!currentStudentProfile()) return goToAddProfile();
  openModal('Apply to Job', `
    <div class="warning" style="margin-bottom:14px">Your application will appear in your dashboard under Jobs & Bookings.</div>
    <div class="field">
      <label>Your message</label>
      <textarea id="applyMessage" placeholder="Tell the employer why you are a good fit..."></textarea>
    </div>
    <button class="btn btn-blue" onclick="submitApplication('${esc(postId)}')">Submit Application</button>
  `, '620px');
}
function submitApplication(postId){
  const msg = (document.getElementById('applyMessage').value || '').trim();
  if (!msg) return toast('Please write a message.');
  if (!blockTextCheck(msg)) return;
  const p = getPosts().find(x => x.id === postId);
  const student = currentStudentProfile();
  const primaryService = currentStudentPrimaryService();
  if (!p || !student) return toast('Student profile required.');
  const apps = getApplications();
  if (apps.some(a => a.postId === postId && a.studentUserId === currentUser.id)) {
    return toast("You’ve already applied to this job. You can check the status in your Dashboard under Jobs & Bookings.");
  }
  apps.push({
    id: uid('app'),
    postId,
    jobTitle: p.jobTitle,
    employerId: p.authorId,
    employerName: p.authorName,
    studentUserId: currentUser.id,
    studentProfileId: student.id,
    studentName: currentUser.name,
    studentServiceId: primaryService?.id || null,
    studentServiceTitle: primaryService?.title || '',
    message: msg,
    jobDescription: p.description,
    rate: p.rate,
    estimatedHours: p.hoursNeeded,
    location: p.location,
    source: 'community_feed',
    status: 'pending',
    createdAt: new Date().toISOString()
  });
  saveApplications(apps);
  syncCommunityJobApplicationCounts(apps);
  pushNotif(p.authorId, `${currentUser.name} applied to "${p.jobTitle}"`, { type:'dashboard', section:'applicants_projects', employerTab:'applicants' });
  closeModal();
  toast('Application submitted. Check Dashboard → Jobs & Bookings.');
  renderCommunity();
}

function saveStudentServiceForm(serviceIndex=''){
  const students = getStudents();
  const profile = students.find(s => s.id === (currentStudentProfile() || {}).id);
  if (!profile) return;
  profile.services = getRenderableStudentServices(profile).map((service, index) => normalizeStudentServiceRecord(profile, service, index));
  syncStudentServiceDraftFromForm();
  const draft = studentServiceDraft || createStudentServiceFormDraft(profile);
  const title = (draft.title || '').trim();
  const description = (draft.description || '').trim();
  const videoUrl = (draft.video_url || '').trim();
  const rate = Number(draft.rate || 0);
  const availability = (draft.availability || '').trim();
  const location = (draft.location || '').trim();
  if (!title || !description || !rate || !availability) return toast('Please complete the required service fields.');
  const service = {
    id: serviceIndex === '' || serviceIndex === null || serviceIndex === undefined || !profile.services[Number(serviceIndex)]
      ? uid('service')
      : profile.services[Number(serviceIndex)].id,
    title,
    description,
    images: [...studentServiceImagesBuffer],
    entity_images: [...studentServiceImagesBuffer],
    video_url: videoUrl,
    rate,
    availability,
    location: location || profile.location || '',
    reviews: (serviceIndex === '' || serviceIndex === null || serviceIndex === undefined || !profile.services[Number(serviceIndex)]) ? [] : (profile.services[Number(serviceIndex)].reviews || [])
  };
  if (serviceIndex === '' || serviceIndex === null || serviceIndex === undefined || !profile.services[Number(serviceIndex)]) profile.services.push(service);
  else profile.services[Number(serviceIndex)] = service;
  profile.title = profile.services[0]?.title || profile.title || 'Student Service';
  profile.rate = profile.services[0]?.rate || profile.rate || 20;
  profile.availability = profile.services[0]?.availability || profile.availability || '';
  saveStudents(students);
  studentServiceDraft = null;
  activeStudentServiceFormIndex = '';
  closeModal();
  toast('Service saved.');
  renderDashboard();
}
function deleteStudentService(serviceIndex){
  const students = getStudents();
  const profile = students.find(s => s.id === (currentStudentProfile() || {}).id);

  profile.services = getRenderableStudentServices(profile).map((service, index) => normalizeStudentServiceRecord(profile, service, index));

  toast('Service deleted.');

}

function submitFinalInvoice(projectId){
  const pList = getProjects();
  const p = pList.find(x => x.id === projectId);
  if (!p) return;
  const actualHours = Number(document.getElementById('finalHours').value || 0);
  if (!actualHours) return toast('Please enter actual hours.');
  const breakdown = calculateCommissionBreakdown(actualHours, p.rate || 0);
  const subtotal = breakdown.workTotal;
  const platformFee = breakdown.employerCommissionAmount;
  const totalDue = breakdown.employerTotal;
  const studentPayout = breakdown.studentPayout;
  const snapshot = p.projectSnapshot || {
    title: p.jobTitle,
    description: p.scope || p.description || '',
    rate: p.rate,
    location: p.location || '',
    estimatedHours: p.estimatedHours
  };
  p.actualHours = actualHours;
  p.finalSubtotal = subtotal;
  p.studentPayout = studentPayout;
  p.studentPlatformFee = breakdown.studentCommissionAmount;
  p.employerPlatformFee = breakdown.employerCommissionAmount;
  p.platformFee = breakdown.employerCommissionAmount;
  p.platformFeeTotal = breakdown.platformFeeTotal;
  p.cogoFee = breakdown.platformFeeTotal;
  p.finalTotal = totalDue;
  p.employerTotal = totalDue;
  p.finalInvoice = {
    title: snapshot.title,
    description: snapshot.description,
    rate: snapshot.rate,
    location: snapshot.location,
    actualHours,
    subtotal,
    studentPayout,
    studentPlatformFee: breakdown.studentCommissionAmount,
    employerPlatformFee: breakdown.employerCommissionAmount,
    platformFeeTotal: breakdown.platformFeeTotal,
    totalDue
  };
  p.status = 'awaiting_employer_approval';
  saveProjects(pList);
  pushNotif(p.employerId, `${currentUser.name} submitted final hours for "${p.jobTitle}". Work Total: $${subtotal.toFixed(2)}. Platform Fee (${formatPercent(breakdown.employerCommissionPct)}): $${breakdown.employerCommissionAmount.toFixed(2)}. Total Payment: $${totalDue.toFixed(2)}.`, { type:'dashboard', section:'applicants_projects', employerTab:'projects' });
  sendSystemMessage(p.employerId, p.employerName, `Final invoice submitted for "${p.jobTitle}": Work Total $${subtotal.toFixed(2)}, Platform Fee $${breakdown.employerCommissionAmount.toFixed(2)}, Total Payment $${totalDue.toFixed(2)}.`, p.id);

  renderDashboard();
}

function declineApplicant(appId, shouldSendMessage){
  const apps = getApplications();
  const application = apps.find(item => item.id === appId);
  if (!application) return toast('Applicant not found.');
  if (!confirm('Are you sure you want to decline this applicant?')) return;
  if (!canDeclineApplicant(application) && application.status !== 'rejected') return toast('This applicant can no longer be declined.');
  const message = ((document.getElementById('declineApplicantMessage') || {}).value || '').trim();
  const sendableMessage = shouldSendMessage && message && !detectContactInfo(message);
  application.status = 'rejected';
  saveApplications(apps);
  syncCommunityJobApplicationCounts(apps);
  syncCommunityJobStatus(application.postId, apps);
  if (sendableMessage) {
    sendInboxMessage(application.studentUserId, application.studentName, message, null, currentUser, { postId: application.postId || null, applicationId: application.id });
    pushNotif(application.studentUserId, `${currentUser.name} sent you a message about "${application.jobTitle}".`, { type:'dashboard', section:'messages' });
  }
  closeModal();
  if (shouldSendMessage && message && !sendableMessage) toast('Applicant declined. Message not sent because contact info is blocked.');
  else toast(sendableMessage ? 'Applicant declined and message sent.' : 'Applicant declined.');
  renderDashboard();
}

function approveFinalInvoice(projectId){
  const projects = getProjects();
  const p = projects.find(x => x.id === projectId);
  if (!p) return;
  const now = new Date().toISOString();
  const finalBreakdown = calculateCommissionBreakdown(p.actualHours || p.estimatedHours || 0, p.rate || 0);
  p.status = 'completed';
  p.completedAt = now;
  p.escrowStatus = 'released';
  p.paid = true;
  p.paymentReleasedAt = now;
  p.finalSubtotal = finalBreakdown.workTotal;
  p.studentPayout = finalBreakdown.studentPayout;
  p.studentPlatformFee = finalBreakdown.studentCommissionAmount;
  p.employerPlatformFee = finalBreakdown.employerCommissionAmount;
  p.platformFee = finalBreakdown.employerCommissionAmount;
  p.platformFeeTotal = finalBreakdown.platformFeeTotal;
  p.finalTotal = finalBreakdown.employerTotal;
  p.employerTotal = finalBreakdown.employerTotal;

  const baseline = calculateCommissionBreakdown(p.estimatedHours || 0, p.rate || 0).employerTotal;
  const diff = Number((p.finalTotal - baseline).toFixed(2));
  p.reconciliation = diff === 0
    ? `Final invoice approved at $${p.finalTotal}.`
    : diff < 0
      ? `Final invoice approved at $${p.finalTotal}, which is $${Math.abs(diff).toFixed(2)} below the estimated employer total.`
      : `Final invoice approved at $${p.finalTotal}, which is $${diff.toFixed(2)} above the estimated employer total.`;

  const students = getStudents();
  const student = students.find(s => s.userId === p.studentUserId);
  if (student) {
    student.balance = Number((Number(student.balance || 0) + Number(p.studentPayout || 0)).toFixed(2));
    saveStudents(students);
  }
  const finance = getFinance();
  finance.cogoCommission = Number((Number(finance.cogoCommission || 0) + Number(p.platformFeeTotal || 0)).toFixed(2));
  finance.completedProjects = Number(finance.completedProjects || 0) + 1;
  saveFinance(finance);

  const transactions = getTransactions();
  const transactionId = uid('tx');
  transactions.unshift({
    id: transactionId,
    transaction_id: transactionId,
    student_id: p.studentUserId,
    studentProfileId: p.studentProfileId || null,
    studentServiceId: p.studentServiceId || null,
    studentServiceTitle: p.studentServiceTitle || '',
    job_id: p.id,
    employer_id: p.employerId,
    employerName: p.employerName,
    studentName: p.studentName,
    job_title: p.jobTitle,
    hourly_rate: Number(p.rate || 0),
    hours_worked: Number(p.actualHours || 0),
    work_total: Number(p.finalSubtotal || 0),
    total_amount: Number(p.finalTotal || 0),
    employer_platform_fee: Number(p.employerPlatformFee || 0),
    student_platform_fee: Number(p.studentPlatformFee || 0),
    platform_fee_total: Number(p.platformFeeTotal || 0),
    platform_fee: Number(p.studentPlatformFee || 0),
    payout_amount: Number(p.studentPayout || 0),
    status: 'paid',
    status_history: ['processing','paid'],
    date_started: p.createdAt || now,
    date_completed: p.completedAt || now,
    date_paid: now
  });
  saveTransactions(transactions);

  const posts = getPosts();
  const post = posts.find(x => x.id === p.postId || x.id === p.job_id);
  if (post) {
    post.status = 'completed';
    savePosts(posts);
  }

  saveProjects(projects);
  pushNotif(p.employerId, `You paid $${money(p.finalTotal || 0)} total for ${p.studentName}'s project. Work Total: $${money(p.finalSubtotal || 0)}. Platform Fee: $${money(p.employerPlatformFee || 0)}. You can view this transaction in the My Transactions section of your Dashboard.`, { type:'dashboard', section:'transactions' });
  pushNotif(p.studentUserId, `You’ve been paid $${money(p.studentPayout || 0)} for '${p.jobTitle}' after a $${money(p.studentPlatformFee || 0)} Platform Fee. You can view this transaction in the My Transactions section of your Dashboard.`, { type:'dashboard', section:'transactions' });
  sendSystemMessage(p.studentUserId, p.studentName, `You’ve been paid $${money(p.studentPayout || 0)} for '${p.jobTitle}'. Work total: $${money(p.finalSubtotal || 0)}. Platform Fee: $${money(p.studentPlatformFee || 0)}. You can view this transaction in the My Transactions section of your Dashboard.`, p.id);
  sendSystemMessage(p.employerId, p.employerName, `Payment completed for '${p.jobTitle}'. Work Total: $${money(p.finalSubtotal || 0)}. Platform Fee: $${money(p.employerPlatformFee || 0)}. Total Payment: $${money(p.finalTotal || 0)}. You can view this transaction in the My Transactions section of your Dashboard.`, p.id);
  pushAdminCommissionNotification(p);
  pushNotif(p.employerId, `Leave a review for ${p.studentName}`, { type:'dashboard', section:'applicants_projects', employerTab:'projects' });
  closeModal();
  toast('Payment released and project completed.');
  renderDashboard();
}

function submitReview(projectId){
  const projects = getProjects();
  const p = projects.find(x => x.id === projectId);
  if (!p) return toast('Project not found.');
  if (p.reviewSubmitted) return toast('Review already submitted.');
  const ratingEl = document.getElementById('reviewRating');
  const commentEl = document.getElementById('reviewComment');
  if (!ratingEl || !commentEl) return toast('Review form is not available. Please reopen it and try again.');
  const students = getStudents();
  const student = students.find(s => s.id === p.studentProfileId) || students.find(s => s.userId === p.studentUserId && s.status !== 'archived');
  if (!student) return toast('Student profile not found.');
  const rating = Number(ratingEl.value || 5);
  const comment = (commentEl.value || '').trim();
  const review = { id: uid('review'), reviewerId: currentUser.id, reviewerName: currentUser.publicName || currentUser.name, rating, comment, projectId, createdAt: new Date().toISOString(), studentServiceId: p.studentServiceId || null };
  student.services = getRenderableStudentServices(student).map((service, index) => normalizeStudentServiceRecord(student, service, index));
  const services = student.services || [];
  const targetService = services.find(service => service.id === p.studentServiceId) || services[0] || null;
  if (targetService) {
    targetService.reviews = targetService.reviews || [];
    targetService.reviews.unshift(review);
    if (!p.studentServiceId) p.studentServiceId = targetService.id;
    if (!p.studentServiceTitle) p.studentServiceTitle = targetService.title || '';
  } else {
    student.reviews = student.reviews || [];
    student.reviews.unshift(review);
  }
  p.reviewSubmitted = true;
  saveStudents(students);
  saveProjects(projects);
  try {
    sendSystemMessage(
      p.studentUserId,
      p.studentName,
      `${currentUser.name} left a ${rating}/5 review on your ${(p.studentServiceTitle || student.title || 'student service')}${comment ? `: ${comment}` : '.'}`,
      p.id
    );
  } catch (err) {
    console.error('Review notification failed', err);
  }
  closeModal();
  toast('Review submitted.');
  renderDashboard();
}

function getAdminRoleValueForUser(user){

function applyAdminRoleValue(user, roleValue){
  if (roleValue === 'admin') {

    delete user.type;

function setAdminUserEditDraftValue(path='', value){
  if (!adminUserEditDraft || !path) return;
  const parts = path.split('.');
  let target = adminUserEditDraft;
  for (let i = 0; i < parts.length - 1; i += 1) {
    const key = /^\d+$/.test(parts[i]) ? Number(parts[i]) : parts[i];
    if (target[key] == null) target[key] = /^\d+$/.test(parts[i + 1] || '') ? [] : {};
    target = target[key];
  }
  const finalKey = /^\d+$/.test(parts[parts.length - 1]) ? Number(parts[parts.length - 1]) : parts[parts.length - 1];
  target[finalKey] = value;
}
function getAdminUserEditDraftValue(path=''){
  if (!adminUserEditDraft || !path) return undefined;
  return path.split('.').reduce((acc, part) => {
    const key = /^\d+$/.test(part) ? Number(part) : part;
    return acc == null ? undefined : acc[key];
  }, adminUserEditDraft);
}

function saveAdminUserEdit(userId){
  const users = getUsers();
  const user = users.find(item => item.id === userId);
  if (!user) return toast('User not found.');
  if (!adminUserEditDraft || String(adminUserEditDraft.userId) !== String(userId)) adminUserEditDraft = createAdminUserEditDraft(userId);
  syncAdminUserEditDraftFromForm();
  const draft = adminUserEditDraft || createAdminUserEditDraft(userId);
  const firstName = (draft.firstName || '').trim();
  const lastName = (draft.lastName || '').trim();
  const email = (draft.email || '').trim().toLowerCase();
  const phone = (draft.phone || '').trim();
  const publicName = (draft.publicName || '').trim();
  const city = (draft.city || '').trim();
  const address = (draft.address || '').trim();
  const nextRole = draft.roleValue || 'student';
  const nextStatus = draft.statusValue || 'active';
  if (!firstName || !lastName || !email) return toast('First name, last name, and email are required.');
  const duplicate = users.find(item => item.id !== user.id && String(item.email || '').toLowerCase() === email);
  if (duplicate) return toast('That email is already in use.');
  if (user.id === currentUser.id && nextRole !== 'admin') return toast('You cannot remove your own admin role.');
  if (user.id === currentUser.id && nextStatus === 'suspended') return toast('You cannot suspend your own admin account.');
  user.firstName = firstName;
  user.lastName = lastName;
  user.name = [firstName, lastName].filter(Boolean).join(' ').trim();
  user.publicName = publicName || user.name;
  user.email = email;
  user.phone = phone;
  user.city = city;
  user.address = address;
  user.photo = draft.photo || '';
  user.profile_image_id = user.photo || '';
  user.status = nextStatus;
  applyAdminRoleValue(user, nextRole);
  if (user.role === 'employer') {
    user.company = draft.company || user.company || '';
    user.businessProfile = Object.assign({}, user.businessProfile || {}, {
      name: draft.company || user.company || '',
      about: draft.businessAbout || user.about || '',
      logo: draft.businessLogo || '',
      image_id: draft.businessLogo || '',
      phone,
      address,
      city
    });
  }
  const students = getStudents();
  let student = students.find(profile => profile.userId === user.id);
  if (!student && nextRole === 'student') {
    student = {
      id: uid('student'),
      userId: user.id,
      name: user.publicName || user.name,
      school: '',
      age: 16,
      location: city ? (city.includes(',') ? city : `${city}, CA`) : '',
      photo: user.photo || '',
      profileImages: user.photo ? [user.photo] : [],
      video_url: '',
      emoji: user.emoji || '🎓',
      title: 'Student Service',
      tags: [],
      services: [],
      about: [],
      whyHire: ['Friendly','Reliable','Motivated'],
      highlights: [],
      rate: 20,
      reviews: [],
      balance: 0,
      availability: '',
      status: 'active'
    };
    students.push(student);
  }
  if (student) {
    let profileImages = draft.student ? [...(draft.student.profileImages || [])] : [];
    if (!profileImages.length && user.photo) profileImages = [user.photo];
    else if (user.photo && !profileImages.some(id => String(id) === String(user.photo))) profileImages = addImageIdToList(profileImages, user.photo, 3);
    student.name = user.publicName || user.name;
    student.privateEmail = email;
    student.phone = phone;
    student.location = city ? (city.includes(',') ? city : `${city}, CA`) : student.location;
    student.school = draft.student?.school || student.school || '';
    student.age = Number(draft.student?.age || student.age || 16);
    student.about = String(draft.student?.about || '').split('\n').map(line => line.trim()).filter(Boolean);
    student.highlights = String(draft.student?.highlights || '').split('\n').map(line => line.trim()).filter(Boolean);
    student.profileImages = profileImages;
    student.photo = profileImages[0] || user.photo || '';
    student.profile_image_id = student.photo || '';
    student.video_url = draft.student?.video_url || student.video_url || '';
    user.photo = student.photo || user.photo || '';
    user.profile_image_id = user.photo || '';
    const services = (draft.student?.services || getRenderableStudentServices(student)).map(service => Object.assign({}, service, {
      images:[...(service.images || [])],
      entity_images:[...(service.images || service.entity_images || [])],
      video_url:service.video_url || ''
    })).filter(service => service.title || service.description || service.rate || service.location || service.availability);
    student.services = services;
    if (services[0]) {
      student.title = services[0].title || student.title;
      student.rate = Number(services[0].rate || student.rate || 20);
      student.availability = services[0].availability || student.availability || '';
    }
  }
  saveUsers(users);
  saveStudents(students);
  if (currentUser.id === user.id) setCurrentUser(user);
  adminUserEditDraft = null;
  adminPendingUserAction = '';
  closeModal();
  logAdminAction('user_edited', { targetUserId: user.id, targetUserName: user.name, targetRole: getUserRoleLabel(user) });
  toast('User updated.');
  renderDashboard();
}

function getFilteredAdminBlogPosts(){

function ensureUniqueBlogSlug(slug, postId=''){
  const base = slugifyBlogTitle(slug) || `article-${Date.now()}`;
  const posts = getBlogPosts();
  let candidate = base;
  let counter = 2;
  while (posts.some(post => String(post.id) !== String(postId) && post.slug === candidate)) {
    candidate = `${base}-${counter}`;
    counter += 1;
  }
  return candidate;
}
