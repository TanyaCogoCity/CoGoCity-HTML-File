// ---------- Storage ----------
function ls(key, value){
  if (value === undefined) {
    try { return JSON.parse(localStorage.getItem(key)); } catch(e){ return null; }
  }
  localStorage.setItem(key, JSON.stringify(value));
}
function uid(prefix='id'){
  return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
}
function getUsers(){ return ls('cogo_users') || []; }
function saveUsers(v){ ls('cogo_users', v); }
function getStudents(){
  const students = ls('cogo_students') || [];

  students.forEach(student => {
    if (Array.isArray(student.services) && student.services.some(service => typeof service === 'string' || !service || typeof service !== 'object' || (!service.title && !service.description))) {
      student.services = getRenderableStudentServices(student).map((service, index) => normalizeStudentServiceRecord(student, service, index));
      changed = true;
    }
  });
  if (changed) ls('cogo_students', students);
  return students;
}

// ---------- Utilities ----------
function esc(s){
  if (s === null || s === undefined) return '';
  return String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function detectContactInfo(text=''){
  const emailRe = /[\w.+-]+@[\w.-]+\.\w+/i;
  const phoneRe = /(\+?1[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/;
  return emailRe.test(text) || phoneRe.test(text);
}
function moderateContent(text=''){
  const bad = ['porn','nude','explicit','kill','violence','hate'];
  const low = text.toLowerCase();
  return !bad.some(w => low.includes(w));
}
function blockTextCheck(text){
  if (detectContactInfo(text)) { toast('Contact info is blocked until a job is confirmed.'); return false; }
  if (!moderateContent(text)) { toast('Please keep content appropriate for minors.'); return false; }
  return true;
}
function timeAgo(iso){
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return `${Math.floor(diff/86400000)}d ago`;
}
function firstName(name){ return (name||'').split(' ')[0]; }
function tagLabel(t){
  const map = {
    tutoring:'📚 Tutoring',
    admin:'💼 Admin',
    events:'🎉 Events',
    babysitting:'👶 Babysitting',
    'dog-walking':'🐕 Dog Walking',
    bikes:'🚲 Bikes',
    'social-media':'📱 Social Media'
  };
  return map[t] || t;
}
function badge(status){
  return `<span class="badge badge-${esc(status)}">${esc(String(status).replaceAll('_',' '))}</span>`;
}
function currentStudentProfiles(includeArchived=false){
  if (!currentUser || currentUser.role !== 'student') return [];
  const profiles = getStudents().filter(s => s.userId === currentUser.id);
  return includeArchived ? profiles : profiles.filter(s => s.status !== 'archived');
}
function currentStudentProfile(){
  if (!currentUser || currentUser.role !== 'student') return null;
  const profiles = currentStudentProfiles();
  const activeId = ls('cogo_active_student_profile');
  const active = profiles.find(s => s.id === activeId);
  const fallback = active || profiles.find(s => s.status === 'live') || profiles[0] || null;
  if (fallback && fallback.id !== activeId) ls('cogo_active_student_profile', fallback.id);
  return fallback;
}
function currentStudentPrimaryService(){
  const profile = currentStudentProfile();
  if (!profile) return null;
  return getRenderableStudentServices(profile)[0] || null;

function attemptEscrowAuthorization(application, escrowAmount){
  const employer = getUserById(application.employerId);
  if (!employer) {
    const reason = 'employer_not_found';
    logPaymentEvent({ applicationId: application.id, employerId: application.employerId, amount: escrowAmount, status: 'failed', reason });
    return { success:false, reason };
  }
  if (!hasValidPaymentMethod(application.employerId)) {
    if (!TEST_ENV_PAYMENT_ALWAYS_SUCCEEDS) {
      const reason = 'missing_or_invalid_payment_method';
      logPaymentEvent({ applicationId: application.id, employerId: application.employerId, amount: escrowAmount, status: 'failed', reason });
      return { success:false, reason };
    }
    const users = getUsers();
    const user = users.find(x => x.id === employer.id);
    if (user) {
      user.paymentMethod = user.paymentMethod || { status:'valid', brand:'Visa', last4:'4242' };
      user.paymentMethod.status = 'valid';
      user.paymentSetupComplete = true;
      saveUsers(users);
      if (currentUser && currentUser.id === user.id) setCurrentUser(user);
    }
  }
  const provider = STRIPE_ENABLED ? 'stripe' : 'placeholder';
  const mode = STRIPE_ENABLED ? 'stripe_manual_capture' : (TEST_ENV_PAYMENT_ALWAYS_SUCCEEDS ? 'placeholder_test_success' : 'placeholder_success');
  logPaymentEvent({ applicationId: application.id, employerId: application.employerId, amount: escrowAmount, status: 'held', mode, provider });
  return { success:true, escrowStatus:'held', provider };
}
function getProjectForUsers(userIdA, userIdB){
  return getProjects().find(p => [p.employerId, p.studentUserId].includes(userIdA) && [p.employerId, p.studentUserId].includes(userIdB) && p.status !== 'completed') || null;
}
function attachMessagesToProject(projectId, employerId, studentUserId){
  const messages = getMessages();
  let changed = false;
  messages.forEach(m => {
    const betweenUsers = (m.fromId === employerId && m.toId === studentUserId) || (m.fromId === studentUserId && m.toId === employerId);
    if (betweenUsers && !m.projectId) {
      m.projectId = projectId;
      changed = true;
    }
  });
  if (changed) saveMessages(messages);
}

function runNotifAction(id){
  const items = getNotifications(currentUser.id).filter(n => !n.action || n.action.type !== 'thread');

  if (!item || !item.action) return;
  closeModal();
  const action = item.action;
  if (action.type === 'dashboard') {
    dashSection = action.section || 'profile';
    if (typeof action.employerTab === 'string') employerTab = action.employerTab;
    if (typeof action.studentJobsTab === 'string') studentJobsTab = action.studentJobsTab;

function getStudentSignupStrength(){
  const d = studentSignupDraft || createDefaultStudentSignupDraft();
  const checks = [
    !!d.name,
    !!d.age,
    !!d.school,
    !!d.city,
    !!(d.photo || d.avatar),
    !!d.about,
    !!d.experience,
    (d.services || []).length > 0,
    !!d.email,
    !!d.phone,
    !!d.address
  ];
  const pct = Math.round((checks.filter(Boolean).length / checks.length) * 100);
  return Math.max(10, pct);

function renderStudentSignupFooter(){

function saveStudentSignupStep(step){
  if (!studentSignupDraft) studentSignupDraft = createDefaultStudentSignupDraft();
  if (step === 1){
    const name = (document.getElementById('studentFlowName').value || '').trim();
    const age = Number(document.getElementById('studentFlowAge').value || 0);
    const school = (document.getElementById('studentFlowSchool').value || '').trim();
    const city = (document.getElementById('studentFlowCity').value || '').trim();
    if (!name || !age || !school || !city) return toast('Please complete name, age, school, and city.'), false;
    if (age < 13 || age > 25) return toast('Student signup is for ages 13 to 25.'), false;
    Object.assign(studentSignupDraft, { name, age, school, city });
    return true;
  }
  if (step === 2){
    const avatar = (document.getElementById('studentFlowAvatar').value || '').trim();
    studentSignupDraft.avatar = avatar || studentSignupDraft.avatar || '🎓';
    if (!(studentSignupDraft.photo || studentSignupDraft.avatar)) return toast('Please upload a photo or choose an avatar.'), false;
    return true;
  }
  if (step === 3){
    const about = (document.getElementById('studentFlowAbout').value || '').trim();
    const experience = (document.getElementById('studentFlowExperience').value || '').trim();
    if (!about || !experience) return toast('Please complete About and Experience.'), false;
    Object.assign(studentSignupDraft, { about, experience });
    return true;
  }
  if (step === 4){
    const profileVideoLink = (document.getElementById('studentFlowProfileVideoLink').value || '').trim();
    studentSignupDraft.profileVideoLink = profileVideoLink;
    return true;
  }
  if (step === 5){
    if (!(studentSignupDraft.services || []).length) return toast('Please save at least one service before continuing.'), false;
    return true;
  }
  if (step === 6){
    const email = (document.getElementById('studentFlowEmail').value || '').trim().toLowerCase();
    const phone = (document.getElementById('studentFlowPhone').value || '').trim();
    const address = (document.getElementById('studentFlowAddress').value || '').trim();
    if (!email || !phone || !address) return toast('Please complete email, phone, and address.'), false;
    Object.assign(studentSignupDraft, { email, phone, address });
    return true;
  }
  if (step === 8){
    const password = document.getElementById('studentFlowPassword').value || '';
    const confirmPassword = document.getElementById('studentFlowConfirmPassword').value || '';
    if (!password || password.length < 6) return toast('Please create a password with at least 6 characters.'), false;
    if (password !== confirmPassword) return toast('Passwords do not match.'), false;
    Object.assign(studentSignupDraft, { password, confirmPassword });
    return true;
  }
  return true;
}
function goStudentSignupStep(targetStep){
  if (targetStep > studentSignupStep && !saveStudentSignupStep(studentSignupStep)) return;
  studentSignupStep = Math.max(1, Math.min(8, targetStep));
  renderStudentSignupModal();
}

function submitStudentSignupProfile(){

  if (!d.about || !d.experience) return toast('Please complete About and Experience first.');
  if (!(d.services || []).length) return toast('Please add at least one service.');

function publishStudentSignupProfile(){
  if (!studentSignupDraft.profileReady) return toast('Please submit and publish your profile first.');
  if (!saveStudentSignupStep(8)) return;
  const d = studentSignupDraft;
  if (!(d.services || []).length) return toast('Please add at least one service.');
  const users = getUsers();
  if (users.some(u => (u.email || '').toLowerCase() === (d.email || '').toLowerCase())) return toast('Email already registered. Please sign in.');
  const students = getStudents();
  const userId = uid('u');
  const studentId = uid('s');
  const createdAt = new Date().toISOString();
  const primaryService = d.services[0];
  const newUser = {
    id:userId,
    email:d.email,
    password:d.password,
    name:d.name,
    role:'student',
    emoji:d.avatar || '🎓',
    createdAt,
    verificationStatus:'skipped_test_mode'
  };
  const newStudent = {
    id:studentId,
    userId,
    name:d.name,
    age:Number(d.age) || 17,
    school:d.school,
    location:String(d.city || '').includes(',') ? d.city : `${d.city}, CA`,
    photo:d.photo || '',
    profileImages:d.profileImages || [],
    profileVideoLink:d.profileVideoLink || '',
    emoji:d.avatar || '🎓',
    title:primaryService.title || 'Student Service',
    tags:[],
    services:(d.services || []).map(s => Object.assign({ images:[], videoLink:'', reviews:[] }, s)),
    about:[d.about],
    whyHire:['Friendly','Reliable','Motivated'],
    highlights:[d.experience],
    rate:Number(primaryService.rate || 20),
    reviews:[],
    balance:0,
    availability:primaryService.availability || '',
    status:'live',
    phone:d.phone,
    address:d.address,
    privateEmail:d.email,
    createdAt
  };
  users.push(newUser);
  students.unshift(newStudent);
  saveUsers(users);
  saveStudents(students);
  ls('cogo_active_student_profile', studentId);
  setCurrentUser(newUser);
  studentSignupDraft = null;
  studentSignupEditingServiceIndex = null;
  closeModal();
  toast('Student profile published.');
  dashSection = 'profile';
  location.hash = '#/dashboard';
  renderPage();
}
function extractCity(address=''){
  const clean = String(address || '').trim();
  if (!clean) return '';
  const parts = clean.split(',').map(part => part.trim()).filter(Boolean);
  return parts.length >= 2 ? parts[1] : parts[0];
}

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px"><button class="btn btn-outline" onclick="editEmployerSignupPreview()">Edit</button></div>
    </div>
  `;
  return `
    <div class="card form-card">
      <div class="warning" style="margin-bottom:14px">Create your password last. Email verification is skipped in this MVP test flow.</div>

      <div class="field"><label>Confirm Password</label><input id="employerSignupConfirmPassword" type="password" value="${esc(d.confirmPassword)}" placeholder="••••••••"></div>
    </div>
  `;
}
function renderEmployerSignupFooter(){
  const prevStep = employerSignupStep === 4 && employerSignupDraft && !employerSignupDraft.isBusiness ? 2 : employerSignupStep - 1;
  const prev = employerSignupStep > 1 ? `<button class="btn btn-outline" onclick="goEmployerSignupStep(${prevStep})">Back</button>` : `<span></span>`;
  if (employerSignupStep === 4) return `${prev}<button class="btn btn-blue" onclick="submitEmployerSignupDraft()">Submit</button>`;
  if (employerSignupStep === 5) return `${prev}<button class="btn btn-blue" onclick="publishEmployerSignupProfile()">Create Password</button>`;
  const nextStep = employerSignupStep === 2 && employerSignupDraft && !employerSignupDraft.isBusiness ? 4 : employerSignupStep + 1;
  return `${prev}<button class="btn btn-blue" onclick="goEmployerSignupStep(${nextStep})">Next</button>`;
}
function saveEmployerSignupStep(step){
  if (!employerSignupDraft) employerSignupDraft = createDefaultEmployerSignupDraft(employerSignupMode || 'neighbor');
  if (step === 1) {
    const firstName = (document.getElementById('employerSignupFirstName').value || '').trim();
    const lastName = (document.getElementById('employerSignupLastName').value || '').trim();
    const about = (document.getElementById('employerSignupAbout').value || '').trim();
    const email = (document.getElementById('employerSignupEmail').value || '').trim().toLowerCase();
    const phone = (document.getElementById('employerSignupPhone').value || '').trim();
    const address = (document.getElementById('employerSignupAddress').value || '').trim();
    if (!firstName || !lastName || !(employerSignupDraft.photo || employerSignupDraft.avatar) || !email || !phone || !address) return toast('Please complete all required personal profile fields.'), false;
    Object.assign(employerSignupDraft, { firstName, lastName, about, email, phone, address, city: extractCity(address) });
    return true;
  }
  if (step === 2) {
    employerSignupDraft.isBusiness = !!document.getElementById('employerBusinessToggle').checked;
    if (!employerSignupDraft.isBusiness) employerSignupDraft.businessPhone = '';
    return true;
  }
  if (step === 3) {
    if (!employerSignupDraft.isBusiness) return true;
    const businessName = (document.getElementById('employerBusinessName').value || '').trim();
    const businessAbout = (document.getElementById('employerBusinessAbout').value || '').trim();
    const businessPhone = (document.getElementById('employerBusinessPhone').value || '').trim();
    const businessAddress = (document.getElementById('employerBusinessAddress').value || '').trim();
    const tin = (document.getElementById('employerBusinessTin').value || '').trim();
    if (!businessName || !businessAbout || !businessPhone || !businessAddress || !tin) return toast('Please complete all required business fields.'), false;
    Object.assign(employerSignupDraft, { businessName, businessAbout, businessPhone, businessAddress, businessCity: extractCity(businessAddress), tin });
    return true;
  }
  if (step === 5) {
    const password = document.getElementById('employerSignupPassword').value || '';
    const confirmPassword = document.getElementById('employerSignupConfirmPassword').value || '';
    if (!password || password.length < 6) return toast('Please create a password with at least 6 characters.'), false;
    if (password !== confirmPassword) return toast('Passwords do not match.'), false;
    Object.assign(employerSignupDraft, { password, confirmPassword });
    return true;
  }
  return true;
}
function goEmployerSignupStep(targetStep){
  if (targetStep > employerSignupStep && !saveEmployerSignupStep(employerSignupStep)) return;
  employerSignupStep = targetStep;
  renderEmployerSignupModal();
}
function setEmployerSignupAvatar(emoji){
  employerSignupDraft.avatar = emoji;

}
function handleEmployerSignupPhotoUpload(input){

function handleEmployerSignupBusinessLogoUpload(input){

}
function editEmployerSignupPreview(){
  employerSignupStep = employerSignupDraft && employerSignupDraft.isBusiness ? 3 : 1;
  renderEmployerSignupModal();
}
function submitEmployerSignupDraft(){
  const requiredStep = employerSignupDraft && employerSignupDraft.isBusiness ? 3 : 2;
  if (!saveEmployerSignupStep(requiredStep)) return;
  employerSignupDraft.profileSubmitted = true;
  employerSignupStep = 5;
  renderEmployerSignupModal();
}
function publishEmployerSignupProfile(){
  if (!employerSignupDraft || !employerSignupDraft.profileSubmitted) return toast('Please submit your profile preview first.');
  if (!saveEmployerSignupStep(5)) return;
  const d = employerSignupDraft;
  const users = getUsers();
  if (users.some(u => (u.email || '').toLowerCase() === (d.email || '').toLowerCase())) return toast('Email already registered. Please sign in.');
  const lastInitial = (d.lastName || '').slice(0,1).toUpperCase();
  const createdAt = new Date().toISOString();
  const newUser = {
    id:uid('u'),
    email:d.email,
    password:d.password,
    firstName:d.firstName,
    lastName:d.lastName,
    name:`${d.firstName} ${lastInitial}.`,
    publicName:`${d.firstName} ${lastInitial}.`,
    role:'employer',
    type:d.isBusiness ? 'business' : 'neighbor',
    emoji:d.avatar || (d.isBusiness ? '🏢' : '🏠'),
    photo:d.photo || '',
    about:d.about || '',
    phone:d.phone,
    address:d.address,
    city:d.city || extractCity(d.address),
    verificationStatus:'skipped_test_mode',
    paymentMethod:{ status:'valid', brand:'Visa', last4:'4242' },
    paymentSetupComplete:true,
    company:d.businessName || '',
    businessProfile:d.isBusiness ? {
      name:d.businessName,
      logo:d.businessLogo || '',
      about:d.businessAbout,
      phone:d.businessPhone || d.phone,
      address:d.businessAddress,
      city:d.businessCity || extractCity(d.businessAddress),
      tin:d.tin,
      createdAt
    } : null,
    createdAt
  };
  users.push(newUser);
  saveUsers(users);
  setCurrentUser(newUser);
  employerSignupDraft = null;
  employerSignupStep = 1;
  closeModal();
  toast(`${newUser.type === 'business' ? 'Employer' : 'Neighbor'} account created.`);
  dashSection = 'profile';
  location.hash = '#/dashboard';
  renderPage();
}
function signOut(){
  currentUser = null;
  avatarMenuOpen = false;
  localStorage.removeItem('cogo_current_user');
  activeThreadUserId = null;
  renderNav();
  location.hash = '#/';

 <p>Test the full CoGo City student, employer, and neighbor flow in one file: profiles, community feed, applications, offers, projects, hours, invoices, messages, and approvals.</p>

function renderImagePreviewHtml(images=[], size=72){

function getVideoEmbedUrl(url=''){
  const clean = (url || '').trim();
  if (!clean) return '';
  const yt = clean.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/]+)/i);
  if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
  const vimeo = clean.match(/vimeo\.com\/(\d+)/i);
  if (vimeo) return `https://player.vimeo.com/video/${vimeo[1]}`;
  const loom = clean.match(/loom\.com\/share\/([a-zA-Z0-9]+)/i);
  if (loom) return `https://www.loom.com/embed/${loom[1]}`;
  return '';
}
function renderVideoPreviewHtml(url='', label='Video preview'){
  if (!url) return `<div class="small muted">No video link added yet.</div>`;
  const embed = getVideoEmbedUrl(url);
  return embed
    ? `<div><div class="small muted" style="margin-bottom:8px">${esc(label)}</div><iframe src="${esc(embed)}" style="width:100%;max-width:420px;height:236px;border:1px solid var(--border);border-radius:12px;background:#fff" allowfullscreen></iframe></div>`
    : `<div class="small"><a href="${esc(url)}" target="_blank" rel="noopener">${esc(label)}: ${esc(url)}</a></div>`;
}
function normalizeStudentServiceRecord(student, service, index=0){
  const baseTitle = student.title || 'Student Service';
  const baseRate = student.rate || 20;
  const baseLocation = student.location || '';
  const baseAvailability = student.availability || '';
  if (typeof service === 'string') {
    return {
      id:`service_${student.id || 'student'}_${index}`,
      title: service,
      description: index === 0 ? ((student.about || [])[0] || '') : '',
      images: [],
      videoLink: '',
      rate: baseRate,
      location: baseLocation,
      availability: baseAvailability,
      reviews: index === 0 && Array.isArray(student.reviews) ? student.reviews : []
    };
  }
  const record = Object.assign({
    id:`service_${student.id || 'student'}_${index}`,
    title: index === 0 ? baseTitle : `Service ${index + 1}`,
    description: index === 0 ? ((student.about || [])[0] || '') : '',
    images: [],
    videoLink: '',
    rate: baseRate,
    location: baseLocation,
    availability: baseAvailability,
    reviews: index === 0 && Array.isArray(student.reviews) ? student.reviews : []
  }, service || {});
  if ((!record.title || !String(record.title).trim()) && typeof service !== 'string') record.title = index === 0 ? baseTitle : `Service ${index + 1}`;
  if ((!record.description || !String(record.description).trim()) && index === 0) record.description = ((student.about || [])[0] || '');
  return record;
}
function getServiceReviews(student, service, index=0){
  if (service && Array.isArray(service.reviews) && service.reviews.length) return service.reviews;
  if (index === 0 && Array.isArray(student.reviews) && student.reviews.length) return student.reviews;
  return [];
}
function getServiceReviewSummary(student, service, index=0){
  const reviews = getServiceReviews(student, service, index);
  const total = reviews.length;
  const avg = total ? (reviews.reduce((sum, r) => sum + Number(r.rating || 0), 0) / total) : 0;
  return { reviews, total, average: total ? avg.toFixed(1) : '0.0' };
}
function getProfileReviewSummary(student){
  const services = getRenderableStudentServices(student);
  const reviews = services.flatMap((service, index) => getServiceReviews(student, service, index));
  const total = reviews.length;
  const avg = total ? (reviews.reduce((sum, r) => sum + Number(r.rating || 0), 0) / total) : 0;
  return { reviews, total, average: total ? avg.toFixed(1) : '0.0' };
}
function openReviewListModal(title, reviews=[]){
  openModal(title, `
    <div style="max-height:420px;overflow:auto">
      ${reviews.length ? reviews.map(r => `<div class="contract-box small" style="margin-bottom:10px"><div style="font-weight:700">${esc(r.reviewerName || 'Employer')}</div><div class="muted small">${esc(r.rating || 5)}/5 · ${timeAgo(r.createdAt)}</div><div style="margin-top:6px">${esc(r.comment || '')}</div></div>`).join('') : `<div class="muted">No reviews yet.</div>`}
    </div>
  `, '620px');
}
function readImagesToDataUrls(input, callback, limit=3){
  const files = Array.from((input && input.files) || []).slice(0, limit);
  if (!files.length) return callback([]);
  Promise.all(files.map(file => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  }))).then(callback);
}
function getRenderableStudentServices(student){
  const rawServices = Array.isArray(student.services) ? student.services.filter(Boolean) : [];
  const services = rawServices.map((service, index) => normalizeStudentServiceRecord(student, service, index)).filter(s => s && (s.title || s.description || s.rate || s.location || s.availability));
  if (services.length) return services;
  return [{
    id:'default_service',
    title: student.title || 'Student Service',
    description: ((student.about || [])[0] || ''),
    rate: student.rate || 20,
    location: student.location || '',
    availability: student.availability || '',
    images: student.profileImages || [],
    videoLink: student.profileVideoLink || '',
    reviews: student.reviews || []
  }];
}
function openStudentServiceDetail(studentId, serviceId){

      ${summary.reviews.length ? summary.reviews.slice(0,3).map(r => `<div class="contract-box small" style="margin-bottom:10px"><div style="font-weight:700">${esc(r.reviewerName || 'Employer')}</div><div class="muted small">${esc(r.rating || 5)}/5 · ${timeAgo(r.createdAt)}</div><div style="margin-top:6px">${esc(r.comment || '')}</div></div>`).join('') : `<div class="small muted">No reviews yet.</div>`}
      ${summary.reviews.length > 3 ? `<button class="btn btn-outline btn-sm" onclick="openReviewListModal('${esc(service.title || 'Service')} reviews', getServiceReviewSummary(getStudents().find(x => x.id === '${esc(student.id)}'), getRenderableStudentServices(getStudents().find(x => x.id === '${esc(student.id)}')).find(s => s.id === '${esc(service.id || '')}') || {}, ${serviceIndex}).reviews)">View All Reviews</button>` : ''}
      ${actionButtons}
    </div>`, '680px');
}

      }).join('')}

      ${reviewSummary.reviews.length > 3 ? `<div style="margin-top:10px"><button class="btn btn-outline btn-sm" onclick="openReviewListModal('${esc(s.name)} reviews', getProfileReviewSummary(getStudents().find(x => x.id === '${esc(s.id)}')).reviews)">View All Reviews</button></div>` : ''}
    </div>

      ? `<div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-outline" onclick="closeModal();openStudentMessage('${esc(s.id)}')">Message</button><button class="btn btn-blue" onclick="closeModal();openBookDirect('${esc(s.id)}')">Book / Offer Job</button></div>`
      : ''}

}

// ---------- Community ----------
function renderCommunity(){
  const posts = getPosts().sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  document.getElementById('app').innerHTML = `
    ${renderUserIdentityBanner()}
    <div class="container feed-wrap">
      <div class="split" style="margin-bottom:18px">
        <div class="section-title" style="margin:0">Community Feed</div>
        ${currentUser ? `<button class="btn btn-blue btn-sm" onclick="togglePostComposer()">+ Create Post</button>` : `<button class="btn btn-outline btn-sm" onclick="openLoginModal()">Sign In to Post</button>`}
      </div>
      <div id="post-composer-wrap"></div>
      ${posts.map(renderPost).join('')}
    </div>

}
function togglePostComposer(){
  const wrap = document.getElementById('post-composer-wrap');
  if (wrap.innerHTML.trim()){
    wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = `
    <div class="card form-card" style="margin-bottom:16px">
      <div class="field">
        <label>Your post</label>
        <textarea id="postContent" placeholder="Share something with the community..."></textarea>
      </div>
      <div class="field">
        <label><input type="checkbox" id="postIsJob" onchange="toggleJobFields()" style="width:auto;margin-right:8px">This is a Job Opportunity</label>
      </div>
      <div id="jobFields" class="hidden">
        <div class="field"><label>Job Title</label><input id="jobTitle" placeholder="e.g. Event Helper This Saturday"></div>
        <div class="field"><label>Job Description</label><textarea id="jobDescription" placeholder="Describe the work clearly..."></textarea></div>
        <div class="row">

          <div class="field"><label>Hours needed</label><input id="jobHours" type="number" min="1" placeholder="5"></div>
        </div>

      </div>
    </div>
  `;
}
function toggleJobFields(){
  document.getElementById('jobFields').classList.toggle('hidden', !document.getElementById('postIsJob').checked);
}
function submitPost(){
  if (!currentUser) return openLoginModal();
  const content = (document.getElementById('postContent').value || '').trim();
  const isJob = document.getElementById('postIsJob').checked;
  if (!content) return toast('Please write a post.');
  if (!blockTextCheck(content)) return;
  const post = {
    id: uid('p'),
    authorId: currentUser.id,
    authorName: currentUser.name,
    authorEmoji: currentUser.emoji || '👤',
    content,
    isJob,
    createdAt: new Date().toISOString(),
    likes: [],
    status: isJob ? 'open' : undefined
  };
  if (isJob){
    post.jobTitle = (document.getElementById('jobTitle').value || '').trim();
    post.description = (document.getElementById('jobDescription').value || '').trim();
    post.rate = Number(document.getElementById('jobRate').value || 0);
    post.hoursNeeded = Number(document.getElementById('jobHours').value || 0);
    post.location = (document.getElementById('jobLocation').value || '').trim();
    if (!post.jobTitle || !post.description || !post.rate || !post.hoursNeeded || !post.location){
      return toast('Please complete all job fields.');
    }
    if (!blockTextCheck(post.description)) return;
  }
  const posts = getPosts();
  posts.unshift(post);
  savePosts(posts);
  toast('Posted successfully.');
  renderCommunity();
}
function renderPost(p){
  const appsCount = getApplications().filter(a => a.postId === p.id).length;
  const canApply = currentUser && currentUser.role === 'student' && p.isJob;
  const canManage = currentUser && currentUser.id === p.authorId;
  const liked = currentUser && (p.likes || []).includes(currentUser.id);
  return `
    <div class="card post-card" id="post-${esc(p.id)}" style="${p.isJob ? 'border-left:4px solid var(--orange)' : ''}">
      <div class="post-header">
        <div class="post-avatar">${esc(p.authorEmoji || '👤')}</div>
        <div>
          <div style="font-weight:800">${esc(p.authorName)} ${p.isJob ? `<span class="post-job-badge">JOB</span>` : ''}</div>
          <div class="muted small">${timeAgo(p.createdAt)}</div>
        </div>
      </div>
      <div style="margin-bottom:10px">${esc(p.content)}</div>
      ${p.isJob ? `
        <div class="card" style="padding:14px;background:#FCFCFF;border-color:#E5E7EB">
          <div style="font-weight:800;font-size:1.05rem">${esc(p.jobTitle)}</div>
          <div class="meta-row" style="margin:8px 0">
            <span>💰 $${esc(p.rate)}/hr</span>
            <span>⏱️ ${esc(p.hoursNeeded)} hours</span>
            <span>📍 ${esc(p.location)}</span>
            <span>${badge(p.status || 'open')}</span>
          </div>
          <div class="small">${esc(p.description)}</div>
          ${canManage ? `<div class="small muted" style="margin-top:10px">Applicants: <strong style="color:var(--navy);cursor:pointer" onclick="dashSection='applicants_projects';goDashboard()">${appsCount}</strong></div>` : ''}
        </div>
      ` : ''}
      <div class="post-footer">
        <button class="btn btn-outline btn-sm" onclick="toggleLike('${esc(p.id)}')">${liked ? '❤️ Liked' : '🤍 Like'} (${(p.likes||[]).length})</button>
        ${canApply ? `<button class="btn btn-blue btn-sm" onclick="applyToPost('${esc(p.id)}')">Apply</button>` : ''}
        ${canManage ? `<button class="btn btn-outline btn-sm" onclick="editPost('${esc(p.id)}')">Edit</button>` : ''}
        ${canManage ? `<button class="btn btn-danger btn-sm" onclick="deletePost('${esc(p.id)}')">Delete</button>` : ''}
      </div>
    </div>
  `;
}
function toggleLike(postId){
  if (!currentUser) return openLoginModal();
  const posts = getPosts();
  const p = posts.find(x => x.id === postId);
  if (!p) return;
  p.likes = p.likes || [];
  const idx = p.likes.indexOf(currentUser.id);
  if (idx >= 0) p.likes.splice(idx, 1); else p.likes.push(currentUser.id);
  savePosts(posts);
  renderCommunity();
}
function editPost(postId){
  const p = getPosts().find(x => x.id === postId);
  if (!p) return;
  openModal('Edit Post', `
    <div class="field"><label>Post</label><textarea id="editPostContent">${esc(p.content)}</textarea></div>
    ${p.isJob ? `
      <div class="field"><label>Job Title</label><input id="editJobTitle" value="${esc(p.jobTitle || '')}"></div>
      <div class="field"><label>Description</label><textarea id="editJobDescription">${esc(p.description || '')}</textarea></div>
      <div class="row">
        <div class="field"><label>Rate</label><input id="editJobRate" type="number" value="${esc(p.rate || '')}"></div>
        <div class="field"><label>Hours needed</label><input id="editJobHours" type="number" value="${esc(p.hoursNeeded || '')}"></div>
      </div>
      <div class="field"><label>Location</label><input id="editJobLocation" value="${esc(p.location || '')}"></div>
    ` : ''}
    <button class="btn btn-blue" onclick="savePostEdit('${esc(postId)}')">Save Changes</button>
  `);
}
function savePostEdit(postId){
  const posts = getPosts();
  const p = posts.find(x => x.id === postId);
  if (!p) return;
  const content = (document.getElementById('editPostContent').value || '').trim();
  if (!content || !blockTextCheck(content)) return;
  p.content = content;
  if (p.isJob){
    const jobTitle = (document.getElementById('editJobTitle').value || '').trim();
    const description = (document.getElementById('editJobDescription').value || '').trim();
    const rate = Number(document.getElementById('editJobRate').value || 0);
    const hoursNeeded = Number(document.getElementById('editJobHours').value || 0);
    const location = (document.getElementById('editJobLocation').value || '').trim();
    if (!jobTitle || !description || !rate || !hoursNeeded || !location) return toast('Please complete all job fields.');
    if (!blockTextCheck(description)) return;
    Object.assign(p, { jobTitle, description, rate, hoursNeeded, location });
  }
  savePosts(posts);
  closeModal();
  toast('Post updated.');
  if (dashSection === 'myposts') renderDashboard();
  else renderCommunity();
}
function deletePost(postId){
  if (!confirm('Delete this post?')) return;
  savePosts(getPosts().filter(p => p.id !== postId));
  toast('Post deleted.');
  if (dashSection === 'myposts') renderDashboard();
  else renderCommunity();
}
function applyToPost(postId){
  if (!currentUser) return openLoginModal();
  if (currentUser.role !== 'student') return toast('Only students can apply.');
  const p = getPosts().find(x => x.id === postId);
  if (!p) return;
  const apps = getApplications();
  if (apps.some(a => a.postId === postId && a.studentUserId === currentUser.id)) {
    return toast("You’ve already applied to this job. You can check the status in your Dashboard under Jobs & Bookings.");
  }
  if (!currentStudentProfile()) return goToAddProfile();
  openModal('Apply to Job', `
    <div class="warning" style="margin-bottom:14px">Your application will appear in your dashboard under Jobs & Bookings.</div>
    <div class="field">
      <label>Your message</label>
      <textarea id="applyMessage" placeholder="Tell the employer why you are a good fit..."></textarea>
    </div>
    <button class="btn btn-blue" onclick="submitApplication('${esc(postId)}')">Submit Application</button>
  `, '620px');
}
function submitApplication(postId){
  const msg = (document.getElementById('applyMessage').value || '').trim();
  if (!msg) return toast('Please write a message.');
  if (!blockTextCheck(msg)) return;
  const p = getPosts().find(x => x.id === postId);
  const student = currentStudentProfile();
  const primaryService = currentStudentPrimaryService();
  if (!p || !student) return toast('Student profile required.');
  const apps = getApplications();
  if (apps.some(a => a.postId === postId && a.studentUserId === currentUser.id)) {
    return toast("You’ve already applied to this job. You can check the status in your Dashboard under Jobs & Bookings.");
  }
  apps.push({
    id: uid('app'),
    postId,
    jobTitle: p.jobTitle,
    employerId: p.authorId,
    employerName: p.authorName,
    studentUserId: currentUser.id,
    studentProfileId: student.id,
    studentName: currentUser.name,
    studentServiceId: primaryService?.id || null,
    studentServiceTitle: primaryService?.title || '',
    message: msg,
    jobDescription: p.description,
    rate: p.rate,
    estimatedHours: p.hoursNeeded,
    location: p.location,
    source: 'community_feed',
    status: 'pending',
    createdAt: new Date().toISOString()
  });
  saveApplications(apps);
  pushNotif(p.authorId, `${currentUser.name} applied to "${p.jobTitle}"`, { type:'dashboard', section:'applicants_projects', employerTab:'applicants' });
  closeModal();
  toast('Application submitted. Check Dashboard → Jobs & Bookings.');
}

// ---------- Direct book / offer from profile ----------
function openStudentMessage(studentId){
  if (!currentUser) return openLoginModal();

  if (!student) return;
  if (currentUser.id === student.userId) {

  closeModal();

function openBookDirect(studentId, serviceId=''){

  if (currentUser.role !== 'employer') return toast('Only employers and neighbors can book students.');
  const s = getStudents().find(x => x.id === studentId);
  if (!s) return;

  openModal(`Book / Offer Job to ${s.name}`, `

    ${selectedService.title ? `<div class="card" style="padding:12px;margin-bottom:14px;background:#f8fafc"><div style="font-weight:800">${esc(selectedService.title)}</div><div class="small muted" style="margin-top:4px">$${esc(selectedService.rate || s.rate || 0)}/hr · ${esc(selectedService.location || s.location || '')}</div></div>` : ''}
    <div class="field"><label>Job Title</label><input id="directJobTitle" value="${esc(selectedService.title || '')}" placeholder="e.g. Website updates" /></div>
    <div class="field"><label>Employer Scope of Work</label><textarea id="directJobScope" placeholder="Describe your requirements..."></textarea></div>

    </div>

    <div style="display:flex;gap:10px">
      <button class="btn btn-outline" onclick="openDirectMessage('${esc(s.userId)}','${esc(s.name)}')">Message First</button>
      <button class="btn btn-blue" onclick="sendDirectOffer('${esc(studentId)}','${esc(selectedService.id || '')}')">Offer Job</button>
    </div>
  `, '720px');
}
function openDirectMessage(userId, name){
  closeModal();
  dashSection = 'messages';
  activeThreadUserId = userId;
  goDashboard();
  setTimeout(() => {
    const input = document.getElementById('msgInput');
    if (input) input.focus();
  }, 100);
}
function sendDirectOffer(studentId, serviceId=''){
  const title = (document.getElementById('directJobTitle').value || '').trim();
  const scope = (document.getElementById('directJobScope').value || '').trim();
  const rate = Number(document.getElementById('directJobRate').value || 0);
  const hours = Number(document.getElementById('directJobHours').value || 0);
  const location = (document.getElementById('directJobLocation').value || '').trim();
  if (!title || !scope || !rate || !hours || !location) return toast('Please complete all fields.');
  if (!blockTextCheck(scope)) return;

  const s = getStudents().find(x => x.id === studentId);
  const selectedService = getRenderableStudentServices(s || {}).find(service => service.id === serviceId) || null;
  const apps = getApplications();
  apps.push({
    id: uid('app'),
    postId: null,
    jobTitle: title,
    employerId: currentUser.id,
    employerName: currentUser.name,
    studentUserId: s.userId,
    studentProfileId: s.id,
    studentName: s.name,
    studentServiceId: selectedService?.id || null,
    studentServiceTitle: selectedService?.title || '',
    message: scope,
    rate,
    estimatedHours: hours,
    location,
    source: 'direct_offer',
    status: 'offer_sent',
    createdAt: new Date().toISOString()
  });
  saveApplications(apps);
  pushNotif(s.userId, `You received an offer from ${currentUser.name}: "${title}"`, { type:'dashboard', section:'jobs_bookings', studentJobsTab:'jobs' });
  closeModal();
  toast('Offer sent to student.');
}

// ---------- Dashboard ----------
function renderDashboard(){
  if (!currentUser) return openLoginModal();

  if (currentUser.role === 'admin' && !['admin','settings'].includes(dashSection)) {
    dashSection = 'admin';
  }
  if (currentUser.role === 'student' && !['profile','jobs_bookings','messages','myposts','settings'].includes(dashSection)) {
    dashSection = 'profile';

    dashSection = 'profile';

  document.getElementById('app').innerHTML = `
    ${renderUserIdentityBanner()}

          <a href="#" class="${dashSection==='messages'?'active':''}" onclick="dashSection='messages';renderDashboard();return false;">💬 Messages</a>

          <a href="#" class="${dashSection==='settings'?'active':''}" onclick="dashSection='settings';renderDashboard();return false;">⚙️ Settings</a>

          <a href="#" class="${dashSection==='profile'?'active':''}" onclick="dashSection='profile';renderDashboard();return false;">👤 My Profile</a>
          <a href="#" class="${dashSection==='myposts'?'active':''}" onclick="dashSection='myposts';renderDashboard();return false;">📢 My Posts</a>
          <a href="#" class="${dashSection==='applicants_projects'?'active':''}" onclick="dashSection='applicants_projects';renderDashboard();return false;">📋 Applicants & Projects</a>
          <a href="#" class="${dashSection==='messages'?'active':''}" onclick="dashSection='messages';renderDashboard();return false;">💬 Messages</a>

      <div class="dash-main" id="dash-main"></div>

function renderStudentProfile(el){

  if (!profile){
    el.innerHTML = `

function saveStudentProfileForm(profileId=''){
  const students = getStudents();
  const profile = students.find(s => s.id === profileId) || currentStudentProfile();
  if (!profile) return;
  const users = getUsers();
  const user = users.find(u => u.id === currentUser.id);
  const name = (document.getElementById('studentProfileName').value || '').trim();
  const city = (document.getElementById('studentProfileCity').value || '').trim();
  const email = (document.getElementById('studentProfileEmail').value || '').trim();
  if (!name || !city || !email) return toast('Name, location, and email are required.');
  profile.name = name;
  profile.age = Number(document.getElementById('studentProfileAge').value || 0) || profile.age || 17;
  profile.school = (document.getElementById('studentProfileSchool').value || '').trim();
  profile.location = city.includes(',') ? city : `${city}, CA`;
  profile.phone = (document.getElementById('studentProfilePhone').value || '').trim();
  profile.privateEmail = email;
  profile.about = (document.getElementById('studentProfileAbout').value || '').split('\n').map(s => s.trim()).filter(Boolean);
  profile.highlights = (document.getElementById('studentProfileHighlights').value || '').split('\n').map(s => s.trim()).filter(Boolean);
  profile.profileImages = [...studentProfileImagesBuffer];
  profile.profileVideoLink = (document.getElementById('studentProfileVideoLink').value || '').trim();
  profile.updatedAt = new Date().toISOString();
  if (user) {
    user.name = name;
    user.email = email;
    saveUsers(users);
    setCurrentUser(user);
  }
  saveStudents(students);
  closeModal();
  toast('Profile updated.');
  renderDashboard();
}

function saveStudentServiceForm(serviceIndex=''){
  const students = getStudents();
  const profile = students.find(s => s.id === (currentStudentProfile() || {}).id);
  if (!profile) return;
  profile.services = getRenderableStudentServices(profile).map((service, index) => normalizeStudentServiceRecord(profile, service, index));
  const title = (document.getElementById('studentServiceTitle').value || '').trim();
  const description = (document.getElementById('studentServiceDescription').value || '').trim();
  const videoLink = (document.getElementById('studentServiceVideoLink').value || '').trim();
  const rate = Number(document.getElementById('studentServiceRate').value || 0);
  const availability = (document.getElementById('studentServiceAvailability').value || '').trim();
  const location = (document.getElementById('studentServiceLocation').value || '').trim();
  if (!title || !description || !rate || !availability) return toast('Please complete the required service fields.');
  const service = {
    id: serviceIndex === '' || serviceIndex === null || serviceIndex === undefined || !profile.services[Number(serviceIndex)]
      ? uid('service')
      : profile.services[Number(serviceIndex)].id,
    title,
    description,
    images: [...studentServiceImagesBuffer],
    videoLink,
    rate,
    availability,
    location: location || profile.location || '',
    reviews: (serviceIndex === '' || serviceIndex === null || serviceIndex === undefined || !profile.services[Number(serviceIndex)]) ? [] : (profile.services[Number(serviceIndex)].reviews || [])
  };
  if (serviceIndex === '' || serviceIndex === null || serviceIndex === undefined || !profile.services[Number(serviceIndex)]) profile.services.push(service);
  else profile.services[Number(serviceIndex)] = service;
  profile.title = profile.services[0]?.title || profile.title || 'Student Service';
  profile.rate = profile.services[0]?.rate || profile.rate || 20;
  profile.availability = profile.services[0]?.availability || profile.availability || '';
  saveStudents(students);
  closeModal();
  toast('Service saved.');
  renderDashboard();
}
function deleteStudentService(serviceIndex){
  const students = getStudents();
  const profile = students.find(s => s.id === (currentStudentProfile() || {}).id);
  if (!profile) return;
  profile.services = getRenderableStudentServices(profile).map((service, index) => normalizeStudentServiceRecord(profile, service, index));
  if (profile.services.length <= 1) return toast('Keep at least one service on your profile.');
  profile.services.splice(Number(serviceIndex), 1);
  profile.title = profile.services[0]?.title || profile.title;
  profile.rate = profile.services[0]?.rate || profile.rate;
  profile.availability = profile.services[0]?.availability || profile.availability;
  saveStudents(students);
  toast('Service deleted.');
  renderDashboard();
}
function deleteStudentProfile(profileId){
  const students = getStudents();
  const target = students.find(s => s.id === profileId);
  if (!target) return;
  target.status = 'archived';
  target.archivedAt = new Date().toISOString();
  target.archivedServices = (target.services || []).map(s => Object.assign({}, s));
  target.services = [];
  saveStudents(students);
  toast('Profile removed from public view.');
  renderDashboard();
}

function updateCompletionPreview(projectId){
  const p = getProjects().find(x => x.id === projectId);
  if (!p) return;
  const hours = Number(document.getElementById('finalHours').value || 0);
  const totalInput = document.getElementById('finalInvoiceTotal');
  if (totalInput) totalInput.value = `$${money(hours * (p.rate || 0))}`;
}
function submitFinalInvoice(projectId){
  const pList = getProjects();
  const p = pList.find(x => x.id === projectId);
  if (!p) return;
  const actualHours = Number(document.getElementById('finalHours').value || 0);
  if (!actualHours) return toast('Please enter actual hours.');
  const subtotal = Number((actualHours * p.rate).toFixed(2));
  const platformFee = Number((subtotal * PLATFORM_FEE_RATE).toFixed(2));
  const totalDue = Number((subtotal + platformFee).toFixed(2));
  const studentPayout = subtotal;
  const snapshot = p.projectSnapshot || {
    title: p.jobTitle,
    description: p.scope || p.description || '',
    rate: p.rate,
    location: p.location || '',
    estimatedHours: p.estimatedHours
  };
  p.actualHours = actualHours;
  p.finalSubtotal = subtotal;
  p.studentPayout = studentPayout;
  p.platformFee = platformFee;
  p.cogoFee = platformFee;
  p.finalTotal = totalDue;
  p.employerTotal = totalDue;
  p.finalInvoice = {
    title: snapshot.title,
    description: snapshot.description,
    rate: snapshot.rate,
    location: snapshot.location,
    actualHours,
    subtotal,
    studentPayout,
    platformFee,
    totalDue
  };
  p.status = 'awaiting_employer_approval';
  saveProjects(pList);
  pushNotif(p.employerId, `${currentUser.name} submitted final hours for "${p.jobTitle}". CoGo City commission (15%): $${platformFee.toFixed(2)}. Total due: $${totalDue.toFixed(2)}.`, { type:'dashboard', section:'applicants_projects', employerTab:'projects' });
  sendSystemMessage(p.employerId, p.employerName, `Final invoice submitted for "${p.jobTitle}": subtotal $${subtotal.toFixed(2)}, commission $${platformFee.toFixed(2)}, total due $${totalDue.toFixed(2)}.`, p.id);
  closeModal();
  toast('Final invoice submitted for employer approval.');
  renderDashboard();
}

function toggleEmpJobFields(){
  const fields = document.getElementById('empJobFields');
  const toggle = document.getElementById('empIsJob');
  if (!fields || !toggle) return;
  fields.classList.toggle('hidden', !toggle.checked);
  if (toggle.checked) syncJobDescriptionFromPost(true);
}
function syncJobDescriptionFromPost(force=false){
  const postInput = document.getElementById('empPostContent');
  const jobToggle = document.getElementById('empIsJob');
  const jobDescription = document.getElementById('empJobDescription');
  if (!postInput || !jobDescription || !jobToggle || !jobToggle.checked) return;
  if (force || !jobDescription.value.trim()) jobDescription.value = postInput.value || '';
}
function submitEmployerDashboardPost(){
  const content = (document.getElementById('empPostContent').value || '').trim();
  const isJobToggle = document.getElementById('empIsJob');
  const isJob = currentUser.role === 'employer' && !!(isJobToggle && isJobToggle.checked);
  if (!content) return toast('Please write a post.');
  if (!blockTextCheck(content)) return;
  const post = {
    id: uid('p'),
    authorId: currentUser.id,
    authorName: currentUser.name,
    authorEmoji: currentUser.emoji || '🏢',
    content,
    isJob,
    createdAt: new Date().toISOString(),
    likes: [],
    status: isJob ? 'open' : undefined
  };
  if (isJob){
    post.jobTitle = (document.getElementById('empJobTitle').value || '').trim();
    post.description = (document.getElementById('empJobDescription').value || '').trim();
    post.rate = Number(document.getElementById('empJobRate').value || 0);
    post.hoursNeeded = Number(document.getElementById('empJobHours').value || 0);
    post.location = (document.getElementById('empJobLocation').value || '').trim();
    if (!post.jobTitle || !post.description || !post.rate || !post.hoursNeeded || !post.location) {
      return toast('Please complete all job fields.');
    }
    if (!blockTextCheck(post.description)) return;
  }
  const posts = getPosts();
  posts.unshift(post);
  savePosts(posts);
  myPostsTab = 'all';
  toast('Post saved.');
  dashSection = 'myposts';
  renderDashboard();
}

function confirmSendOffer(appId){
  const apps = getApplications();
  const a = apps.find(x => x.id === appId);
  if (!a) return;
  const title = (document.getElementById('offerTitle').value || '').trim();
  const scope = (document.getElementById('offerScope').value || '').trim();
  const rate = Number(document.getElementById('offerRate').value || 0);
  const hours = Number(document.getElementById('offerHours').value || 0);
  const location = (document.getElementById('offerLocation').value || '').trim();
  if (!title || !scope || !rate || !hours || !location) return toast('Please complete all offer fields.');

    message:scope,
    rate,
    estimatedHours:hours,
    location,
    status:'offer_sent'
  });
  saveApplications(apps);
  pushNotif(a.studentUserId, `You have an offer for "${title}"`, { type:'dashboard', section:'jobs_bookings', studentJobsTab:'jobs' });
  closeModal();
  toast('Offer sent.');
  renderDashboard();
}
function startProject(appId){
  const apps = getApplications();
  const a = apps.find(x => x.id === appId);
  if (!a || a.status !== 'accepted') return toast('Student must accept first.');
  const projects = getProjects();
  if (projects.some(p => p.applicationId === appId)) {
    employerTab = 'projects';
    toast('Project already started.');
    return renderDashboard();
  }

  const estimatedSubtotal = Number((a.rate * a.estimatedHours).toFixed(2));
  const estimatedPlatformFee = Number((estimatedSubtotal * PLATFORM_FEE_RATE).toFixed(2));
  const estimatedEmployerTotal = Number((estimatedSubtotal + estimatedPlatformFee).toFixed(2));
  const paymentAttempt = attemptEscrowAuthorization(a, estimatedEmployerTotal);
  if (!paymentAttempt.success) {
    openPaymentFailureModal(appId, paymentAttempt.reason);
    return;
  }
  const projectSnapshot = {
    title: a.jobTitle,
    description: a.message,
    rate: a.rate,
    location: a.location,
    estimatedHours: a.estimatedHours
  };
  const contractHtml = `
    <div><strong>Work Agreement</strong></div>
    <div>Title: ${esc(projectSnapshot.title)}</div>
    <div>Description: ${esc(projectSnapshot.description)}</div>
    <div>Rate: $${esc(projectSnapshot.rate)}/hr</div>
    <div>Location: ${esc(projectSnapshot.location)}</div>
    <div>Estimated hours: ${esc(projectSnapshot.estimatedHours)}</div>
    <div>Work subtotal: $${esc(money(estimatedSubtotal))}</div>
    <div>CoGo City commission (15%): $${esc(money(estimatedPlatformFee))}</div>
    <div>Total charged on start: $${esc(money(estimatedEmployerTotal))}</div>
    <div>Status: In Progress</div>
    <div>Final hours may be adjusted and confirmed before payment release.</div>
  `;

  const projectId = uid('proj');
  projects.push({
    id: projectId,
    project_id: projectId,
    applicationId: a.id,
    job_id: a.postId || null,
    postId: a.postId || null,
    jobTitle: a.jobTitle,
    scope: a.message,
    employer_id: a.employerId,
    employerId: a.employerId,
    employerName: a.employerName,
    student_id: a.studentUserId,
    studentUserId: a.studentUserId,
    studentProfileId: a.studentProfileId || null,
    studentServiceId: a.studentServiceId || null,
    studentServiceTitle: a.studentServiceTitle || '',
    studentName: a.studentName,
    rate: a.rate,
    agreedPrice: estimatedSubtotal,
    duration: a.estimatedHours || null,
    estimatedHours: a.estimatedHours,
    estimatedTotal: estimatedSubtotal,
    estimatedPlatformFee,
    estimatedEmployerTotal,
    location: a.location,
    projectSnapshot,
    escrowAmount: estimatedEmployerTotal,
    escrowStatus: paymentAttempt.escrowStatus || 'held',
    escrowProvider: paymentAttempt.provider || 'placeholder',
    status: 'in_progress',
    contractHtml,
    createdAt: new Date().toISOString()
  });
  a.status = 'project_started';
  saveApplications(apps);
  saveProjects(projects);
  attachMessagesToProject(projectId, a.employerId, a.studentUserId);
  pushNotif(a.studentUserId, `Project started for "${a.jobTitle}". Escrow of $${money(estimatedEmployerTotal)} is held.`, { type:'dashboard', section:'jobs_bookings', studentJobsTab:'projects' });
  sendSystemMessage(a.studentUserId, a.studentName, `Project started: escrow of $${money(estimatedEmployerTotal)} is held and work is now in progress.`, projectId);
  employerTab = 'projects';
  toast('Project started successfully');
  renderDashboard();
}

function activateProject(projectId){
  const projects = getProjects();
  const p = projects.find(x => x.id === projectId);
  if (!p) return;
  p.status = 'in_progress';
  p.escrowStatus = 'held';
  saveProjects(projects);

  const apps = getApplications();
  const a = apps.find(x => x.id === p.applicationId);
  if (a) {
    a.status = 'project_started';
    saveApplications(apps);
  }

  pushNotif(p.studentUserId, `Project started for "${p.jobTitle}"`, { type:'dashboard', section:'jobs_bookings', studentJobsTab:'projects' });
  employerTab = 'projects';
  toast('Project started successfully');
  renderDashboard();
}
function fundEscrow(projectId){
  activateProject(projectId);
}
function markInProgress(projectId){
  activateProject(projectId);
}

  const platformFee = Number(p.platformFee || (Number(subtotal) * PLATFORM_FEE_RATE)).toFixed(2);
  const totalDue = Number(p.finalTotal || (Number(subtotal) + Number(platformFee))).toFixed(2);

        <div><strong>Actual Hours Worked:</strong> ${esc(p.actualHours || 0)}</div>
      </div>
      <div class="small"><strong>Escrow held on start:</strong> $${esc(escrowHeld)}</div>
      <div class="small"><strong>Project subtotal:</strong> $${esc(subtotal)}</div>
      <div class="small"><strong>CoGo Commission (15%):</strong> $${esc(platformFee)}</div>
      <div class="small"><strong>Total Due:</strong> $${esc(totalDue)}</div>
      <div class="warning" style="margin-top:12px">${STRIPE_ENABLED ? `Approving will capture the held funds and split the payment.` : `Test mode is active, so approval will always release payment successfully.`}</div>
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
        <button class="btn btn-green" onclick="approveFinalInvoice('${esc(projectId)}')">Approve & Release Payment</button>
        <button class="btn btn-outline" onclick="openRequestChangesModal('${esc(projectId)}')">Request Changes</button>
      </div>
    </div>
  `, '620px');

function approveFinalInvoice(projectId){
  const projects = getProjects();
  const p = projects.find(x => x.id === projectId);
  if (!p) return;
  const now = new Date().toISOString();
  p.status = 'completed';
  p.completedAt = now;
  p.escrowStatus = 'released';
  p.paid = true;
  p.paymentReleasedAt = now;

  const agreedLabor = Number(p.agreedPrice || p.estimatedTotal || 0);
  const baseline = Number((agreedLabor + (agreedLabor * PLATFORM_FEE_RATE)).toFixed(2));
  const diff = Number((p.finalTotal - baseline).toFixed(2));
  p.reconciliation = diff === 0
    ? `Final invoice approved at $${p.finalTotal}.`
    : diff < 0
      ? `Final invoice approved at $${p.finalTotal}, which is $${Math.abs(diff).toFixed(2)} below the agreed amount.`
      : `Final invoice approved at $${p.finalTotal}, which is $${diff.toFixed(2)} above the agreed amount.`;

  const students = getStudents();
  const student = students.find(s => s.userId === p.studentUserId);
  if (student) {
    student.balance = Number((Number(student.balance || 0) + Number(p.studentPayout || 0)).toFixed(2));
    saveStudents(students);
  }
  const finance = getFinance();
  finance.cogoCommission = Number((Number(finance.cogoCommission || 0) + Number(p.platformFee || 0)).toFixed(2));
  finance.completedProjects = Number(finance.completedProjects || 0) + 1;
  saveFinance(finance);

  const transactions = getTransactions();
  const transactionId = uid('tx');
  transactions.unshift({
    id: transactionId,
    transaction_id: transactionId,
    student_id: p.studentUserId,
    studentProfileId: p.studentProfileId || null,
    studentServiceId: p.studentServiceId || null,
    studentServiceTitle: p.studentServiceTitle || '',
    job_id: p.id,
    employer_id: p.employerId,
    employerName: p.employerName,
    studentName: p.studentName,
    job_title: p.jobTitle,
    hourly_rate: Number(p.rate || 0),
    hours_worked: Number(p.actualHours || 0),
    total_amount: Number(p.finalTotal || 0),
    platform_fee: Number(p.platformFee || 0),
    payout_amount: Number(p.studentPayout || 0),
    status: 'paid',
    status_history: ['processing','paid'],
    date_started: p.createdAt || now,
    date_completed: p.completedAt || now,
    date_paid: now
  });
  saveTransactions(transactions);

  saveProjects(projects);
  pushNotif(p.employerId, `You paid $${money(p.finalTotal || 0)} total for ${p.studentName}'s project, including a 15% CoGo City commission of $${money(p.platformFee || 0)}.`, { type:'dashboard', section:'applicants_projects', employerTab:'projects' });
  pushNotif(p.studentUserId, `You’ve been paid $${money(p.studentPayout || 0)} for '${p.jobTitle}'`, { type:'dashboard', section:'settings' });
  sendSystemMessage(p.studentUserId, p.studentName, `You’ve been paid $${money(p.studentPayout || 0)} for '${p.jobTitle}'.`, p.id);
  pushAdminCommissionNotification(p);
  pushNotif(p.employerId, `Leave a review for ${p.studentName}`, { type:'dashboard', section:'applicants_projects', employerTab:'projects' });
  closeModal();
  toast('Payment released and project completed.');
  renderDashboard();
}
function openRequestChangesModal(projectId){
  openModal('Request Changes', `
    <div class="field"><label>What should change?</label><textarea id="requestChangesNote" placeholder="Explain what needs to be updated..."></textarea></div>
    <button class="btn btn-outline" onclick="submitProjectChangeRequest('${esc(projectId)}')">Send Request</button>
  `, '620px');
}
function submitProjectChangeRequest(projectId){
  const projects = getProjects();
  const p = projects.find(x => x.id === projectId);
  if (!p) return;
  const note = (document.getElementById('requestChangesNote').value || '').trim();
  p.status = 'in_progress';
  p.changeRequestNote = note;
  saveProjects(projects);
  pushNotif(p.studentUserId, `${p.employerName} requested changes on "${p.jobTitle}"`, { type:'dashboard', section:'jobs_bookings', studentJobsTab:'projects' });
  sendSystemMessage(p.studentUserId, p.studentName, `Please update the final invoice for "${p.jobTitle}".${note ? ' Note: ' + note : ''}`, p.id);
  closeModal();
  toast('Change request sent to student.');
  renderDashboard();
}
function openReviewModal(projectId){
  openModal('Leave a Review', `
    <div class="warning" style="margin-bottom:14px">
      Please take a moment to leave a review for the student. Your feedback builds their confidence, provides guidance, and is visible to others, helping them grow and build a strong reputation.
    </div>
    <div class="field"><label>Rating</label><select id="reviewRating"><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
    <div class="field"><label>Review</label><textarea id="reviewComment" placeholder="Share your feedback..."></textarea></div>
    <button class="btn btn-blue" onclick="submitReview('${esc(projectId)}')">Submit Review</button>
  `, '620px');
}
function submitReview(projectId){
  const projects = getProjects();
  const p = projects.find(x => x.id === projectId);
  if (!p) return toast('Project not found.');
  if (p.reviewSubmitted) return toast('Review already submitted.');
  const ratingEl = document.getElementById('reviewRating');
  const commentEl = document.getElementById('reviewComment');
  if (!ratingEl || !commentEl) return toast('Review form is not available. Please reopen it and try again.');
  const students = getStudents();
  const student = students.find(s => s.id === p.studentProfileId) || students.find(s => s.userId === p.studentUserId && s.status !== 'archived');
  if (!student) return toast('Student profile not found.');
  const rating = Number(ratingEl.value || 5);
  const comment = (commentEl.value || '').trim();
  const review = { id: uid('review'), reviewerId: currentUser.id, reviewerName: currentUser.publicName || currentUser.name, rating, comment, projectId, createdAt: new Date().toISOString(), studentServiceId: p.studentServiceId || null };
  student.services = getRenderableStudentServices(student).map((service, index) => normalizeStudentServiceRecord(student, service, index));
  const services = student.services || [];
  const targetService = services.find(service => service.id === p.studentServiceId) || services[0] || null;
  if (targetService) {
    targetService.reviews = targetService.reviews || [];
    targetService.reviews.unshift(review);
    if (!p.studentServiceId) p.studentServiceId = targetService.id;
    if (!p.studentServiceTitle) p.studentServiceTitle = targetService.title || '';
  } else {
    student.reviews = student.reviews || [];
    student.reviews.unshift(review);
  }
  p.reviewSubmitted = true;
  saveStudents(students);
  saveProjects(projects);
  try {
    sendSystemMessage(
      p.studentUserId,
      p.studentName,
      `${currentUser.name} left a ${rating}/5 review on your ${(p.studentServiceTitle || student.title || 'student service')}${comment ? `: ${comment}` : '.'}`,
      p.id
    );
  } catch (err) {
    console.error('Review notification failed', err);
  }
  closeModal();
  toast('Review submitted.');
  renderDashboard();
}

// ---------- Messages ----------
function openThread(userId){
  dashSection = 'messages';
  activeThreadUserId = userId;
  renderDashboard();
}
function openMessagePartnerProfile(userId){
  const student = getStudentByUserId(userId);
  if (!student) return;
  openProfile(student.id);
}
function renderMessagePartnerName(userId, name, compact=false){
  const student = getStudentByUserId(userId);
  if (!student) return `<span>${esc(name)}</span>`;
  return `<button class="link-btn" style="font-weight:${compact ? 800 : 700};text-align:left" onclick="event.stopPropagation();openMessagePartnerProfile('${esc(userId)}')">${esc(name)}</button>`;
}
function renderMessages(el){
  const all = getMessages();
  const me = currentUser.id;
  const threads = {};

  all.forEach(m => {
    const partnerId = m.fromId === me ? m.toId : (m.toId === me ? m.fromId : null);
    if (!partnerId) return;
    if (!threads[partnerId] || new Date(m.createdAt) > new Date(threads[partnerId].createdAt)) {
      threads[partnerId] = {
        partnerId,
        partnerName: m.fromId === me ? m.toName : m.fromName,
        preview: m.content,
        createdAt: m.createdAt,
        unread: 0
      };
    }
    if (m.toId === me && !m.read) threads[partnerId].unread++;
  });

  const threadList = Object.values(threads).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));

  if (!activeThreadUserId && threadList.length) activeThreadUserId = threadList[0].partnerId;

  el.innerHTML = `
    <div class="section-title">Messages</div>
    <div class="msg-shell">
      <div class="thread-list">
        ${threadList.length ? threadList.map(t => `
          <div class="thread ${t.unread ? 'unread' : ''}" onclick="activeThreadUserId='${esc(t.partnerId)}';renderDashboard()">
            <div style="display:flex;align-items:center;gap:6px;font-weight:800">${renderMessagePartnerName(t.partnerId, t.partnerName, true)} ${t.unread ? `<span style="color:#ef4444">•</span>` : ''}</div>
            <div class="muted small">${esc(t.preview.slice(0,60))}</div>
          </div>
        `).join('') : `<div class="form-card muted">No messages yet.</div>`}
      </div>
      <div class="thread-view">
        ${activeThreadUserId ? renderThreadView(activeThreadUserId) : `<div class="form-card muted">Select a conversation.</div>`}
      </div>
    </div>
  `;
}
function renderThreadView(userId){
  const partner = getUserById(userId) || { id:userId, name:'User' };
  const activeProject = getProjectForUsers(currentUser.id, userId);
  const all = getMessages();
  let changed = false;
  all.forEach(m => {
    if (m.toId === currentUser.id && m.fromId === userId && !m.read){
      m.read = true;
      changed = true;
    }
  });
  if (changed) {
    saveMessages(all);
    renderNav();
  }

  const partnerMsgs = all
    .filter(m => (m.fromId === currentUser.id && m.toId === userId) || (m.fromId === userId && m.toId === currentUser.id));
  const msgs = (activeProject
    ? partnerMsgs.filter(m => m.projectId === activeProject.id)
    : partnerMsgs)
    .sort((a,b) => new Date(a.createdAt)-new Date(b.createdAt));

  return `
    <div style="padding:14px 16px;border-bottom:1px solid var(--border);font-weight:800">${renderMessagePartnerName(partner.id, partner.name)}${activeProject ? `<div class="muted small" style="font-weight:600;margin-top:4px">Project thread: ${esc(activeProject.jobTitle)}</div>` : ''}</div>
    <div class="messages" id="messages-box">
      ${msgs.length ? msgs.map(m => `
        <div class="bubble ${m.fromId === currentUser.id ? 'mine' : 'theirs'}">
          ${esc(m.content)}
          <div style="font-size:.7rem;opacity:.7;margin-top:6px">${timeAgo(m.createdAt)}</div>
        </div>
      `).join('') : `<div class="muted small">No messages yet. Say hello.</div>`}
    </div>
    <div class="warning" style="margin:0 12px 8px">${activeProject ? 'This conversation is now locked to the active project thread.' : 'Phone numbers and email addresses are blocked until work is confirmed.'}</div>
    <div class="msg-compose">
      <input id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter'){sendMessageToActive()}">
      <button class="btn btn-blue btn-sm" onclick="sendMessageToActive()">Send</button>
    </div>
  `;
}
function sendMessageToActive(){
  if (!activeThreadUserId) return;
  const input = document.getElementById('msgInput');
  const content = (input.value || '').trim();
  if (!content) return;
  if (!blockTextCheck(content)) return;
  const partner = getUserById(activeThreadUserId) || { id:activeThreadUserId, name:'User' };
  const activeProject = getProjectForUsers(currentUser.id, partner.id);
  const msgs = getMessages();
  msgs.push({
    id: uid('m'),
    fromId: currentUser.id,
    fromName: currentUser.name,
    toId: partner.id,
    toName: partner.name,
    content,
    projectId: activeProject ? activeProject.id : null,
    createdAt: new Date().toISOString(),
    read: false
  });
  saveMessages(msgs);
  input.value = '';
  renderDashboard();
}
function sendSystemMessage(toId, toName, content, projectId=null){
  const msgs = getMessages();
  msgs.push({
    id: uid('m'),
    fromId: currentUser.id,
    fromName: currentUser.name,
    toId,
    toName,
    content,
    projectId,
    createdAt: new Date().toISOString(),
    read: false
  });
  saveMessages(msgs);
}

function renderAdminPanel(el){
  const archivedProfiles = getStudents().filter(s => s.status === 'archived');
  const archivedUsers = getUsers().filter(u => u.archived);
  const finance = getFinance();
  el.innerHTML = `
    <div class="section-title">Admin Panel</div>
    <div class="grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:18px">
      <div class="card form-card"><div class="small muted">Archived Profiles</div><div style="font-size:1.5rem;font-weight:800">${archivedProfiles.length}</div></div>
      <div class="card form-card"><div class="small muted">Archived Users</div><div style="font-size:1.5rem;font-weight:800">${archivedUsers.length}</div></div>
      <div class="card form-card"><div class="small muted">CoGo Commission</div><div style="font-size:1.5rem;font-weight:800">$${money(finance.cogoCommission || 0)}</div></div>
    </div>
    <div class="card form-card">
      <div style="font-weight:800;margin-bottom:12px">Archived Profiles & Services</div>
      ${archivedProfiles.length ? archivedProfiles.map(profile => `
        <div class="card item-card" style="margin-bottom:12px">
          <div style="font-weight:800">${esc(profile.name)}</div>
          <div class="small muted">Archived ${profile.archivedAt ? timeAgo(profile.archivedAt) : ''}</div>
          <div class="small muted" style="margin-top:6px">Services kept for admin: ${esc(((profile.archivedServices || []).length || 0))}</div>
          ${((profile.archivedServices || []).length ? `<div style="margin-top:8px">${(profile.archivedServices || []).map(service => `<div class="small">• ${esc(service.title || 'Service')}</div>`).join('')}</div>` : `<div class="small muted" style="margin-top:8px">No archived services.</div>`) }
        </div>
      `).join('') : `<div class="muted">No archived profiles yet.</div>`}
    </div>
  `;
}

// ---------- Settings ----------
function formatTransactionDate(value){
  if (!value) return '—';
  return new Date(value).toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function getCurrentUserTransactions(){
  const all = getTransactions();
  return all.filter(tx => tx.student_id === currentUser.id);
}
function renderTransactionsPanel(){
  const wrap = document.getElementById('transactions-panel');
  if (!wrap) return;
  const query = (settingsTransactionQuery || '').trim().toLowerCase();
  const rows = getCurrentUserTransactions().filter(tx => {
    const haystack = [
      tx.job_title,
      tx.employerName,
      tx.payout_amount,
      tx.hourly_rate,
      tx.hours_worked,
      formatTransactionDate(tx.date_completed),
      formatTransactionDate(tx.date_paid)
    ].join(' ').toLowerCase();
    return !query || haystack.includes(query);
  }).sort((a,b) => new Date(b.date_paid || b.date_completed || 0) - new Date(a.date_paid || a.date_completed || 0));

  wrap.innerHTML = `
    <div class="card form-card" style="margin-top:18px">
      <div class="split" style="align-items:flex-start;margin-bottom:14px">
        <div>
          <div class="section-title" style="margin:0 0 6px">My Transactions</div>
          <div class="small muted">Available Balance: $0.00</div>
          <div class="small muted">Stripe connection and live balance are placeholders for now.</div>
        </div>
        <div style="min-width:260px">
          <input id="transactionsSearch" placeholder="Search by date, amount, job title, or employer name" value="${esc(settingsTransactionQuery)}" oninput="settingsTransactionQuery=this.value;renderTransactionsPanel()">
        </div>
      </div>
      ${rows.length ? `
        <div style="overflow:auto">
          <table style="width:100%;border-collapse:collapse;font-size:.92rem">
            <thead>
              <tr style="text-align:left;border-bottom:1px solid var(--border)">
                <th style="padding:10px 8px">Date Completed</th>
                <th style="padding:10px 8px">Job Title</th>
                <th style="padding:10px 8px">Student Rate</th>
                <th style="padding:10px 8px">Final Hours Worked</th>
                <th style="padding:10px 8px">Amount Received</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(tx => `
                <tr style="border-bottom:1px solid var(--border)">
                  <td style="padding:12px 8px">${esc(formatTransactionDate(tx.date_completed))}</td>
                  <td style="padding:12px 8px">${esc(tx.job_title || '')}</td>
                  <td style="padding:12px 8px">$${esc(Number(tx.hourly_rate || 0).toFixed(2))}/hr</td>
                  <td style="padding:12px 8px">${esc(tx.hours_worked || 0)} hrs</td>
                  <td style="padding:12px 8px">$${esc(Number(tx.payout_amount || 0).toFixed(2))}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      ` : `<div class="muted">No transactions yet.</div>`}
    </div>
  `;
}
function renderSettings(el){
  const paymentMethod = getEmployerPaymentMethod(currentUser.id);
  el.innerHTML = `
    <div class="section-title">Settings</div>
    <div id="transactions-panel"></div>
    <div class="card form-card" style="margin-top:18px;max-width:720px">
      <div style="font-weight:800;font-size:1.05rem;margin-bottom:12px">My Password</div>
      <div class="field"><label>Current Password</label><input id="currentPassword" type="password" placeholder="Current password"></div>
      <div class="field"><label>New Password</label><input id="newPassword" type="password" placeholder="New password"></div>
      <div class="field"><label>Confirm New Password</label><input id="confirmNewPassword" type="password" placeholder="Confirm new password"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        <button class="btn btn-blue" onclick="changePassword()">Change Password</button>
        <button class="btn btn-danger" onclick="deleteCurrentProfile()">Delete Profile</button>
      </div>
      <div class="warning" style="margin-bottom:14px">If you delete your profile, your profile and all associated services will be permanently removed and will no longer be visible to other users.</div>
      ${currentUser.role === 'employer' ? `
        <div class="small muted" style="margin-bottom:8px">Payment Method</div>
        <div class="field"><input value="${paymentMethod ? esc(paymentMethod.brand + ' •••• ' + paymentMethod.last4) : 'Visa •••• 4242'}" readonly></div>
        <button class="btn btn-outline" onclick="openPaymentMethodModal()">Update Payment Method</button>
      ` : ''}
    </div>
  `;
  renderTransactionsPanel();
}
function changePassword(){
  const users = getUsers();
  const user = users.find(x => x.id === currentUser.id);
  if (!user) return;
  const currentPassword = document.getElementById('currentPassword').value || '';
  const newPassword = document.getElementById('newPassword').value || '';
  const confirmNewPassword = document.getElementById('confirmNewPassword').value || '';
  if (currentPassword !== user.password) return toast('Current password is incorrect.');
  if (!newPassword || newPassword.length < 6) return toast('New password must be at least 6 characters.');
  if (newPassword !== confirmNewPassword) return toast('New passwords do not match.');
  user.password = newPassword;
  saveUsers(users);
  setCurrentUser(user);
  toast('Password updated.');
  renderSettings(document.getElementById('dash-main'));
}
function deleteCurrentProfile(){
  if (!confirm('If you delete your profile, your profile and all associated services will be permanently removed and will no longer be visible to other users.')) return;
  const users = getUsers();
  const user = users.find(x => x.id === currentUser.id);
  if (!user) return;
  user.archived = true;
  user.archivedAt = new Date().toISOString();
  saveUsers(users);
  if (currentUser.role === 'student') {
    const students = getStudents();
    students.filter(s => s.userId === currentUser.id).forEach(s => {
      s.status = 'archived';
      s.archivedAt = new Date().toISOString();
      s.archivedServices = (s.services || []).map(service => Object.assign({}, service));
      s.services = [];
    });
    saveStudents(students);
  }
  signOut();
  toast('Profile deleted from public view.');
}

seedData();
loadCurrentUser();
renderPage();
