  el.innerHTML = value ? renderManagedImage(value, 'Featured image', 'width:100%;max-width:420px;border-radius:14px;border:1px solid var(--border)', 'full', 'loading="eager"') : `<div class="small muted">No featured image yet.</div>`;
}
function clearAdminBlogFeaturedImage(){
  if (!adminBlogDraft) return;
  adminBlogDraft.featuredImage = '';
  adminBlogDraft.image_id = '';
  const input = document.getElementById('adminBlogFeaturedImage');
  if (input) input.value = '';
  previewAdminBlogFeaturedImage('');
}
function handleAdminBlogFeaturedImageUpload(input){
  if (!adminBlogDraft) return;
  syncAdminBlogDraftFromForm();
  const file = input && input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    adminBlogDraft.featuredImage = upsertImageRecord(reader.result, { source:'article_featured', entity_type:'article', entity_id: adminBlogDraft.id || '' });
    adminBlogDraft.image_id = adminBlogDraft.featuredImage;
    reopenAdminBlogEditor();
  };
  reader.readAsDataURL(file);
}
function setAdminBlogFeaturedImageFromLibrary(imageId){
  if (!adminBlogDraft) adminBlogDraft = createAdminBlogDraft();
  syncAdminBlogDraftFromForm();
  adminBlogDraft.featuredImage = imageId;
  adminBlogDraft.image_id = imageId;
  reopenAdminBlogEditor();
}
function clearAdminBlogVideo(){
  if (!adminBlogDraft) return;
  adminBlogDraft.video_url = '';
  const input = document.getElementById('adminBlogVideoLink');
  if (input) input.value = '';
  previewAdminBlogVideoLink('');
}
function handleAdminBlogVideoUpload(input){
  if (!adminBlogDraft) return;
  syncAdminBlogDraftFromForm();
  const file = input && input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    adminBlogDraft.video_url = reader.result;
    reopenAdminBlogEditor();
  };
  reader.readAsDataURL(file);
}
function clearAdminBlogImages(){
  if (!adminBlogDraft) return;
  adminBlogDraft.articleMediaImage = '';
  const el = document.getElementById('admin-blog-images-preview');
  const input = document.getElementById('adminBlogArticleImage');
  if (input) input.value = '';
  if (el) el.innerHTML = `<div class="small muted">No article image yet.</div>`;
}
function previewAdminBlogArticleImage(value){
  if (adminBlogDraft) adminBlogDraft.articleMediaImage = value || '';
  const el = document.getElementById('admin-blog-images-preview');
  if (!el) return;
  el.innerHTML = value ? renderManagedImage(value, 'Article image', 'width:100%;max-width:420px;border-radius:14px;border:1px solid var(--border)', 'full', 'loading="eager"') : `<div class="small muted">No article image yet.</div>`;
}
function handleAdminBlogImagesUpload(input){
  if (!adminBlogDraft) return;
  syncAdminBlogDraftFromForm();
  readImagesToDataUrls(input, (images) => {
    adminBlogDraft.articleMediaImage = images[0] || '';
    reopenAdminBlogEditor();
  }, 1);
}
function addAdminBlogImageFromLibrary(imageId){
  if (!adminBlogDraft) adminBlogDraft = createAdminBlogDraft();
  syncAdminBlogDraftFromForm();
  adminBlogDraft.articleMediaImage = imageId || '';
  reopenAdminBlogEditor();
}
function previewAdminBlogVideoLink(value){
  if (adminBlogDraft) adminBlogDraft.video_url = value || '';
  const el = document.getElementById('admin-blog-video-preview');
  if (el) el.innerHTML = renderVideoPreviewHtml(value || '', 'Article video');
}
function persistAdminBlogPost(mode='draft'){
  if (!adminBlogDraft) return;
  syncAdminBlogDraftFromForm();
  if (!adminBlogDraft.title.trim()) return toast('Article title is required.');
  adminBlogDraft.slug = ensureUniqueBlogSlug(adminBlogDraft.slug || adminBlogDraft.title, adminBlogDraft.id);
  if (!adminBlogDraft.excerpt.trim()) adminBlogDraft.excerpt = stripHtmlTags(adminBlogDraft.content || '').slice(0, 240);
  adminBlogDraft.publishRequested = mode === 'publish';
  adminBlogDraft.status = getBlogPostStatus(adminBlogDraft);
  adminBlogDraft.link = `#/blog/${adminBlogDraft.slug}`;
  adminBlogDraft.image_id = adminBlogDraft.featuredImage || adminBlogDraft.image_id || '';
  adminBlogDraft.featuredImage = adminBlogDraft.image_id;
  adminBlogDraft.articleMediaImage = adminBlogDraft.articleMediaImage || '';
  adminBlogDraft.video_url = adminBlogDraft.video_url || '';
  adminBlogDraft.updatedAt = new Date().toISOString();
  const posts = getBlogPosts();
  const index = posts.findIndex(post => String(post.id) === String(adminBlogDraft.id));
  if (index >= 0) posts[index] = normalizeBlogPostRecord(adminBlogDraft);
  else posts.unshift(normalizeBlogPostRecord(adminBlogDraft));
  saveBlogPosts(posts);
  const statusLabel = getBlogPostStatusLabel(adminBlogDraft);
  closeModal();
  adminBlogDraft = null;
  toast(mode === 'publish' ? (statusLabel === 'Published' ? 'Article published.' : 'Article scheduled. It will publish on the selected date.') : 'Draft saved.');
  renderDashboard();
}
function saveAdminBlogPost(){
  persistAdminBlogPost('draft');
}
function publishAdminBlogPost(){
  persistAdminBlogPost('publish');
}
function deleteAdminBlogPost(postId){
  const post = getBlogPosts().find(item => String(item.id) === String(postId));
  if (!post) return toast('Article not found.');
  if (!confirm(`Delete "${stripHtmlTags(post.title)}"?`)) return;
  saveBlogPosts(getBlogPosts().filter(item => String(item.id) !== String(postId)));
  toast('Blog article deleted.');
  renderDashboard();
}
function handleAdminBlogSearchInput(value=''){
  adminBlogQuery = value || '';
  renderAdminBlogResults();
}
function renderAdminBlogResults(){
  const wrap = document.getElementById('admin-blog-results');
  if (!wrap) return;
  const posts = getFilteredAdminBlogPosts();
  wrap.innerHTML = posts.length ? posts.map(post => {
    const statusLabel = getBlogPostStatusLabel(post);
    const excerpt = stripHtmlTags(post.excerpt || post.content || '');
    const canView = getBlogPostStatus(post) === 'published';
    return `
      <div class="card item-card" style="margin-bottom:12px">
        <div style="font-weight:800;font-size:1.05rem">${esc(stripHtmlTags(post.title || 'Untitled Article'))}</div>
        <div class="small muted" style="margin-top:6px">/${esc(post.slug || '')} · ${esc(formatBlogDate(post.date))}</div>
        <div class="small muted" style="margin-top:8px">${esc(excerpt.slice(0, 180))}${excerpt.length > 180 ? '…' : ''}</div>
        <div class="small" style="margin-top:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${canView ? `<button class="btn btn-outline btn-sm" type="button" onclick="location.hash='#/blog/${esc(post.slug)}';renderPage()">View</button>` : `<span class="muted">View</span>`}
          <span class="muted">|</span>
          <button class="btn btn-outline btn-sm" type="button" onclick="openAdminBlogEditor('${esc(String(post.id))}')">Edit</button>
          <span class="muted">|</span>
          <button class="btn btn-danger btn-sm" type="button" onclick="deleteAdminBlogPost('${esc(String(post.id))}')">Delete</button>
          <span class="muted">|</span>
          <span style="font-weight:800">${esc(statusLabel)}</span>
        </div>
      </div>
    `;
  }).join('') : `<div class="muted">No blog articles match this search.</div>`;
}
function renderAdminBlogManager(el){
  const total = getBlogPosts().length;
  const published = getPublicBlogPosts().length;
  const drafts = total - published;
  el.innerHTML = `
    <div class="split" style="align-items:flex-start;margin-bottom:18px;gap:14px">
      <div>
        <div class="section-title" style="margin:0">Blog Manager</div>
        <div class="small muted">Create, edit, and manage blog articles with text, images, and video from the admin dashboard.</div>
      </div>
      <button class="btn btn-blue" type="button" onclick="openAdminBlogEditor()">Create New Article</button>
    </div>
    <div class="grid" style="grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px">
      <div class="card form-card"><div class="small muted">Total Articles</div><div style="font-size:1.5rem;font-weight:800">${total}</div></div>
      <div class="card form-card"><div class="small muted">Published Articles</div><div style="font-size:1.5rem;font-weight:800">${published}</div></div>
      <div class="card form-card"><div class="small muted">Draft Articles</div><div style="font-size:1.5rem;font-weight:800">${drafts}</div></div>
    </div>
    <div class="card form-card" style="margin-bottom:18px">
      <div class="field" style="margin:0"><label>Search Articles</label><input id="adminBlogQueryInput" value="${esc(adminBlogQuery)}" placeholder="Search by title, slug, or content" oninput="handleAdminBlogSearchInput(this.value)"></div>
    </div>
    <div class="card form-card" id="admin-blog-results"></div>
  `;
  renderAdminBlogResults();
}
function renderAdminImagesSection(el){
  const images = getImages().sort((a,b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));
  el.innerHTML = `
    <div class="split" style="align-items:flex-start;margin-bottom:18px;gap:14px">
      <div>
        <div class="section-title" style="margin:0">Images</div>
        <div class="small muted">All uploaded and imported images are centralized here for reuse across profiles, services, and blog articles.</div>
      </div>
      <div class="small muted">${images.length} image${images.length === 1 ? '' : 's'}</div>
    </div>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px">
      ${images.length ? images.map(image => {
        const usage = getImageUsageDetails(image.id);
        return `
        <div class="card form-card">
          <div style="margin-bottom:12px">${renderManagedImage(image.id, image.alt || 'Library image', 'width:100%;height:160px;object-fit:cover;border-radius:14px;border:1px solid var(--border)', 'thumb')}</div>
          <div class="small muted" style="word-break:break-word;margin-bottom:6px">${esc(image.id)}</div>
          <div class="small muted" style="word-break:break-word;margin-bottom:12px">${esc(image.url)}</div>
          ${usage.length ? `<div class="small muted" style="margin-bottom:12px">In use, cannot delete</div>` : ''}
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-outline btn-sm" type="button" onclick="viewImageFromLibrary('${esc(image.id)}')">View</button>
            <button class="btn btn-outline btn-sm" type="button" onclick="copyImageUrl('${esc(image.id)}')">Copy URL</button>
            <button class="btn btn-danger btn-sm" type="button" ${usage.length ? 'disabled' : ''} onclick="deleteImageFromLibrary('${esc(image.id)}')">Delete</button>
          </div>
        </div>
      `}).join('') : `<div class="card form-card muted">No images in the library yet.</div>`}
    </div>
  `;
}

// ---------- Settings ----------
function formatTransactionDate(value){
  if (!value) return '—';
  return new Date(value).toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function getCurrentUserTransactions(){
  const all = getTransactions();
  if (currentUser.role === 'admin') return all;
  if (currentUser.role === 'employer') return all.filter(tx => tx.employer_id === currentUser.id);
  return all.filter(tx => tx.student_id === currentUser.id);
}
function renderTransactionsPanel(){
  const wrap = document.getElementById('transactions-panel');
  if (!wrap) return;
  const isAdmin = currentUser.role === 'admin';
  const isEmployer = currentUser.role === 'employer';
  const title = isAdmin ? 'Transactions' : 'My Transactions';
  const helper = isAdmin
    ? 'Admin view shows total Platform Fee collected from both sides.'
    : isEmployer
      ? 'Review completed job payments, including your Platform Fee and final payment.'
      : 'Review completed job payouts, including your Platform Fee and final payout.';
  wrap.innerHTML = `
    <div class="card form-card" style="margin-top:18px">
      <div class="split" style="align-items:flex-start;margin-bottom:14px">
        <div>
          <div class="section-title" style="margin:0 0 6px">${title}</div>
          <div class="small muted">${helper}</div>
          ${currentUser.role === 'student' ? `<div class="small muted">Stripe connection and live balance are placeholders for now.</div>` : ''}
        </div>
        <div style="min-width:260px">
          <input id="transactionsSearch" placeholder="Search by date, amount, job title, or name" value="${esc(settingsTransactionQuery)}" oninput="settingsTransactionQuery=this.value;renderTransactionsResults()">
        </div>
      </div>
      <div id="transactions-summary"></div>
      <div id="transactions-results"></div>
    </div>
  `;
  renderTransactionsResults();
}
function renderTransactionsResults(){
  const summaryWrap = document.getElementById('transactions-summary');
  const resultsWrap = document.getElementById('transactions-results');
  if (!summaryWrap || !resultsWrap) return;
  const query = (settingsTransactionQuery || '').trim().toLowerCase();
  const rows = getCurrentUserTransactions().filter(tx => {
    const haystack = [
      tx.job_title,
      tx.employerName,
      tx.studentName,
      tx.payout_amount,
      tx.total_amount,
      tx.work_total,
      tx.student_platform_fee,
      tx.employer_platform_fee,
      tx.platform_fee_total,
      tx.hourly_rate,
      tx.hours_worked,
      formatTransactionDate(tx.date_completed),
      formatTransactionDate(tx.date_paid)
    ].join(' ').toLowerCase();
    return !query || haystack.includes(query);
  }).sort((a,b) => new Date(b.date_paid || b.date_completed || 0) - new Date(a.date_paid || a.date_completed || 0));

  const isAdmin = currentUser.role === 'admin';
  const isEmployer = currentUser.role === 'employer';
  const totalWork = rows.reduce((sum, tx) => sum + Number(tx.work_total || 0), 0);
  const totalPayout = rows.reduce((sum, tx) => sum + Number(tx.payout_amount || 0), 0);
  const totalPaid = rows.reduce((sum, tx) => sum + Number(tx.total_amount || 0), 0);
  const totalPlatformFees = rows.reduce((sum, tx) => sum + Number(tx.platform_fee_total || 0), 0);
  const roleSummary = isAdmin
    ? `<div class="card" style="padding:14px;margin-bottom:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Total Platform Fees</div><div style="font-weight:800;font-size:1.2rem">$${money(totalPlatformFees)}</div></div>`
    : isEmployer
      ? `<div class="card" style="padding:14px;margin-bottom:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Total Paid</div><div style="font-weight:800;font-size:1.2rem">$${money(totalPaid)}</div></div>`
      : `<div class="card" style="padding:14px;margin-bottom:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Total Earned</div><div style="font-weight:800;font-size:1.2rem">$${money(totalPayout)}</div></div>`;
  summaryWrap.innerHTML = isAdmin ? `
    <div class="grid" style="grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px">
      <div class="card" style="padding:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Transactions</div><div style="font-weight:800;font-size:1.2rem">${rows.length}</div></div>
      <div class="card" style="padding:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Total Work</div><div style="font-weight:800;font-size:1.2rem">$${money(totalWork)}</div></div>
      ${roleSummary}
    </div>
  ` : `
    <div class="grid" style="grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px">
      <div class="card" style="padding:14px;background:#f8fafc;border:1px solid var(--border)"><div class="small muted">Transactions</div><div style="font-weight:800;font-size:1.2rem">${rows.length}</div></div>
      ${roleSummary}
    </div>
  `;

  const tableHead = isAdmin ? `
      <tr style="text-align:left;border-bottom:1px solid var(--border)">
        <th style="padding:10px 8px">Date Completed</th>
        <th style="padding:10px 8px">Job Title</th>
        <th style="padding:10px 8px">Student Rate</th>
        <th style="padding:10px 8px">Final Hours Worked</th>
        <th style="padding:10px 8px">Work Total</th>
        <th style="padding:10px 8px">Final Commission</th>
      </tr>
    ` : isEmployer ? `
      <tr style="text-align:left;border-bottom:1px solid var(--border)">
        <th style="padding:10px 8px">Date Completed</th>
        <th style="padding:10px 8px">Job Title</th>
        <th style="padding:10px 8px">Student Rate</th>
        <th style="padding:10px 8px">Final Hours Worked</th>
        <th style="padding:10px 8px">Work Total</th>
        <th style="padding:10px 8px">Platform Fee</th>
        <th style="padding:10px 8px">Final Payment</th>
      </tr>
    ` : `
      <tr style="text-align:left;border-bottom:1px solid var(--border)">
        <th style="padding:10px 8px">Date Completed</th>
        <th style="padding:10px 8px">Job Title</th>
        <th style="padding:10px 8px">Student Rate</th>
        <th style="padding:10px 8px">Final Hours Worked</th>
        <th style="padding:10px 8px">Work Total</th>
        <th style="padding:10px 8px">Platform Fee</th>
        <th style="padding:10px 8px">Final Payout</th>
      </tr>
    `;
  const tableRows = rows.map(tx => {
    const platformFeeLabel = isAdmin
      ? `$${esc(Number(tx.platform_fee_total || 0).toFixed(2))}`
      : isEmployer
        ? `${esc(formatPercent(getPaymentSettings().employerCommissionPct))} · +$${esc(Number(tx.employer_platform_fee || 0).toFixed(2))}`
        : `${esc(formatPercent(getPaymentSettings().studentCommissionPct))} · -$${esc(Number(tx.student_platform_fee || tx.platform_fee || 0).toFixed(2))}`;
    const finalValue = isAdmin
      ? `$${esc(Number(tx.platform_fee_total || 0).toFixed(2))}`
      : isEmployer
        ? `$${esc(Number(tx.total_amount || 0).toFixed(2))}`
        : `$${esc(Number(tx.payout_amount || 0).toFixed(2))}`;
    return `
      <tr style="border-bottom:1px solid var(--border)">
        <td style="padding:12px 8px">${esc(formatTransactionDate(tx.date_completed))}</td>
        <td style="padding:12px 8px">${esc(tx.job_title || '')}</td>
        <td style="padding:12px 8px">$${esc(Number(tx.hourly_rate || 0).toFixed(2))}/hr</td>
        <td style="padding:12px 8px">${esc(tx.hours_worked || 0)} hrs</td>
        <td style="padding:12px 8px">$${esc(Number(tx.work_total || 0).toFixed(2))}</td>
        <td style="padding:12px 8px">${platformFeeLabel}</td>
        ${isAdmin ? '' : `<td style="padding:12px 8px">${finalValue}</td>`}
      </tr>
    `;
  }).join('');

  resultsWrap.innerHTML = rows.length ? `
    <div style="overflow:auto">
      <table style="width:100%;border-collapse:collapse;font-size:.92rem">
        <thead>${tableHead}</thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  ` : `<div class="muted">No transactions yet.</div>`;
}
function renderTransactionsSection(el){
  el.innerHTML = `<div id="transactions-panel"></div>`;
  renderTransactionsPanel();
}
function renderSettings(el){
  const paymentMethod = getEmployerPaymentMethod(currentUser.id);
  el.innerHTML = `
    <div class="section-title">Settings</div>
    <div class="card form-card" style="margin-top:18px;max-width:720px">
      <div style="font-weight:800;font-size:1.05rem;margin-bottom:12px">My Password</div>
      <div class="field"><label>Current Password</label><input id="currentPassword" type="password" placeholder="Current password"></div>
      <div class="field"><label>New Password</label><input id="newPassword" type="password" placeholder="New password"></div>
      <div class="field"><label>Confirm New Password</label><input id="confirmNewPassword" type="password" placeholder="Confirm new password"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        <button class="btn btn-blue" onclick="changePassword()">Change Password</button>
        <button class="btn btn-danger" onclick="deleteCurrentProfile()">Delete Profile</button>
      </div>
      <div class="warning" style="margin-bottom:14px">If you delete your profile, your profile and all associated services will be permanently removed and will no longer be visible to other users.</div>
      ${currentUser.role === 'employer' ? (canViewBillingDetails() ? `
        <div class="small muted" style="margin-bottom:8px">Payment Method</div>
        <div class="field"><input value="${paymentMethod ? esc(paymentMethod.brand + ' •••• ' + paymentMethod.last4) : 'Visa •••• 4242'}" readonly></div>
        <button class="btn btn-outline" onclick="openPaymentMethodModal()">Update Payment Method</button>
      ` : `<div class="warning">Billing details are hidden while Admin is viewing as this user.</div>`) : ''}
    </div>
  `;
}
function changePassword(){
  const users = getUsers();
  const user = users.find(x => x.id === currentUser.id);
  if (!user) return;
  const currentPassword = document.getElementById('currentPassword').value || '';
  const newPassword = document.getElementById('newPassword').value || '';
  const confirmNewPassword = document.getElementById('confirmNewPassword').value || '';
  if (currentPassword !== user.password) return toast('Current password is incorrect.');
  if (!newPassword || newPassword.length < 6) return toast('New password must be at least 6 characters.');
  if (newPassword !== confirmNewPassword) return toast('New passwords do not match.');
  user.password = newPassword;
  saveUsers(users);
  setCurrentUser(user);
  toast('Password updated.');
  renderSettings(document.getElementById('dash-main'));
}
function deleteCurrentProfile(){
  if (!confirm('If you delete your profile, your profile and all associated services will be permanently removed and will no longer be visible to other users.')) return;
  const users = getUsers();
  const user = users.find(x => x.id === currentUser.id);
  if (!user) return;
  user.archived = true;
  user.archivedAt = new Date().toISOString();
  saveUsers(users);
  if (currentUser.role === 'student') {
    const students = getStudents();
    students.filter(s => s.userId === currentUser.id).forEach(s => {
      s.status = 'archived';
      s.archivedAt = new Date().toISOString();
      s.archivedServices = (s.services || []).map(service => Object.assign({}, service));
      s.services = [];
    });
    saveStudents(students);
  }
  signOut();
  toast('Profile deleted from public view.');
}

function initializePrototype(){
  try {
    seedData();
    loadCurrentUser();
    renderPage();
  } catch (error) {
    console.error('CoGo init error', error);
    try {
      clearPrototypeDataStores();
      resetPrototypeRuntimeState();
      seedData();
      loadCurrentUser();
      renderPage();
    } catch (recoveryError) {
      renderAppErrorState(recoveryError, location.hash || '#/');
    }
  }
}

// ---------- Init ----------
initializePrototype();
</script>
